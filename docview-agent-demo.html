<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DocView + Agent 交互演示 (v2 — enriched context)</title>
  <style>
    body { font-family: system-ui; background: #0f1117; color: #e2e8f0; margin: 0; }
    #app { width: 60%; height: calc(100vh - 220px); float: left; overflow-y: auto; }
    #event-log {
      width: 40%; height: calc(100vh - 220px); float: right;
      background: #0d0e14; border-left: 1px solid #2d3148;
      overflow-y: auto; padding: 12px; box-sizing: border-box;
    }
    #agent-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: #1a1a2e; border-top: 2px solid #667eea;
      padding: 10px 20px; display: flex; gap: 12px; align-items: center;
      font-size: 13px; clear: both;
    }
    #agent-bar button {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #667eea;
      background: #667eea; color: #fff; cursor: pointer; font-size: 13px;
    }
    #agent-bar button:hover { background: #7c8ff5; }
    #agent-status { color: #94a3b8; flex: 1; }

    /* Event log styles */
    .log-title { color: #667eea; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .log-entry {
      background: #161625; border: 1px solid #2d3148; border-radius: 6px;
      padding: 8px 10px; margin-bottom: 8px; font-size: 11px;
    }
    .log-entry .log-time { color: #64748b; font-family: monospace; }
    .log-entry .log-event { color: #667eea; font-weight: 600; }
    .log-entry .log-ann-text { color: #e2e8f0; margin: 4px 0; }
    .log-entry .log-note { color: #94a3b8; font-style: italic; }
    .log-entry .log-ctx { color: #10b981; margin-top: 4px; padding: 4px 6px; background: #0f1117; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
    .log-entry .log-copy {
      font-size: 10px; padding: 2px 8px; border-radius: 3px; border: 1px solid #2d3148;
      background: #252836; color: #94a3b8; cursor: pointer; margin-top: 4px;
    }
    .log-entry .log-copy:hover { background: #667eea; color: #fff; }
    .log-empty { color: #64748b; font-size: 12px; text-align: center; padding: 40px 0; }
    .section-selector { display: flex; gap: 6px; flex-wrap: wrap; }
    .section-selector button {
      padding: 4px 10px; border-radius: 4px; border: 1px solid #2d3148;
      background: #252836; color: #94a3b8; cursor: pointer; font-size: 11px;
    }
    .section-selector button:hover { background: #667eea; color: #fff; }
    .section-selector button.active { background: #667eea; color: #fff; border-color: #667eea; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="event-log">
    <div class="log-title">Annotation Event Log</div>
    <div class="section-selector" id="section-nav"></div>
    <div id="log-entries"><div class="log-empty">等待批注...<br>选中文字或点击图表添加批注</div></div>
  </div>
  <div id="agent-bar">
    <span style="color:#667eea;font-weight:600;">Agent (Claude)</span>
    <span id="agent-status">就绪 — 选中文字或点击图表添加批注</span>
    <button onclick="window.clearLog()">清空日志</button>
    <button onclick="window.copyAllEvents()">复制全部</button>
    <button onclick="window.switchContent()">切换内容</button>
  </div>
  <script src="../dist/vizual.standalone.js"></script>
  <script>
    // ── 全局状态 ──
    window._events = [];
    window._currentContentIndex = 0;

    // ── Agent 接口 ──
    window.getAnnotations = function() {
      return JSON.stringify(window._events, null, 2);
    };

    window.updateSections = function(newSections) {
      if (typeof newSections === 'string') newSections = JSON.parse(newSections);
      window._currentSections = newSections;
      renderDocView(newSections);
    };

    window.clearLog = function() {
      window._events = [];
      document.getElementById('log-entries').innerHTML =
        '<div class="log-empty">等待批注...<br>选中文字或点击图表添加批注</div>';
      document.getElementById('agent-status').textContent = '日志已清空';
    };

    window.copyAllEvents = function() {
      var text = JSON.stringify(window._events, null, 2);
      navigator.clipboard.writeText(text).then(function() {
        document.getElementById('agent-status').textContent = '已复制 ' + window._events.length + ' 条事件到剪贴板';
      });
    };

    window.switchContent = function() {
      window._currentContentIndex = (window._currentContentIndex + 1) % contentSets.length;
      var sections = contentSets[window._currentContentIndex];
      window._currentSections = sections;
      renderDocView(sections);
      buildSectionNav(sections);
      document.getElementById('agent-status').textContent =
        '已切换到内容方案 ' + (window._currentContentIndex + 1) + '/' + contentSets.length;
    };

    // ── 事件日志 ──
    function addLogEntry(event) {
      window._events.push(event);
      var container = document.getElementById('log-entries');
      // 清除空提示
      if (container.querySelector('.log-empty')) container.innerHTML = '';

      var entry = document.createElement('div');
      entry.className = 'log-entry';

      var time = new Date(event.timestamp).toLocaleTimeString();
      var eventName = event.type === 'annotationAdded' ? '📝 批注添加' : event.type;

      var html = '<div><span class="log-time">' + time + '</span> <span class="log-event">' + eventName + '</span></div>';

      // Annotation text/note
      if (event.params && event.params.annotation) {
        var ann = event.params.annotation;
        html += '<div class="log-ann-text">"' + (ann.text || '').substring(0, 60) + '"</div>';
        if (ann.note) html += '<div class="log-note">备注: ' + ann.note + '</div>';
      }

      // Section Context (enriched!)
      if (event.params) {
        var ctx = event.params.sectionContexts || event.params.sectionContext;
        if (ctx) {
          html += '<div class="log-ctx">' + JSON.stringify(ctx, null, 2) + '</div>';
        } else {
          html += '<div class="log-ctx" style="color:#f59e0b">⚠️ 无 sectionContext</div>';
        }
      }

      // Copy button
      var eventIdx = window._events.length - 1;
      html += '<button class="log-copy" data-idx="' + eventIdx + '">复制 JSON</button>';

      entry.innerHTML = html;
      container.insertBefore(entry, container.firstChild);

      // Update agent status
      document.getElementById('agent-status').textContent =
        '收到 ' + window._events.length + ' 条事件 — 最后: ' + eventName;

      // Bind copy
      entry.querySelector('.log-copy').onclick = function() {
        var idx = parseInt(this.dataset.idx);
        navigator.clipboard.writeText(JSON.stringify(window._events[idx], null, 2));
        this.textContent = '已复制!';
        var btn = this;
        setTimeout(function() { btn.textContent = '复制 JSON'; }, 1500);
      };
    }

    // ── Section 导航 ──
    function buildSectionNav(sections) {
      var nav = document.getElementById('section-nav');
      nav.innerHTML = '';
      sections.forEach(function(s, i) {
        var btn = document.createElement('button');
        btn.textContent = (s.type || '?') + ' #' + i;
        btn.title = s.content ? s.content.substring(0, 50) : '';
        btn.onclick = function() {
          // Scroll to section in DocView
          var targets = document.querySelectorAll('[data-docview-target]');
          targets.forEach(function(t) {
            if (t.getAttribute('data-docview-target') === String(i)) {
              t.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          });
        };
        nav.appendChild(btn);
      });
    }

    // ── 渲染 DocView ──
    function renderDocView(sections) {
      var app = document.getElementById('app');
      app.innerHTML = '';
      window._currentSections = sections;
      Vizual.renderSpec({
        root: 'm',
        elements: { m: {
          type: 'DocView',
          props: {
            type: 'doc_view',
            title: 'Q1 2024 产品数据报告',
            showPanel: true,
            panelPosition: 'right',
            sections: sections,
            onAction: function(name, params) {
              var event = { type: name, params: params, timestamp: Date.now() };
              addLogEntry(event);
            }
          },
          children: []
        }}
      }, app);
    }

    // ═══════════════════════════════════════════════════════════
    // 内容方案 1：原始报告 + 新 section types
    // ═══════════════════════════════════════════════════════════
    var contentClassic = [
      {"type":"heading","content":"Q1 2024 产品数据报告","level":1},
      {"type":"text","content":"本报告总结了 2024 年第一季度的核心产品指标。总体来看，产品表现良好，用户增长稳健，收入达到预期目标。以下是详细数据分析。"},
      {"type":"heading","content":"关键指标","level":2},
      {"type":"kpi","content":"核心 KPI","data":{"metrics":[
        {"label":"月活用户","value":"128万","trend":"up"},
        {"label":"季度收入","value":"$3.2M","trend":"up"},
        {"label":"用户留存","value":"72%","trend":"down"},
        {"label":"NPS 评分","value":"45","trend":"up"}
      ]}},
      {"type":"callout","content":"⚠️ 留存率下降需要关注。Q1 留存从 75% 降至 72%，主要流失发生在注册后第 7 天。建议加强新手引导和推送策略。","variant":"warning"},
      {"type":"heading","content":"月度收入趋势","level":2},
      {"type":"chart","content":"月度收入（万元）","componentType":"bar","data":{"type":"bar","x":"month","y":"revenue","data":[
        {"month":"1月","revenue":820},
        {"month":"2月","revenue":932},
        {"month":"3月","revenue":1034},
        {"month":"4月","revenue":1090},
        {"month":"5月","revenue":1190},
        {"month":"6月","revenue":1330}
      ]}},
      {"type":"heading","content":"用户增长数据","level":2},
      {"type":"table","content":"各渠道用户数据","data":{"columns":[
        {"key":"channel","label":"渠道"},
        {"key":"users","label":"新增用户"},
        {"key":"conversion","label":"转化率"},
        {"key":"revenue","label":"贡献收入"}
      ],"data":[
        {"channel":"自然搜索","users":"45,200","conversion":"3.2%","revenue":"$1.2M"},
        {"channel":"社交媒体","users":"38,100","conversion":"2.8%","revenue":"$890K"},
        {"channel":"付费投放","users":"28,500","conversion":"4.1%","revenue":"$760K"},
        {"channel":"口碑推荐","users":"16,200","conversion":"5.6%","revenue":"$350K"}
      ]}},
      {"type":"heading","content":"结论与建议","level":2},
      {"type":"text","content":"Q1 整体表现超出预期。收入同比增长 18%，主要受益于付费投放渠道的优化。但留存率下降 3 个百分点需要重视，建议在下个季度重点改进新用户引导流程，并在第 3 天和第 7 天增加触达点。"},
      {"type":"callout","content":"✅ 推荐行动：1) 优化新手引导流程；2) 增加第 3/7 天推送；3) 扩大口碑推荐奖励机制；4) 持续优化付费投放 ROI。","variant":"success"}
    ];

    // ═══════════════════════════════════════════════════════════
    // 内容方案 2：展示新功能（markdown + freeform + layout + aiContext）
    // ═══════════════════════════════════════════════════════════
    var contentNewFeatures = [
      {"type":"heading","content":"DocView v2 功能展示","level":1},
      {"type":"text","content":"这个 demo 展示了 DocView 的所有新功能：Markdown section、Freeform section、Layout 变体、aiContext 语义标注。试着在不同 section 上添加批注，观察 Event Log 中收到的 sectionContext 是否正确。"},

      // Hero layout + markdown
      {"type":"heading","content":"Hero 布局 + Markdown","level":2},
      {"type":"markdown","content":"# Q1 业务报告\n\n本季度**总收入 $3.2M**，同比增长 18%。\n\n- 月活用户：128 万 (+12%)\n- 付费转化率：4.1%\n- NPS 评分：45\n\n> 数据来源：内部 BI 系统，2024-Q1","layout":"hero","aiContext":"Q1季度核心业务摘要，包含收入、用户、转化率等关键数据"},

      // KPI with grid layout
      {"type":"heading","content":"Grid 布局 KPI","level":2},
      {"type":"kpi","content":"核心指标","layout":"grid","aiContext":"四个核心KPI指标：月活、收入、留存、NPS","data":{"metrics":[
        {"label":"月活用户","value":"128万","trend":"up","change":"+12%"},
        {"label":"季度收入","value":"$3.2M","trend":"up","change":"+18%"},
        {"label":"用户留存","value":"72%","trend":"down","change":"-3%"},
        {"label":"NPS 评分","value":"45","trend":"up","change":"+5"}
      ]}},

      // Banner callout
      {"type":"callout","content":"⚠️ 留存率下降需要关注。Q1 留存从 75% 降至 72%，主要流失发生在注册后第 7 天。建议加强新手引导和推送策略。","variant":"warning","layout":"banner","aiContext":"留存预警：下降3个百分点，主因是第7天流失"},

      // Split layout chart
      {"type":"heading","content":"Split 布局图表对比","level":2},
      {"type":"chart","content":"月度收入（万元）","componentType":"bar","layout":"split","aiContext":"H1月度收入趋势，1月820万到6月1330万持续增长","data":{"type":"bar","x":"month","y":"revenue","data":[
        {"month":"1月","revenue":820},
        {"month":"2月","revenue":932},
        {"month":"3月","revenue":1034},
        {"month":"4月","revenue":1090},
        {"month":"5月","revenue":1190},
        {"month":"6月","revenue":1330}
      ]}},

      // Compact table
      {"type":"table","content":"各渠道用户数据","layout":"compact","aiContext":"四个获客渠道的转化数据：自然搜索、社交媒体、付费投放、口碑推荐","data":{"columns":[
        {"key":"channel","label":"渠道"},
        {"key":"users","label":"新增用户"},
        {"key":"conversion","label":"转化率"},
        {"key":"revenue","label":"贡献收入"}
      ],"data":[
        {"channel":"自然搜索","users":"45,200","conversion":"3.2%","revenue":"$1.2M"},
        {"channel":"社交媒体","users":"38,100","conversion":"2.8%","revenue":"$890K"},
        {"channel":"付费投放","users":"28,500","conversion":"4.1%","revenue":"$760K"},
        {"channel":"口碑推荐","users":"16,200","conversion":"5.6%","revenue":"$350K"}
      ]}},

      // Card layout text
      {"type":"heading","content":"Card 布局文本","level":2},
      {"type":"text","content":"Q1 整体表现超出预期。收入同比增长 18%，主要受益于付费投放渠道的优化。但留存率下降 3 个百分点需要重视，建议在下个季度重点改进新用户引导流程。","layout":"card","aiContext":"Q1总结与Q2建议"},

      // Freeform section
      {"type":"heading","content":"Freeform 自定义内容","level":2},
      {"type":"freeform","content":"<article><header><h3>自由格式区域</h3></header><section><p>这个区域支持任意 HTML 结构，可以创建复杂的布局和内容组合。</p><dl><dt>优势</dt><dd>灵活的内容展示</dd><dt>限制</dt><dd>禁止 script/style/iframe</dd></dl></section><footer><small>内容经过 DOMPurify 安全过滤</small></footer></article>","aiContext":"Freeform功能展示区域，说明自由格式HTML的支持范围"},

      // Markdown deep dive
      {"type":"heading","content":"Markdown 详细格式","level":2},
      {"type":"markdown","content":"## 支持的 Markdown 语法\n\n### 文本格式\n**粗体**、*斜体*、`行内代码`\n\n### 列表\n- 项目一\n- 项目二\n- 项目三\n\n### 有序列表\n1. 第一步\n2. 第二步\n3. 第三步\n\n### 代码块\n```javascript\nconst revenue = 3200000;\nconsole.log('Q1 Revenue:', revenue);\n```\n\n### 表格\n| 指标 | Q1 | Q2 | 变化 |\n|------|-----|-----|------|\n| 收入 | $3.2M | $3.8M | +18% |\n| 用户 | 128万 | 142万 | +11% |","layout":"card","aiContext":"Markdown语法支持说明文档"},

      {"type":"callout","content":"✅ 全部新功能展示完毕。请尝试批注不同 section，检查 Event Log 中的 sectionContext 是否包含正确的语义信息。","variant":"success","layout":"banner"}
    ];

    var contentSets = [contentClassic, contentNewFeatures];

    // ── 初始化 ──
    var sections = contentSets[0];
    window._currentSections = sections;
    renderDocView(sections);
    buildSectionNav(sections);
  </script>
</body>
</html>
