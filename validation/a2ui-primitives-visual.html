<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A2UI Primitives Visual Acceptance</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    main { max-width: 1120px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-top: 16px; }
    #status { color: #475569; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <h1>A2UI Primitives Visual Acceptance</h1>
    <p id="status">Waiting for runtime...</p>
    <div id="app" class="panel"></div>
  </main>
  <script src="../dist/vizual.standalone.js"></script>
  <script>
    const spec = {
      root: 'root',
      elements: {
        root: { type: 'Column', props: { gap: 14 }, children: ['text', 'row', 'tabs', 'media'] },
        text: { type: 'Text', props: { content: 'Current primitive set: Row, Column, Card, Text, Image, Icon, List, Divider, Button, CheckBox, TextField, ChoicePicker, Slider, DateTimeInput, Tabs, Video, AudioPlayer.' }, children: [] },
        row: { type: 'Row', props: { gap: 10, wrap: true }, children: ['btn', 'check', 'choice', 'slider', 'date'] },
        btn: { type: 'Button', props: { label: '提交', action: 'submitForm' }, children: [] },
        check: { type: 'CheckBox', props: { label: '启用' }, children: [] },
        choice: { type: 'ChoicePicker', props: { label: '选项', options: ['A', 'B', 'C'] }, children: [] },
        slider: { type: 'Slider', props: { label: '阈值', min: 0, max: 100, value: 60 }, children: [] },
        date: { type: 'DateTimeInput', props: { label: '日期' }, children: [] },
        tabs: { type: 'Tabs', props: { tabs: [{ label: '列表', content: '列表内容' }, { label: '说明', content: '说明内容' }] }, children: [] },
        media: { type: 'Card', props: {}, children: ['list'] },
        list: { type: 'List', props: { items: ['轻量组合', '有用交互', '宿主回传'] }, children: [] },
      },
    };
    try {
      if (!window.Vizual) throw new Error('dist/vizual.standalone.js not loaded. Run npm run build first.');
      window.Vizual.renderSpec(spec, document.getElementById('app'));
      document.getElementById('status').textContent = 'Rendered current primitives.';
    } catch (error) {
      document.getElementById('status').textContent = error.message;
      throw error;
    }
  </script>
</body>
</html>
