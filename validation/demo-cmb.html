<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>招商银行运管部 — AI 数据分析助手</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#1a1a1a;height:100vh;display:flex;overflow:hidden}

    /* Sidebar */
    .sidebar{width:260px;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-header{padding:16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;gap:10px}
    .sidebar-header .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#c4161c,#e63946);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
    .sidebar-header .info{display:flex;flex-direction:column}
    .sidebar-header .info .name{font-weight:700;font-size:14px;color:#1a1a1a}
    .sidebar-header .info .sub{font-size:11px;color:#999}
    .chat-list{flex:1;overflow-y:auto;padding:8px}
    .chat-item{padding:10px 12px;border-radius:8px;font-size:13px;color:#666;cursor:pointer;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-item.active{background:#fef2f2;color:#c4161c;font-weight:500}
    .chat-item:hover{background:#f5f5f5}
    .sidebar-footer{padding:12px 16px;border-top:1px solid #e5e5e5;font-size:11px;color:#bbb}

    /* Main chat area */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;background:#fafafa}
    .topbar{height:48px;background:#fff;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;padding:0 20px;font-size:13px;color:#666;gap:8px}
    .topbar b{color:#1a1a1a}
    .topbar .badge{background:#fef2f2;color:#c4161c;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}

    .messages{flex:1;overflow-y:auto;padding:20px 0;scroll-behavior:smooth}
    .msg{display:flex;gap:12px;padding:12px 40px;max-width:960px;margin:0 auto;width:100%}
    .msg.user{justify-content:flex-end}
    .msg.user .bubble{background:#c4161c;border-radius:16px 16px 4px 16px;padding:10px 16px;font-size:14px;max-width:70%;color:#fff}
    .msg.ai .avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#c4161c,#e63946);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff}
    .msg.ai .bubble{max-width:85%;min-width:480px}
    .msg.ai .bubble .text{font-size:14px;line-height:1.6;color:#374151;margin-bottom:8px}

    /* Streaming JSON */
    .json-stream{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:11.5px;line-height:1.5;color:#9ca3af;background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:12px;margin-top:8px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;position:relative}
    .json-stream .cursor{display:inline-block;width:7px;height:14px;background:#c4161c;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:1px}
    @keyframes blink{50%{opacity:0}}
    .json-key{color:#c4161c}.json-str{color:#16a34a}.json-num{color:#d97706}.json-bool{color:#2563eb}.json-null{color:#9ca3af}

    /* Rendered component */
    .rendered{margin-top:8px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden;background:#fff;width:100%}
    .rendered-label{font-size:10px;color:#999;padding:4px 8px;background:#fafafa;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
    .rendered-label .comp-name{color:#c4161c;font-weight:600}
    .rendered-label .toggle-json{color:#bbb;cursor:pointer;font-size:10px;text-decoration:underline}
    .rendered-label .toggle-json:hover{color:#666}
    .rendered-content{padding:12px}

    /* Thinking indicator */
    .thinking{display:flex;gap:4px;padding:4px 0}
    .thinking span{width:6px;height:6px;border-radius:50%;background:#c4161c;animation:dot 1.4s infinite;opacity:.3}
    .thinking span:nth-child(2){animation-delay:.2s}
    .thinking span:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,80%,100%{opacity:.3}40%{opacity:1}}

    /* Input bar */
    .inputbar{border-top:1px solid #e5e5e5;padding:12px 20px;display:flex;gap:8px;align-items:center;background:#fff}
    .inputbar input{flex:1;background:#f5f5f5;border:1px solid #e5e5e5;border-radius:8px;padding:10px 14px;color:#1a1a1a;font-size:13px;outline:none}
    .inputbar input:focus{border-color:#c4161c}
    .inputbar input::placeholder{color:#bbb}
    .inputbar button{background:#c4161c;border:none;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
    .inputbar button:hover{background:#a31217}
    .inputbar button:disabled{background:#ddd;cursor:not-allowed;color:#999}

    /* Status */
    .status{position:fixed;bottom:16px;right:16px;background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:8px 14px;font-size:11px;color:#999;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .status .count{color:#c4161c;font-weight:700}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">招</div>
      <div class="info">
        <div class="name">运管数据助手</div>
        <div class="sub">招商银行 · 运营管理部</div>
      </div>
    </div>
    <div class="chat-list">
      <div class="chat-item active">📊 分行业绩概览</div>
      <div class="chat-item">🏦 分行贷款排名</div>
      <div class="chat-item">🎯 绩效雷达对比</div>
      <div class="chat-item">📈 存款增长趋势</div>
      <div class="chat-item">💰 不良率监控</div>
    </div>
    <div class="sidebar-footer">招商银行 © 2025 · AI 数据分析平台</div>
  </div>

  <div class="main">
    <div class="topbar"><b>分行业绩概览</b> <span class="badge">实时</span></div>
    <div class="messages" id="messages"></div>
    <div class="inputbar">
      <input id="userInput" placeholder="输入你的数据分析问题..." disabled>
      <button id="skipBtn">跳过全部</button>
    </div>
  </div>

  <div class="status" id="status">准备就绪</div>

  <script src="../dist/vizual.standalone.js"></script>
  <script>
  (function() {
    // Apply light theme by default
    Vizual.setGlobalTheme('default-light')

    // 招商银行运管部数据分析对话
    var conversations = [
      // ── Q1: 分行运营概览 ──
      {
        q: "帮我看看各分行本月核心运营指标",
        intro: "以下是招商银行各分行本月核心运营指标看板：",
        spec: { root:'m', elements:{ m:{ type:'KpiDashboard', props:{ type:'kpi_dashboard', title:'全行分行业绩概览 · 2025年4月', columns:4, metrics:[
          {label:'分行存款余额',value:'¥8,267亿',trend:'up',trendValue:'+5.8%'},
          {label:'贷款投放完成率',value:'94.2%',trend:'up',trendValue:'+2.1%'},
          {label:'中间业务收入',value:'¥23.6亿',trend:'up',trendValue:'+8.3%'},
          {label:'平均不良率',value:'1.28%',trend:'down',trendValue:'-0.06pp'}
        ]}, children:[] }}}
      },
      // ── Q2: 分行业绩同环比 ──
      {
        q: "各分行存款余额的月度变化趋势是怎样的？",
        intro: "近6个月各分行存款余额同环比数据如下：",
        spec: { root:'m', elements:{ m:{ type:'DataTable', props:{ type:'table', title:'各分行存款余额月度变化（亿元）', striped:true, columns:[
          {key:'branch',label:'分行'},
          {key:'apr',label:'4月',align:'right'},
          {key:'mar',label:'3月',align:'right'},
          {key:'yoy',label:'同比',align:'right'},
          {key:'mom',label:'环比',align:'right'}
        ], data:[
          {branch:'深圳分行',apr:'1,286',mar:'1,245',yoy:'+12.5%',mom:'+3.3%'},
          {branch:'上海分行',apr:'1,168',mar:'1,152',yoy:'+10.8%',mom:'+1.4%'},
          {branch:'北京分行',apr:'1,052',mar:'1,038',yoy:'+9.2%',mom:'+1.3%'},
          {branch:'广州分行',apr:'862',mar:'845',yoy:'+11.6%',mom:'+2.0%'},
          {branch:'杭州分行',apr:'738',mar:'720',yoy:'+13.2%',mom:'+2.5%'},
          {branch:'南京分行',apr:'652',mar:'641',yoy:'+8.5%',mom:'+1.7%'}
        ]}, children:[] }}}
      },
      // ── Q3: 分行KPI趋势 ──
      {
        q: "画个趋势图看看主要分行的存款增长走势",
        intro: "近12个月五大分行存款余额走势，整体稳步增长：",
        spec: { root:'m', elements:{ m:{ type:'LineChart', props:{ type:'line', title:'五大分行存款余额趋势（亿元）', x:'month', y:['深圳','上海','北京','广州','杭州'], data:[
          {month:'2024-05',深圳:1080,上海:1010,北京:920,广州:740,杭州:620},
          {month:'2024-06',深圳:1095,上海:1020,北京:935,广州:752,杭州:635},
          {month:'2024-07',深圳:1112,上海:1035,北京:948,广州:768,杭州:650},
          {month:'2024-08',深圳:1130,上海:1048,北京:960,广州:780,杭州:662},
          {month:'2024-09',深圳:1148,上海:1062,北京:975,广州:795,杭州:678},
          {month:'2024-10',深圳:1165,上海:1078,北京:988,广州:808,杭州:690},
          {month:'2024-11',深圳:1185,上海:1095,北京:1002,广州:822,杭州:705},
          {month:'2024-12',深圳:1210,上海:1112,北京:1018,广州:835,杭州:718},
          {month:'2025-01',深圳:1235,上海:1130,北京:1025,广州:842,杭州:722},
          {month:'2025-02',深圳:1250,上海:1140,北京:1030,广州:848,杭州:728},
          {month:'2025-03',深圳:1268,上海:1152,北京:1038,广州:856,杭州:738},
          {month:'2025-04',深圳:1286,上海:1168,北京:1052,广州:862,杭州:752}
        ]}, children:[] }}}
      },
      // ── Q4: 业务结构 ──
      {
        q: "全行各业务条线的收入占比是什么情况？",
        intro: "全行各业务条线收入占比分析：",
        spec: { root:'m', elements:{ m:{ type:'PieChart', props:{ type:'pie', title:'全行各业务条线收入占比', category:'biz', value:'pct', data:[
          {biz:'公司银行业务',pct:32},{biz:'零售银行业务',pct:28},{biz:'资金业务',pct:18},
          {biz:'信用卡业务',pct:12},{biz:'资产管理',pct:7},{biz:'其他',pct:3}
        ]}, children:[] }}}
      },
      // ── Q5: 分行综合绩效雷达图 ──
      {
        q: "帮我对比主要分行一季度的综合绩效评分",
        intro: "各分行Q1综合绩效雷达图，涵盖6大考核维度：",
        spec: { root:'m', elements:{ m:{ type:'RadarChart', props:{ type:'radar', title:'各分行Q1综合绩效评分', indicators:[
          {name:'存款增长',max:100},{name:'贷款投放',max:100},{name:'中间收入',max:100},
          {name:'不良控制',max:100},{name:'客户满意度',max:100},{name:'成本控制',max:100}
        ], series:[
          {name:'深圳分行',values:[92,88,85,90,95,82]},
          {name:'上海分行',values:[88,92,90,85,90,86]},
          {name:'北京分行',values:[85,86,88,92,88,90]}
        ]}, children:[] }}}
      },
      // ── Q6: 分行排名柱状图 ──
      {
        q: "用柱状图展示一下各分行Q1贷款投放完成率",
        intro: "各分行Q1贷款投放计划完成率对比：",
        spec: { root:'m', elements:{ m:{ type:'BarChart', props:{ type:'bar', title:'各分行Q1贷款投放完成率', x:'branch', y:'rate', data:[
          {branch:'深圳',rate:96.8},{branch:'杭州',rate:95.2},{branch:'上海',rate:94.5},
          {branch:'广州',rate:93.1},{branch:'北京',rate:91.8},{branch:'南京',rate:90.5},
          {branch:'成都',rate:88.2},{branch:'武汉',rate:86.5}
        ]}, children:[] }}}
      },
      // ── Q7: 关键指标 ──
      {
        q: "全行平均不良贷款率现在多少？",
        intro: "当前全行平均不良贷款率核心指标：",
        spec: { root:'m', elements:{ m:{ type:'BigValue', props:{ type:'big_value', title:'全行平均不良贷款率', value:'1.28%', trend:'down', trendValue:'-0.06pp'}, children:[] }}}
      },
      // ── Q8: 柱线组合图 ──
      {
        q: "把分行存款和贷款增量放在一起看看趋势",
        intro: "近6个月全行分行业务增量组合趋势图（柱状+折线）：",
        spec: { root:'m', elements:{ m:{ type:'ComboChart', props:{ type:'combo', title:'全行月度存款与贷款增量（亿元）', x:'month', y:['deposit','loan'], data:[
          {month:'2024-11',deposit:182,loan:145},{month:'2024-12',deposit:210,loan:168},
          {month:'2025-01',deposit:195,loan:158},{month:'2025-02',deposit:168,loan:132},
          {month:'2025-03',deposit:225,loan:185},{month:'2025-04',deposit:248,loan:198}
        ]}, children:[] }}}
      },
      // ── Q9: 网点客户转化漏斗 ──
      {
        q: "网点新客户转化漏斗是怎样的？",
        intro: "全行网点新客户转化漏斗数据：",
        spec: { root:'m', elements:{ m:{ type:'FunnelChart', props:{ type:'funnel', title:'网点新客户转化漏斗', category:'stage', value:'count', data:[
          {stage:'到店客户',count:320000},{stage:'开通账户',count:185000},
          {stage:'激活使用',count:112000},{stage:'购买理财',count:68000},
          {stage:'成为VIP',count:28000}
        ]}, children:[] }}}
      },
      // ── Q10: 审计日志 ──
      {
        q: "给我看一下最近的重要操作日志",
        intro: "运管部最近的重要操作审计记录：",
        spec: { root:'m', elements:{ m:{ type:'AuditLog', props:{ type:'audit_log', title:'运管操作审计日志', entries:[
          {timestamp:'2025-04-18 10:32',user:'王主管',action:'审批通过',target:'深圳分行新增网点2家',severity:'info'},
          {timestamp:'2025-04-18 09:15',user:'系统',action:'阈值告警',target:'成都分行不良率超过1.5%',severity:'warning'},
          {timestamp:'2025-04-17 16:40',user:'张经理',action:'数据修正',target:'3月杭州分行存款数据补录',severity:'warning'},
          {timestamp:'2025-04-17 14:20',user:'李总监',action:'考核发布',target:'Q1分行业绩考核结果发布',severity:'info'},
          {timestamp:'2025-04-17 08:00',user:'系统',action:'批处理完成',target:'分行日终报表生成完成',severity:'info'}
        ]}, children:[] }}}
      }
    ];

    var msgContainer = document.getElementById('messages');
    var skipBtn = document.getElementById('skipBtn');
    var statusEl = document.getElementById('status');
    var currentConv = 0;
    var aborted = false;

    // Skip: render all remaining instantly
    skipBtn.onclick = function() {
      aborted = true;
      skipBtn.disabled = true;
      skipBtn.textContent = '渲染中...';
      while (currentConv < conversations.length) {
        renderConversationInstant(currentConv);
        currentConv++;
      }
      updateStatus();
      skipBtn.textContent = '已完成';
    };

    function updateStatus() {
      statusEl.innerHTML = '<span class="count">' + currentConv + '/' + conversations.length + '</span> 已渲染';
    }

    // Add user message
    function addUserMessage(text) {
      var div = document.createElement('div');
      div.className = 'msg user';
      div.innerHTML = '<div class="bubble">' + text + '</div>';
      msgContainer.appendChild(div);
    }

    // Add AI message with streaming
    function addAIMessage(conv, onComplete) {
      var div = document.createElement('div');
      div.className = 'msg ai';
      div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="text"></div></div>';
      msgContainer.appendChild(div);
      var textEl = div.querySelector('.text');

      // Phase 1: Show thinking dots
      textEl.innerHTML = conv.intro + '<div class="thinking"><span></span><span></span><span></span></div>';
      scrollToBottom();

      setTimeout(function() {
        // Phase 2: Show intro text
        textEl.textContent = conv.intro;

        // Phase 3: Stream JSON
        var jsonStr = JSON.stringify(conv.spec, null, 2);
        var jsonEl = document.createElement('div');
        jsonEl.className = 'json-stream';
        textEl.appendChild(jsonEl);

        var charIdx = 0;
        var streamInterval = setInterval(function() {
          if (aborted || charIdx >= jsonStr.length) {
            clearInterval(streamInterval);
            if (jsonEl.querySelector('.cursor')) jsonEl.querySelector('.cursor').remove();
            // Phase 4: Render component
            var rendered = document.createElement('div');
            rendered.className = 'rendered';
            var type = conv.spec.elements[conv.spec.root].type;
            rendered.innerHTML = '<div class="rendered-label"><span class="comp-name">' + type + '</span><span class="toggle-json" onclick="this.parentElement.nextElementSibling.style.display=this.parentElement.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">收起JSON</span></div><div class="rendered-content"></div>';
            textEl.appendChild(rendered);
            // Hide JSON stream
            jsonEl.style.display = 'none';
            rendered.querySelector('.toggle-json').onclick = function() {
              jsonEl.style.display = jsonEl.style.display === 'none' ? 'block' : 'none';
              this.textContent = jsonEl.style.display === 'none' ? '查看JSON' : '收起JSON';
            };
            try {
              Vizual.renderSpec(conv.spec, rendered.querySelector('.rendered-content'));
            } catch(e) {
              rendered.querySelector('.rendered-content').innerHTML = '<div style="color:#ef4444;font-size:12px">Error: ' + e.message + '</div>';
            }
            scrollToBottom();
            if (onComplete) onComplete();
            return;
          }
          // Append chars
          var chunk = jsonStr.substring(charIdx, Math.min(charIdx + 3, jsonStr.length));
          charIdx += 3;
          jsonEl.innerHTML = highlightJson(jsonStr.substring(0, charIdx)) + '<span class="cursor"></span>';
          scrollToBottom();
        }, 8);
      }, 800 + Math.random() * 400);
    }

    function highlightJson(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
        .replace(/: "([^"]*)"/g, ': <span class="json-str">"$1"</span>')
        .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
        .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
        .replace(/: (null)/g, ': <span class="json-null">$1</span>');
    }

    function renderConversationInstant(idx) {
      var conv = conversations[idx];
      addUserMessage(conv.q);
      var div = document.createElement('div');
      div.className = 'msg ai';
      var type = conv.spec.elements[conv.spec.root].type;
      div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="text">' + conv.intro + '</div><div class="rendered"><div class="rendered-label"><span class="comp-name">' + type + '</span></div><div class="rendered-content"></div></div></div>';
      msgContainer.appendChild(div);
      try {
        Vizual.renderSpec(conv.spec, div.querySelector('.rendered-content'));
      } catch(e) {
        div.querySelector('.rendered-content').innerHTML = '<div style="color:#ef4444;font-size:12px">Error: ' + e.message + '</div>';
      }
    }

    function scrollToBottom() {
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // Start streaming
    function streamNext() {
      if (currentConv >= conversations.length || aborted) {
        updateStatus();
        skipBtn.textContent = '已完成';
        skipBtn.disabled = true;
        return;
      }
      var conv = conversations[currentConv];
      addUserMessage(conv.q);
      scrollToBottom();
      currentConv++;
      updateStatus();
      addAIMessage(conv, function() {
        currentConv <= conversations.length && !aborted ? setTimeout(streamNext, 600) : (skipBtn.textContent = '已完成', skipBtn.disabled = true);
      });
    }

    // Auto-start after short delay
    setTimeout(streamNext, 500);
  })();
  </script>
</body>
</html>
