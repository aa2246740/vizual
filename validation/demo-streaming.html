<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI RenderKit — Streaming LLM Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a14;color:#e0e0e0;height:100vh;display:flex;overflow:hidden}

    /* Sidebar */
    .sidebar{width:260px;background:#0d0d1a;border-right:1px solid #1e1e32;display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-header{padding:16px;border-bottom:1px solid #1e1e32;font-weight:700;font-size:14px;color:#a78bfa;display:flex;align-items:center;gap:8px}
    .sidebar-header .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .chat-list{flex:1;overflow-y:auto;padding:8px}
    .chat-item{padding:10px 12px;border-radius:8px;font-size:13px;color:#888;cursor:pointer;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-item.active{background:#1a1a2e;color:#e0e0e0}
    .chat-item:hover{background:#151528}

    /* Main chat area */
    .main{flex:1;display:flex;flex-direction:column;min-width:0}
    .topbar{height:48px;border-bottom:1px solid #1e1e32;display:flex;align-items:center;padding:0 20px;font-size:13px;color:#888;gap:8px}
    .topbar b{color:#e0e0e0}

    .messages{flex:1;overflow-y:auto;padding:20px 0;scroll-behavior:smooth}
    .msg{display:flex;gap:12px;padding:12px 40px;max-width:900px;margin:0 auto;width:100%}
    .msg.user{justify-content:flex-end}
    .msg.user .bubble{background:#2a2a4a;border-radius:16px 16px 4px 16px;padding:10px 16px;font-size:14px;max-width:70%;color:#e0e0e0}
    .msg.ai .avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;color:#fff}
    .msg.ai .bubble{max-width:85%;min-width:0}
    .msg.ai .bubble .text{font-size:14px;line-height:1.6;color:#d1d5db;margin-bottom:8px}

    /* Streaming JSON */
    .json-stream{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:11.5px;line-height:1.5;color:#6b7280;background:#0d0d1a;border:1px solid #1e1e32;border-radius:8px;padding:12px;margin-top:8px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;position:relative}
    .json-stream .cursor{display:inline-block;width:7px;height:14px;background:#7c3aed;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:1px}
    @keyframes blink{50%{opacity:0}}
    .json-key{color:#7c3aed}.json-str{color:#22c55e}.json-num{color:#f59e0b}.json-bool{color:#3b82f6}.json-null{color:#6b7280}

    /* Rendered component */
    .rendered{margin-top:8px;border:1px solid #1e1e32;border-radius:8px;overflow:hidden;background:#111122}
    .rendered-label{font-size:10px;color:#555;padding:4px 8px;background:#0d0d1a;border-bottom:1px solid #1e1e32;display:flex;justify-content:space-between;align-items:center}
    .rendered-label .comp-name{color:#7c3aed;font-weight:600}
    .rendered-label .toggle-json{color:#555;cursor:pointer;font-size:10px;text-decoration:underline}
    .rendered-label .toggle-json:hover{color:#999}
    .rendered-content{padding:12px}

    /* Thinking indicator */
    .thinking{display:flex;gap:4px;padding:4px 0}
    .thinking span{width:6px;height:6px;border-radius:50%;background:#555;animation:dot 1.4s infinite}
    .thinking span:nth-child(2){animation-delay:.2s}
    .thinking span:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,80%,100%{opacity:.3}40%{opacity:1}}

    /* Input bar */
    .inputbar{border-top:1px solid #1e1e32;padding:12px 20px;display:flex;gap:8px;align-items:center}
    .inputbar input{flex:1;background:#151528;border:1px solid #1e1e32;border-radius:8px;padding:10px 14px;color:#e0e0e0;font-size:13px;outline:none}
    .inputbar input::placeholder{color:#444}
    .inputbar button{background:#7c3aed;border:none;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
    .inputbar button:hover{background:#6d28d9}
    .inputbar button:disabled{background:#333;cursor:not-allowed;color:#666}

    /* Progress */
    .progress{position:fixed;top:0;left:0;right:0;height:3px;z-index:100}
    .progress-bar{height:100%;background:linear-gradient(90deg,#7c3aed,#3b82f6);transition:width .3s;width:0}

    /* Status badge */
    .status{position:fixed;bottom:20px;right:20px;background:#111;border:1px solid #1e1e32;border-radius:8px;padding:8px 14px;font-size:11px;color:#888;z-index:100}
    .status .count{color:#22c55e;font-weight:700}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header"><div class="dot"></div> AI RenderKit Demo</div>
    <div class="chat-list">
      <div class="chat-item active" id="chat-item">All 42 Components — Streaming Test</div>
    </div>

        spec: { root:'m', elements:{ m:{ type:'FormBuilder', props:{ title:'用户体验调查', columns:2, fields:[{name:'satisfaction',label:'整体满意度',type:'select',options:['非常满意','满意','一般','不满意'],defaultValue:'满意'},{name:'recommend',label:'是否推荐给朋友',type:'radio',options:['一定会','可能会','不太会'],defaultValue:'一定会'},{name:'features',label:'最喜欢的功能',type:'checkbox',options:['速度','界面','客服','价格'],defaultValue:['速度','界面']},{name:'newsletter',label:'订阅新闻邮件',type:'switch',defaultValue:true},{name:'budget',label:'月度预算（元）',type:'slider',min:0,max:5000,step:100,defaultValue:1500},{name:'favColor',label:'喜欢的主题色',type:'color',defaultValue:'#3b82f6'},{name:'birthday',label:'生日',type:'date',defaultValue:'1995-06-15'},{name:'meeting',label:'下次会议时间',type:'datetime',defaultValue:'2024-08-01T10:00'},{name:'alarm',label:'提醒时间',type:'time',defaultValue:'09:00'},{name:'rating',label:'总体评分',type:'rating',max:5,defaultValue:4},{name:'feedback',label:'改进建议',type:'textarea',placeholder:'请输入您的建议...',description:'选填'},{name:'email',label:'联系邮箱',type:'email',required:true}] }, children:[] }}}},
    ];

    var msgContainer = document.getElementById('messages');
    var progressBar = document.getElementById('progressBar');
    var passCountEl = document.getElementById('passCount');
    var failCountEl = document.getElementById('failCount');
    var skipBtn = document.getElementById('skipBtn');
    var passCount = 0, failCount = 0;
    var currentConv = 0;
    var aborted = false;

    // Skip button: render all remaining instantly
    skipBtn.onclick = function() {
      aborted = true;
      skipBtn.disabled = true;
      skipBtn.textContent = 'Rendering...';
      // Find which conversations haven't been rendered yet by checking DOM
      var renderedNames = new Set();
      document.querySelectorAll('.rendered-label .comp-name').forEach(function(el) {
        renderedNames.add(el.textContent);
      });
      var todo = [];
      conversations.forEach(function(conv, i) {
        var type = conv.spec.elements[conv.spec.root].type;
        if (!renderedNames.has(type)) todo.push(conv);
      });
      passCount = renderedNames.size;
      failCount = 0;
      var idx = 0;
      function doNext() {
        if (idx >= todo.length) {
          updateStatus();
          skipBtn.textContent = 'Done';
          return;
        }
        var conv = todo[idx];
        addMessage('user', conv.q);
        var aiDiv = addAIMessage(conv.intro);
        var bubble = aiDiv.querySelector('.bubble');
        var thinkingEl = bubble.querySelector('.thinking');
        if (thinkingEl) thinkingEl.remove();
        renderComponent(conv.spec, conv.q, function(rendered) {
          if (rendered) {
            bubble.appendChild(rendered);
            passCount++;
          } else {
            failCount++;
            var errDiv = document.createElement('div');
            errDiv.style.cssText = 'color:#ef4444;font-size:12px;padding:8px';
            errDiv.textContent = 'Render failed';
            bubble.appendChild(errDiv);
          }
          updateStatus();
          msgContainer.scrollTop = msgContainer.scrollHeight;
          idx++;
          doNext();
        });
      }
      doNext();
    };

    function addMessage(role, text) {
      var div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'user') {
        div.innerHTML = '<div class="bubble"></div>';
      }
      div.querySelector('.bubble' + (role === 'user' ? '' : '') || role === 'user' ? ' .bubble' : '').textContent = text;
      // Simpler approach
      div.innerHTML = role === 'user'
        ? '<div class="bubble">' + escapeHtml(text) + '</div>'
        : '';
      msgContainer.appendChild(div);
      msgContainer.scrollTop = msgContainer.scrollHeight;
      return div;
    }

    function addAIMessage(intro) {
      var div = document.createElement('div');
      div.className = 'msg ai';
      div.innerHTML = '<div class="avatar">R</div><div class="bubble"><div class="text">' +
        escapeHtml(intro) + '</div><div class="thinking"><span></span><span></span><span></span></div></div>';
      msgContainer.appendChild(div);
      msgContainer.scrollTop = msgContainer.scrollHeight;
      return div;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderComponent(spec, question, callback) {
      try {
        var container = document.createElement('div');
        container.style.cssText = 'width:100%;position:absolute;left:-9999px';
        document.body.appendChild(container);
        Vizual.renderSpec(spec, container);

        // React 18 concurrent mode — poll for rendered content
        var attempts = 0;
        var maxAttempts = 20;
        var pollInterval = setInterval(function() {
          attempts++;
          var html = container.innerHTML;
          // Check for meaningful content: ECharts canvas, SVG, table, text, etc.
          var hasContent = html.length > 20 ||
            html.indexOf('_echarts_instance_') !== -1 ||
            html.indexOf('<canvas') !== -1 ||
            html.indexOf('<svg') !== -1 ||
            html.indexOf('<input') !== -1 ||
            html.indexOf('<table') !== -1;

          if (hasContent || attempts >= maxAttempts) {
            clearInterval(pollInterval);
            document.body.removeChild(container);
            container.style.position = '';
            container.style.left = '';
            finishRender(spec, container, hasContent, callback);
          }
        }, 100);
      } catch(e) {
        console.error('Render error:', e);
        callback(null);
      }
    }

    function finishRender(spec, container, hasContent, callback) {
      if (!hasContent) { callback(null); return; }

      var rootEl = spec.elements[spec.root];
      var compName = rootEl ? rootEl.type : 'Unknown';

      var wrapper = document.createElement('div');
      wrapper.className = 'rendered';

      var label = document.createElement('div');
      label.className = 'rendered-label';
      label.innerHTML = '<span class="comp-name">' + compName + '</span>' +
        '<span class="toggle-json" onclick="this.parentElement.nextElementSibling.style.display=this.parentElement.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">JSON</span>';
      wrapper.appendChild(label);

      var content = document.createElement('div');
      content.className = 'rendered-content';
      content.appendChild(container);
      wrapper.appendChild(content);

      callback(wrapper);
    }

    function streamConversation(idx) {
      if (idx >= conversations.length || aborted) {
        updateStatus();
        skipBtn.textContent = 'Done';
        skipBtn.disabled = true;
        return;
      }

      var conv = conversations[idx];
      progressBar.style.width = ((idx / conversations.length) * 100) + '%';

      // 1. User message
      addMessage('user', conv.q);

      // 2. AI message with thinking
      var aiDiv = addAIMessage(conv.intro);
      var bubble = aiDiv.querySelector('.bubble');
      var textEl = bubble.querySelector('.text');
      var thinkingEl = bubble.querySelector('.thinking');

      // After a brief "thinking" delay, stream the JSON
      setTimeout(function() {
        thinkingEl.remove();

        // Add JSON stream area
        var jsonDiv = document.createElement('div');
        jsonDiv.className = 'json-stream';
        var jsonText = JSON.stringify(conv.spec, null, 2);
        jsonDiv.innerHTML = '<span class="cursor"></span>';
        bubble.appendChild(jsonDiv);

        // Stream characters
        var charIdx = 0;
        var speed = 12; // chars per tick
        var streamInterval = setInterval(function() {
          if (aborted) {
            clearInterval(streamInterval);
            return;
          }
          var chunk = jsonText.substring(charIdx, charIdx + speed);
          charIdx += speed;

          // Remove cursor, add text + cursor
          var cursor = jsonDiv.querySelector('.cursor');
          if (cursor) cursor.remove();

          if (charIdx >= jsonText.length) {
            clearInterval(streamInterval);
            // Done streaming — render component (async, waits for React)
            jsonDiv.innerHTML = syntaxHighlight(jsonText);
            renderComponent(conv.spec, conv.q, function(rendered) {
              if (rendered) {
                bubble.appendChild(rendered);
                passCount++;
              } else {
                failCount++;
                var errDiv = document.createElement('div');
                errDiv.style.cssText = 'color:#ef4444;font-size:12px;padding:8px';
                errDiv.textContent = 'Render failed';
                bubble.appendChild(errDiv);
              }
              updateStatus();
              msgContainer.scrollTop = msgContainer.scrollHeight;
              currentConv = idx + 1;
              setTimeout(function() { streamConversation(idx + 1); }, 800);
            });
          } else {
            jsonDiv.innerHTML = syntaxHighlight(jsonText.substring(0, charIdx)) + '<span class="cursor"></span>';
          }
          msgContainer.scrollTop = msgContainer.scrollHeight;
        }, 30);
      }, 600 + Math.random() * 400);
    }

    function syntaxHighlight(json) {
      return escapeHtml(json)
        .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
        .replace(/: "([^"]*)"/g, ': <span class="json-str">"$1"</span>')
        .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
        .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
        .replace(/: (null)/g, ': <span class="json-null">$1</span>');
    }

    function updateStatus() {
      passCountEl.textContent = passCount;
      failCountEl.textContent = failCount;
      progressBar.style.width = '100%';
    }

    // Start!
    streamConversation(0);
  })();
  </script>
