<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vizual Native Core Chat Test</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    main { max-width: 1160px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    p { color: #475569; }
    .shell { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; align-items: start; }
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
    .hint { margin: 8px 0 0; font-size: 13px; color: #64748b; }
    .error { display: none; margin-top: 10px; padding: 10px 12px; border: 1px solid #fecaca; border-radius: 8px; background: #fef2f2; color: #991b1b; font-size: 13px; }
    button { border: 1px solid #cbd5e1; background: #fff; border-radius: 6px; padding: 8px 10px; cursor: pointer; }
    button.primary { background: #0f766e; border-color: #0f766e; color: #fff; }
    textarea { width: 100%; min-height: 120px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .message { border-top: 1px solid #e2e8f0; padding-top: 16px; margin-top: 16px; }
    .viz-wrap { margin-top: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; border-radius: 8px; padding: 12px; font-size: 12px; max-height: 520px; overflow: auto; }
    @media (max-width: 900px) { .shell { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>Vizual Native Core Chat Test</h1>
    <p>Current native core host page for visible rendering, artifact capture, and action log checks.</p>

    <div class="shell">
      <section class="panel">
        <label for="raw">Paste a flat Vizual JSON spec or use a sample:</label>
        <p class="hint">This page tests native core rendering only. It does not call an Agent or LLM; natural-language testing should use DeerFlow or another Agent host.</p>
        <textarea id="raw"></textarea>
        <div id="renderError" class="error"></div>
        <div class="toolbar">
          <button class="primary" id="renderBtn">Render</button>
          <button id="sampleDashboard">Sample: dashboard</button>
          <button id="sampleForm">Sample: form</button>
          <button id="samplePlanning">Sample: planning</button>
        </div>
        <div id="messages"></div>
      </section>

      <aside class="panel">
        <h2>Debug</h2>
        <pre id="debug">{}</pre>
      </aside>
    </div>
  </main>

  <script src="../dist/vizual.standalone.js"></script>
  <script>
    const state = {
      artifacts: {},
      renders: [],
      actions: [],
      pendingMessage: '',
    };

    const samples = {
      dashboard: {
        root: 'root',
        elements: {
          root: { type: 'Column', props: { gap: 16 }, children: ['note', 'kpis', 'chart', 'table'] },
          note: { type: 'Markdown', props: { content: '### 利润下降诊断\n销量和营收增长，但成本率和投放拉高，利润被压缩。' }, children: [] },
          kpis: { type: 'KpiDashboard', props: { type: 'kpi_dashboard', title: '关键指标', metrics: [{ label: '销量', value: '+162.5%', trend: 'up' }, { label: '利润', value: '-4.2%', trend: 'down' }] }, children: [] },
          chart: { type: 'ComboChart', props: { type: 'combo', title: '营收、成本、利润', x: 'month', data: [{ month: '1月', revenue: 6400, cost: 4000, profit: 2400 }, { month: '6月', revenue: 16800, cost: 14500, profit: 2300 }], series: [{ type: 'bar', y: 'revenue', name: '营收' }, { type: 'bar', y: 'cost', name: '成本' }, { type: 'line', y: 'profit', name: '利润' }] }, children: [] },
          table: { type: 'DataTable', props: { type: 'table', title: '月度明细', data: [{ month: '1月', revenue: 6400, cost: 4000, profit: 2400 }, { month: '6月', revenue: 16800, cost: 14500, profit: 2300 }], columns: [{ key: 'month', label: '月份' }, { key: 'revenue', label: '营收' }, { key: 'cost', label: '成本' }, { key: 'profit', label: '利润' }] }, children: [] },
        },
      },
      form: {
        root: 'root',
        elements: {
          root: { type: 'Column', props: { gap: 16 }, children: ['note', 'form'] },
          note: { type: 'Markdown', props: { content: '### 结构化输入\n提交后 host 记录 action，是否继续处理由 Agent 决定。' }, children: [] },
          form: { type: 'FormBuilder', props: { type: 'form_builder', title: '下一步分析', submitLabel: '提交给 Agent', fields: [{ name: 'focus', type: 'select', label: '方向', options: ['渠道', '成本', '营销'] }, { name: 'note', type: 'textarea', label: '备注' }] }, children: [] },
        },
      },
      planning: {
        root: 'root',
        elements: {
          root: { type: 'Column', props: { gap: 16 }, children: ['timeline', 'gantt', 'org'] },
          timeline: { type: 'Timeline', props: { type: 'timeline', title: '关键节点', items: [{ date: '2026-06-01', title: '需求对齐' }, { date: '2026-06-05', title: '回归验收' }] }, children: [] },
          gantt: { type: 'GanttChart', props: { type: 'gantt', title: '计划', tasks: [{ id: 'a', name: '清 core', start: '2026-06-01', end: '2026-06-03', progress: 100 }, { id: 'b', name: '浏览器验收', start: '2026-06-04', end: '2026-06-05', progress: 60 }] }, children: [] },
          org: { type: 'OrgChart', props: { type: 'org_chart', title: '责任', nodes: [{ id: 'agent', name: 'Agent' }, { id: 'host', name: 'Host', parentId: 'agent' }] }, children: [] },
        },
      },
    };

    function updateDebug() {
      document.getElementById('debug').textContent = JSON.stringify({
        artifactIds: Object.keys(state.artifacts),
        renders: state.renders,
        actions: state.actions,
        pendingMessage: state.pendingMessage,
      }, null, 2);
    }

    function appendMessage(text) {
      const id = 'msg-' + Date.now().toString(36);
      const msg = document.createElement('div');
      msg.className = 'message';
      msg.id = id;
      const answer = document.createElement('div');
      answer.textContent = text || 'Vizual surface';
      const wrap = document.createElement('div');
      wrap.className = 'viz-wrap';
      wrap.id = id + '-viz';
      msg.append(answer, wrap);
      document.getElementById('messages').prepend(msg);
      return { id, wrap };
    }

    function renderVizInMsg(id, spec, options = {}) {
      if (!window.Vizual) throw new Error('dist/vizual.standalone.js not loaded. Run npm run build first.');
      const container = document.getElementById(id) || document.getElementById(id + '-viz');
      if (!container) throw new Error('container not found: ' + id);
      window.Vizual.renderSpec(spec, container);
      const artifactId = options.artifactId || 'artifact-' + Date.now().toString(36);
      state.artifacts[artifactId] = { id: artifactId, spec, createdAt: new Date().toISOString() };
      state.renders.push({ id, artifactId, at: new Date().toISOString(), status: 'success' });
      updateDebug();
      return state.artifacts[artifactId];
    }

    function showRenderError(message) {
      const error = document.getElementById('renderError');
      error.textContent = message;
      error.style.display = message ? 'block' : 'none';
    }

    function renderRaw() {
      const raw = document.getElementById('raw').value.trim();
      let spec;
      try {
        spec = JSON.parse(raw);
      } catch (error) {
        showRenderError('This page accepts Vizual JSON spec only. It does not send natural language to an Agent. JSON parse error: ' + error.message);
        return;
      }
      showRenderError('');
      const { id, wrap } = appendMessage('Rendered pasted spec');
      renderVizInMsg(wrap.id, spec, { artifactId: id });
    }

    function loadSample(name) {
      document.getElementById('raw').value = JSON.stringify(samples[name], null, 2);
      renderRaw();
    }

    window.renderVizInMsg = renderVizInMsg;
    window.getVizualDebugState = () => JSON.parse(JSON.stringify(state));
    window.recordVizualAction = (action, payload) => {
      state.actions.push({ action, payload, at: new Date().toISOString() });
      updateDebug();
    };
    window.getPendingMessage = () => state.pendingMessage;
    window.setPendingMessage = (value) => {
      state.pendingMessage = String(value || '');
      updateDebug();
    };

    document.getElementById('renderBtn').addEventListener('click', renderRaw);
    document.getElementById('sampleDashboard').addEventListener('click', () => loadSample('dashboard'));
    document.getElementById('sampleForm').addEventListener('click', () => loadSample('form'));
    document.getElementById('samplePlanning').addEventListener('click', () => loadSample('planning'));

    document.getElementById('raw').value = JSON.stringify(samples.dashboard, null, 2);
    updateDebug();
  </script>
</body>
</html>
