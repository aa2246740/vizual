<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizual DESIGN.md Theme Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--rk-bg-primary, #ffffff);
      color: var(--rk-text-primary, #111827);
      font-family: var(--rk-font-body, var(--rk-font-sans, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif));
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      background: var(--rk-bg-primary, #ffffff);
      border-bottom: 1px solid var(--rk-border-subtle, #e5e7eb);
    }
    h1 {
      margin: 0;
      font-family: var(--rk-font-display, var(--rk-font-sans));
      font-size: 22px;
      letter-spacing: 0;
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      padding: 20px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .panel {
      min-width: 0;
      background: var(--rk-bg-secondary, #f8fafc);
      border: 1px solid var(--rk-border-subtle, #e5e7eb);
      border-radius: var(--rk-radius-lg, 12px);
      box-shadow: var(--rk-shadow, none);
      padding: 16px;
    }
    #viz { min-height: 520px; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 190px;
      justify-content: center;
      padding: 8px 14px;
      border-radius: var(--rk-radius-md, 8px);
      border: 1px solid var(--rk-border-subtle, #e5e7eb);
      background: var(--rk-bg-secondary, #f8fafc);
      color: var(--rk-text-primary, #111827);
      font-family: var(--rk-font-ui, var(--rk-font-sans));
      font-weight: 700;
      white-space: nowrap;
    }
    .status-badge[data-status="pass"] {
      border-color: var(--rk-accent, #c8152d);
      color: var(--rk-accent, #c8152d);
    }
    .status-badge[data-status="fail"] {
      border-color: var(--rk-error, #dc2626);
      color: var(--rk-error, #dc2626);
    }
    .swatches {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .swatch {
      min-height: 76px;
      border-radius: var(--rk-radius-md, 8px);
      padding: 10px;
      border: 1px solid var(--rk-border-subtle, #e5e7eb);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      font-size: 12px;
      overflow: hidden;
    }
    .swatch strong { font-size: 13px; }
    .font-demo {
      display: grid;
      gap: 10px;
      margin: 16px 0;
      padding: 12px;
      border: 1px solid var(--rk-border-subtle, #e5e7eb);
      border-radius: var(--rk-radius-md, 8px);
      background: var(--rk-bg-primary, #ffffff);
    }
    .font-demo div {
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rk-border-subtle, #e5e7eb);
    }
    .font-demo div:last-child { border-bottom: 0; padding-bottom: 0; }
    .font-display {
      font-family: var(--rk-font-display, var(--rk-font-sans));
      font-size: 28px;
      line-height: 1.05;
      font-weight: 700;
    }
    .font-body {
      font-family: var(--rk-font-body, var(--rk-font-sans));
      font-size: 15px;
      line-height: 1.45;
    }
    .font-ui {
      font-family: var(--rk-font-ui, var(--rk-font-sans));
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .font-mono {
      font-family: var(--rk-font-mono, monospace);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    pre {
      margin: 0;
      padding: 12px;
      max-height: 380px;
      overflow: auto;
      border-radius: var(--rk-radius-md, 8px);
      background: var(--rk-bg-tertiary, #f1f5f9);
      color: var(--rk-text-primary, #111827);
      font-family: var(--rk-font-mono, "SF Mono", Consolas, monospace);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>DESIGN.md 主题导入验证</h1>
    <div id="status" class="status-badge">加载中</div>
  </header>
  <main>
    <section class="panel">
      <div id="viz"></div>
    </section>
    <aside class="panel">
      <h2 style="margin-top:0;font-size:16px;">解析结果</h2>
      <div class="swatches">
        <div class="swatch" style="background:var(--rk-accent);color:white;">
          <strong>Accent</strong>
          <span id="accent"></span>
        </div>
        <div class="swatch" style="background:var(--rk-bg-primary);color:var(--rk-text-primary);">
          <strong>Background</strong>
          <span id="bg"></span>
        </div>
        <div class="swatch" style="background:var(--rk-text-primary);color:var(--rk-bg-primary);">
          <strong>Text</strong>
          <span id="text"></span>
        </div>
        <div class="swatch" style="background:var(--rk-chart-1);color:white;">
          <strong>Chart 1</strong>
          <span id="chart"></span>
        </div>
      </div>
      <div class="font-demo">
        <div class="font-display" id="font-display-sample">Display headline sample</div>
        <div class="font-body" id="font-body-sample">Body copy sample uses the document reading face or a practical fallback.</div>
        <div class="font-ui" id="font-ui-sample">UI LABEL SAMPLE</div>
        <div class="font-mono" id="font-mono-sample">mono kicker sample</div>
      </div>
      <pre id="debug"></pre>
    </aside>
  </main>

  <script>
    const cmbDesignMd = `
Design System: China Merchants Bank

1. Visual Theme & Atmosphere
China Merchants Bank uses CMB Red (Pantone 193 / #c8152d) and CMB Black as core visual elements.
Pure white canvas with CMB Red (Pantone 193 / #c8152d) as the primary brand color.
The typography uses Founder Lanting Hei (方正兰亭黑) and Arial for English text.

2. Color Palette & Roles
Primary Brand Colors
- CMB Red (#c8152d / Pantone 193): Primary brand color, CTA buttons, active states, brand accent
- CMB Black (#000000 / Pantone Black): Primary text color, official communications

Gray Scale
- CMB Black (K100): Primary text
- Dark Gray (K80): Strong emphasis
- Medium Gray (K60): Secondary text
- Light Gray (K30): Subtle text
- Very Light Gray (K20): Hints
- CMB White (K0): White space

3. Typography Rules
Chinese Font Family
- Primary: Founder Lanting Hei (方正兰亭黑) — never substitute with other fonts
English Font Family
- Primary: Arial — never substitute with other fonts
`;

    const wiredDesignMd = `
# Design System Inspired by WIRED

## 1. Visual Theme & Atmosphere
There is exactly one accent color that matters: a saturated link blue (\`#057dbc\`) that lights up underlined hover states.
Everything else is black, paper white, and two grays. Strictly square corners on every image, container, and ribbon.

## 2. Color Palette & Roles
### Primary (Editorial Ink)
- **WIRED Black** (\`#000000\`): Pure ink for ribbons, section dividers, button borders, headline rules.
- **Page Ink** (\`#1a1a1a\`): Near-black used for headlines and body type.
- **Paper White** (\`#ffffff\`): Default canvas for the entire site.

### Secondary (Editorial Voice)
- **Link Blue** (\`#057dbc\`): The single brand accent. Used for inline link hovers and breadcrumbs.

### Neutrals & Text
- **Caption Gray** (\`#757575\`): Secondary metadata: bylines, timestamps, photo credits.
- **Disabled Gray** (\`#999999\`): Inactive links, low-priority labels.
- **Hairline Border** (\`#e2e8f0\`): Subtle separators only.

## 3. Typography Rules
### Font Family
- **WiredDisplay** (custom serif, fallback \`helvetica\`) — Display headlines and feature titles.
- **BreveText** (humanist serif, fallback \`helvetica\`) — Article body, decks, longer captions.
- **Apercu** (geometric sans, fallback \`helvetica\`) — UI labels, buttons, navigation.
- **WiredMono** (custom monospace, fallback \`helvetica\`) — Eyebrows, kickers, timestamps.
- **Inter** (sans, system fallback) — Utility UI in newer modules.

## 5. Layout Principles
### Border Radius Scale
- \`0\` — every container, every image, every button, every input. The default.
- \`1920px\` — only inside text spans that need to look like a full pill.
- \`50%\` — only on round icon buttons and circular author avatars.

## 6. Depth & Elevation
WIRED's depth philosophy is flat by religion. There are no shadows and no box-shadow on story tiles, headers, modals, or cards.
`;

    const profiles = {
      cmb: {
        title: 'CMB DESIGN.md Theme',
        pageTitle: 'DESIGN.md 主题导入验证：CMB',
        markdown: cmbDesignMd,
        expected: {
          accent: '#c8152d',
          background: '#ffffff',
          text: '#000000',
          chart1: '#c8152d',
          radiusMd: '8px',
          fontDisplayIncludes: 'Founder Lanting Hei',
        },
        kpis: [
          { label: 'Accent', value: '#c8152d', trendValue: '+ applied', trend: 'up' },
          { label: 'Mode', value: 'Light', trendValue: 'white canvas', trend: 'flat' },
          { label: 'Font', value: 'Lanting Hei', trendValue: 'Arial fallback', trend: 'flat' },
        ],
      },
      wired: {
        title: 'WIRED DESIGN.md Theme',
        pageTitle: 'DESIGN.md 主题导入验证：WIRED',
        markdown: wiredDesignMd,
        expected: {
          accent: '#057dbc',
          background: '#ffffff',
          text: '#000000',
          chart1: '#057dbc',
          radiusMd: '0px',
          fontDisplayIncludes: 'Georgia',
          shadow: 'none',
        },
        kpis: [
          { label: 'Accent', value: '#057dbc', trendValue: '+ link blue', trend: 'up' },
          { label: 'Mode', value: 'Light', trendValue: 'paper white', trend: 'flat' },
          { label: 'Radius', value: '0px', trendValue: 'square corners', trend: 'flat' },
        ],
      },
    };

    const params = new URLSearchParams(location.search);
    const selectedProfile = params.get('theme') === 'wired' || params.has('wired') ? 'wired' : 'cmb';
    const profile = profiles[selectedProfile];

    const spec = {
      root: 'dashboard',
      elements: {
        dashboard: {
          type: 'GridLayout',
          props: {
            columns: 2,
            gap: 16,
          },
          children: ['kpi', 'bar', 'table'],
        },
        kpi: {
          type: 'KpiDashboard',
          props: {
            type: 'kpi_dashboard',
            title: profile.title,
            columns: 1,
            metrics: profile.kpis,
          },
          children: [],
        },
        bar: {
          type: 'BarChart',
          props: {
            type: 'bar',
            title: selectedProfile === 'wired' ? 'Link Blue 驱动的图表调色板' : '品牌色驱动的图表调色板',
            x: 'day',
            y: 'value',
            data: [
              { day: 'D1', value: 120 },
              { day: 'D2', value: 156 },
              { day: 'D3', value: 188 },
              { day: 'D4', value: 210 },
              { day: 'D5', value: 238 },
            ],
            height: 300,
          },
          children: [],
        },
        table: {
          type: 'DataTable',
          props: {
            type: 'table',
            title: '主题 token 验证',
            columns: [
              { key: 'token', label: 'Token' },
              { key: 'expected', label: 'Expected' },
              { key: 'actual', label: 'Actual' },
            ],
            data: [
              { token: '--rk-accent', expected: profile.expected.accent, actual: 'see panel' },
              { token: '--rk-bg-primary', expected: profile.expected.background, actual: 'see panel' },
              { token: '--rk-text-primary', expected: profile.expected.text, actual: 'see panel' },
              { token: '--rk-radius-md', expected: profile.expected.radiusMd, actual: 'see panel' },
              { token: '--rk-shadow', expected: profile.expected.shadow || 'theme default', actual: 'see panel' },
            ],
          },
          children: [],
        },
      },
    };

    function cssVar(name) {
      return getComputedStyle(document.body).getPropertyValue(name).trim();
    }

    function init() {
      document.querySelector('h1').textContent = profile.pageTitle;
      const theme = window.Vizual.loadDesignMd(profile.markdown, { name: selectedProfile + '-design-md-browser', apply: true });
      window.Vizual.renderSpec(spec, document.getElementById('viz'));

      const result = {
        name: theme.name,
        mode: theme.mode,
        accent: cssVar('--rk-accent'),
        background: cssVar('--rk-bg-primary'),
        text: cssVar('--rk-text-primary'),
        chart1: cssVar('--rk-chart-1'),
        radiusMd: cssVar('--rk-radius-md'),
        font: cssVar('--rk-font-sans'),
        fontDisplay: cssVar('--rk-font-display'),
        fontBody: cssVar('--rk-font-body'),
        fontUi: cssVar('--rk-font-ui'),
        fontMono: cssVar('--rk-font-mono'),
        shadow: cssVar('--rk-shadow'),
        report: theme._mappingReport,
      };
      document.getElementById('accent').textContent = result.accent;
      document.getElementById('bg').textContent = result.background;
      document.getElementById('text').textContent = result.text;
      document.getElementById('chart').textContent = result.chart1;
      document.getElementById('debug').textContent = JSON.stringify(result, null, 2);

      const ok = result.mode === 'light'
        && result.accent.toLowerCase() === profile.expected.accent
        && result.background.toLowerCase() === profile.expected.background
        && result.text.toLowerCase() === profile.expected.text
        && result.chart1.toLowerCase() === profile.expected.chart1
        && result.radiusMd.toLowerCase() === profile.expected.radiusMd
        && result.fontDisplay.includes(profile.expected.fontDisplayIncludes)
        && (!profile.expected.shadow || result.shadow.toLowerCase() === profile.expected.shadow);

      document.getElementById('status').textContent = ok ? `PASS：${selectedProfile.toUpperCase()} 主题已应用` : 'FAIL：主题映射不完整';
      document.getElementById('status').dataset.status = ok ? 'pass' : 'fail';
      if (!ok) throw new Error('DESIGN.md theme mapping failed');
    }

    fetch('/dist/vizual.standalone.js?_t=' + Date.now()).then(r => r.text()).then(code => {
      (0, eval)(code);
      init();
    }).catch(error => {
      document.getElementById('status').textContent = 'FAIL：' + error.message;
      document.getElementById('debug').textContent = error.stack || error.message;
    });
  </script>
</body>
</html>
