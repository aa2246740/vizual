    .header-actions {
      display: flex;

      gap: 12px;

      justify-content: flex-end;

    .theme-switch {

      gap: 6px;

      border: 1px solid var(--rk-border-subtle, #e5e7eb);

      font-weight: 700;

      background: var(--rk-bg-primary, #ffffff);
      color: var(--rk-accent, #c8152d);

    main {

      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      padding: 20px;
      max-width: 1280px;
      margin: 0 auto;

    .panel {

      gap: 8px;

      justify-content: center;
      padding: 8px 14px;
      border-radius: var(--rk-radius-md, 8px);
      border: 1px solid var(--rk-border-subtle, #e5e7eb);
      background: var(--rk-bg-secondary, #f8fafc);
      color: var(--rk-text-primary, #111827);
      font-family: var(--rk-font-ui, var(--rk-font-sans));
      font-weight: 700;
      white-space: nowrap;

      color: var(--rk-accent, #c8152d);
    }
    .status-badge[data-status="fail"] {
      border-color: var(--rk-error, #dc2626);
      color: var(--rk-error, #dc2626);
    }
    .swatches {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .swatch {
      min-height: 76px;
      border-radius: var(--rk-radius-md, 8px);
      padding: 10px;
      border: 1px solid var(--rk-border-subtle, #e5e7eb);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      font-size: 12px;
      overflow: hidden;

    .swatch strong { font-size: 13px; }
    .font-demo {
      display: grid;
      gap: 10px;
      margin: 16px 0;
      padding: 12px;

    const cmbDesignMd = `
Design System: China Merchants Bank

1. Visual Theme & Atmosphere
China Merchants Bank uses CMB Red (Pantone 193 / #c8152d) and CMB Black as core visual elements.
Pure white canvas with CMB Red (Pantone 193 / #c8152d) as the primary brand color.
The typography uses Founder Lanting Hei (方正兰亭黑) and Arial for English text.

2. Color Palette & Roles
Primary Brand Colors
- CMB Red (#c8152d / Pantone 193): Primary brand color, CTA buttons, active states, brand accent
- CMB Black (#000000 / Pantone Black): Primary text color, official communications

Gray Scale
- CMB Black (K100): Primary text
- Dark Gray (K80): Strong emphasis
- Medium Gray (K60): Secondary text
- Light Gray (K30): Subtle text

- CMB White (K0): White space

Chinese Font Family

English Font Family
- Primary: Arial — never substitute with other fonts
`;

    const wiredDesignMd = `
# Design System Inspired by WIRED

## 1. Visual Theme & Atmosphere
There is exactly one accent color that matters: a saturated link blue (\`#057dbc\`) that lights up underlined hover states.
Everything else is black, paper white, and two grays. Strictly square corners on every image, container, and ribbon.

## 2. Color Palette & Roles
### Primary (Editorial Ink)
- **WIRED Black** (\`#000000\`): Pure ink for ribbons, section dividers, button borders, headline rules.
- **Page Ink** (\`#1a1a1a\`): Near-black used for headlines and body type.
- **Paper White** (\`#ffffff\`): Default canvas for the entire site.

### Secondary (Editorial Voice)
- **Link Blue** (\`#057dbc\`): The single brand accent. Used for inline link hovers and breadcrumbs.

### Neutrals & Text
- **Caption Gray** (\`#757575\`): Secondary metadata: bylines, timestamps, photo credits.
- **Disabled Gray** (\`#999999\`): Inactive links, low-priority labels.
- **Hairline Border** (\`#e2e8f0\`): Subtle separators only.

## 3. Typography Rules
### Font Family
- **WiredDisplay** (custom serif, fallback \`helvetica\`) — Display headlines and feature titles.
- **BreveText** (humanist serif, fallback \`helvetica\`) — Article body, decks, longer captions.
- **Apercu** (geometric sans, fallback \`helvetica\`) — UI labels, buttons, navigation.
- **WiredMono** (custom monospace, fallback \`helvetica\`) — Eyebrows, kickers, timestamps.
- **Inter** (sans, system fallback) — Utility UI in newer modules.

## 5. Layout Principles
### Border Radius Scale
- \`0\` — every container, every image, every button, every input. The default.
- \`1920px\` — only inside text spans that need to look like a full pill.
- \`50%\` — only on round icon buttons and circular author avatars.

## 6. Depth & Elevation
WIRED's depth philosophy is flat by religion. There are no shadows and no box-shadow on story tiles, headers, modals, or cards.
`;

    const starbucksDesignMd = `
# Design System Inspired by Starbucks

## 1. Visual Theme & Atmosphere
Starbucks' design system is a warm, confident retail flagship. The canvas alternates between Neutral Warm (\`#f2f0eb\`) and Ceramic (\`#edebe9\`), while Starbucks Green (\`#006241\`) anchors headings, Green Accent (\`#00754A\`) drives CTAs, and House Green (\`#1E3932\`) carries feature bands and footer surfaces.
Typography uses proprietary SoDoSans, with Rewards serif "Lander Tall" and Careers script "Kalam" in localized contexts.

## 2. Color Palette & Roles
- **Starbucks Green** (\`#006241\`): Historic brand green used on h1 headings and brand moments.
- **Green Accent** (\`#00754A\`): Primary filled-CTA color and floating Frap circular button fill.
- **House Green** (\`#1E3932\`): Footer surface, feature-band backgrounds, reward-status dark surfaces.
- **Green Uplift** (\`#2b5148\`): Secondary mid-dark green used sparingly.
- **Green Light** (\`#d4e9e2\`): Pale mint wash used for valid form states.
- **Gold** (\`#cba258\`): Rewards-status ceremony only.
- **Neutral Warm** (\`#f2f0eb\`): Primary page canvas.
- **Ceramic** (\`#edebe9\`): Soft page-section wash and separators.
- **White** (\`#ffffff\`): Primary card and modal surface.
- **Black** (\`#000000\`): High-contrast top-nav sign-in buttons.
- **Text Black** (\`rgba(0, 0, 0, 0.87)\`): Primary heading and body text.
- **Text Black Soft** (\`rgba(0, 0, 0, 0.58)\`): Secondary and metadata text.
- **Text White** (\`rgba(255, 255, 255, 1)\`): Text on dark green surfaces.
- **Text White Soft** (\`rgba(255, 255, 255, 0.70)\`): Secondary text on dark green surfaces.
- **Red** (\`#c82014\`): Error and destructive state.
- **Yellow** (\`#fbbc05\`): Warning state.

## 3. Typography Rules
- **Primary:** \`SoDoSans, "Helvetica Neue", Helvetica, Arial, sans-serif\`
- **Rewards Serif:** \`"Lander Tall", "Iowan Old Style", Georgia, serif\`
- **Careers Script:** \`"Kalam", "Comic Sans MS", cursive\`

## 5. Layout Principles
### Border Radius Scale
- \`12px\` | Cards, modals, menu-item tiles.
- \`50px\` | All buttons — full-pill radius.

## 6. Depth & Elevation
Card shadow: \`0 0 0.5px rgba(0,0,0,0.14), 0 1px 1px rgba(0,0,0,0.24)\`.
Whisper-soft, layered over solid surfaces.
`;

            props: {
              type: 'bar',
              title: profileName === 'wired' ? 'Link Blue 驱动的图表调色板' : '品牌色驱动的图表调色板',
              x: 'day',
              y: 'value',
              data: [
                { day: 'D1', value: 120 },
                { day: 'D2', value: 156 },
                { day: 'D3', value: 188 },
                { day: 'D4', value: 210 },
                { day: 'D5', value: 238 },
              ],
              height: 300,
            },
            children: [],
          },
          table: {
            type: 'DataTable',
            props: {
              type: 'table',
              title: '主题 token 验证',
              columns: [
                { key: 'token', label: 'Token' },
                { key: 'expected', label: 'Expected' },
                { key: 'actual', label: 'Actual' },
              ],
              data: [
                { token: '--rk-accent', expected: activeProfile.expected.accent, actual: 'see panel' },
                { token: '--rk-bg-primary', expected: activeProfile.expected.background, actual: 'see panel' },
                { token: '--rk-text-primary', expected: activeProfile.expected.text, actual: 'see panel' },
                { token: '--rk-radius-md', expected: activeProfile.expected.radiusMd, actual: 'see panel' },
                { token: '--rk-radius-pill', expected: activeProfile.expected.radiusPill || 'theme default', actual: 'see panel' },
                { token: '--rk-shadow', expected: activeProfile.expected.shadow || 'theme default', actual: 'see panel' },
              ],
            },
            children: [],
          },
        },
      };
    }

    function cssVar(name) {
      return getComputedStyle(document.body).getPropertyValue(name).trim();
    }

    function updateUrl(profileName) {
      const url = new URL(location.href);
      url.searchParams.delete('wired');
      url.searchParams.set('theme', profileName);
      history.replaceState(null, '', url);
    }

    function setActiveThemeButton(profileName) {
      document.querySelectorAll('[data-theme-option]').forEach(button => {
        button.setAttribute('aria-pressed', button.dataset.themeOption === profileName ? 'true' : 'false');
      });
    }

    function renderProfile(profileName, options = {}) {
      selectedProfile = profileName;
      profile = profiles[selectedProfile];
      document.body.dataset.profile = selectedProfile;
      document.querySelector('h1').textContent = profile.pageTitle;
      document.getElementById('font-display-sample').textContent = selectedProfile === 'starbucks' ? 'Warm retail headline sample' : 'Display headline sample';
      document.getElementById('font-body-sample').textContent = selectedProfile === 'starbucks'
        ? 'Body copy sits on a warm cream canvas with tight SoDoSans tracking.'
        : 'Body copy sample uses the document reading face or a practical fallback.';
      document.getElementById('font-ui-sample').textContent = selectedProfile === 'starbucks' ? 'Pill button label sample' : 'UI LABEL SAMPLE';
      document.getElementById('font-mono-sample').textContent = selectedProfile === 'starbucks' ? 'Kalam cup-name touch' : 'mono kicker sample';
      setActiveThemeButton(selectedProfile);

      const theme = window.Vizual.loadDesignMd(profile.markdown, { name: selectedProfile + '-design-md-browser', apply: true });
      window.Vizual.renderSpec(buildSpec(selectedProfile), document.getElementById('viz'));

      const result = {
        name: theme.name,
        mode: theme.mode,
        accent: cssVar('--rk-accent'),
        background: cssVar('--rk-bg-primary'),
        text: cssVar('--rk-text-primary'),
        chart1: cssVar('--rk-chart-1'),
        radiusMd: cssVar('--rk-radius-md'),
        radiusPill: cssVar('--rk-radius-pill'),
        font: cssVar('--rk-font-sans'),
        fontDisplay: cssVar('--rk-font-display'),
        fontBody: cssVar('--rk-font-body'),
        fontUi: cssVar('--rk-font-ui'),
        fontMono: cssVar('--rk-font-mono'),
        shadow: cssVar('--rk-shadow'),
        report: theme._mappingReport,
      };
      document.getElementById('accent').textContent = result.accent;
      document.getElementById('bg').textContent = result.background;
      document.getElementById('text').textContent = result.text;
      document.getElementById('chart').textContent = result.chart1;
      document.getElementById('debug').textContent = JSON.stringify(result, null, 2);

      const ok = result.mode === 'light'
        && result.accent.toLowerCase() === profile.expected.accent.toLowerCase()
        && result.background.toLowerCase() === profile.expected.background.toLowerCase()
        && result.text.toLowerCase() === profile.expected.text.toLowerCase()
        && result.chart1.toLowerCase() === profile.expected.chart1.toLowerCase()
        && result.radiusMd.toLowerCase() === profile.expected.radiusMd.toLowerCase()
        && (!profile.expected.radiusPill || result.radiusPill.toLowerCase() === profile.expected.radiusPill.toLowerCase())
        && result.fontDisplay.includes(profile.expected.fontDisplayIncludes)
        && (!profile.expected.shadow || result.shadow.toLowerCase() === profile.expected.shadow.toLowerCase());

      document.getElementById('status').textContent = ok ? `PASS：${selectedProfile.toUpperCase()} 主题已应用` : 'FAIL：主题映射不完整';
      document.getElementById('status').dataset.status = ok ? 'pass' : 'fail';
      if (!ok) throw new Error('DESIGN.md theme mapping failed');
      if (options.updateUrl !== false) updateUrl(selectedProfile);
    }

    function init() {
      document.querySelectorAll('[data-theme-option]').forEach(button => {
        button.addEventListener('click', () => {
          const nextProfile = button.dataset.themeOption;
          if (!nextProfile || nextProfile === selectedProfile) return;
          renderProfile(nextProfile);
        });
      });
      renderProfile(selectedProfile, { updateUrl: false });
    }

    function standaloneUrl() {
      const cacheBust = '_t=' + Date.now();
      if (location.protocol === 'file:') {
        return new URL('../dist/vizual.standalone.js?' + cacheBust, location.href).href;
      }
      return '/dist/vizual.standalone.js?' + cacheBust;
    }

    function loadStandalone() {
      if (window.Vizual) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = standaloneUrl();
        script.onload = resolve;
        script.onerror = () => reject(new Error('Failed to load ' + script.src));
        document.head.appendChild(script);
      });
    }

    loadStandalone().then(init).catch(error => {
      document.getElementById('status').textContent = 'FAIL：' + error.message;
      document.getElementById('debug').textContent = error.stack || error.message;
    });
  </script>
</body>
</html>
