<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizual vNext Cold Start Eval</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      padding: 24px;
    }
    h1 { margin: 0 0 12px; font-size: 20px; }
    #status { margin-bottom: 16px; color: #94a3b8; }
    #status.pass { color: #22c55e; }
    #status.fail { color: #ef4444; }
    #renderTarget {
      min-height: 320px;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px;
      background: #0d1017;
    }
    pre {
      white-space: pre-wrap;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #2d3148;
      border-radius: 10px;
      background: #111827;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Vizual vNext Cold Start Eval</h1>
  <div id="status">运行中...</div>
  <div id="renderTarget"></div>
  <pre id="debug"></pre>

  <script src="../dist/vizual.standalone.js"></script>
  <script>
    const rows = [
      { day: 'D1', region: '华东', new_user: 120, active_user: 300, revenue: 900 },
      { day: 'D2', region: '华北', new_user: 150, active_user: 320, revenue: 1000 },
      { day: 'D3', region: '华东', new_user: 180, active_user: 350, revenue: 1150 },
      { day: 'D4', region: '华南', new_user: 200, active_user: 370, revenue: 1300 },
      { day: 'D5', region: '华东', new_user: 220, active_user: 400, revenue: 1500 },
      { day: 'D6', region: '华东', new_user: 250, active_user: 420, revenue: 1650 },
      { day: 'D7', region: '华北', new_user: 300, active_user: 450, revenue: 1900 },
      { day: 'D8', region: '华东', new_user: 280, active_user: 430, revenue: 1850 },
    ];

    const spec = {
      root: 'main',
      elements: {
        main: { type: 'GridLayout', props: { columns: 1, gap: 16 }, children: ['chart', 'table'] },
        chart: {
          type: 'BarChart',
          props: { type: 'bar', title: '收入趋势', x: 'day', y: 'revenue', data: rows },
          children: [],
        },
        table: {
          type: 'DataTable',
          props: {
            type: 'table',
            columns: [
              { key: 'day', label: '日期' },
              { key: 'region', label: '区域' },
              { key: 'revenue', label: '收入' },
            ],
            data: rows,
          },
          children: [],
        },
      },
    };

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    async function run() {
      const events = [];
      const runtime = window.Vizual.createHostRuntime({
        renderArtifact: (artifact, container) => window.Vizual.renderArtifact(artifact, container),
        onEvent: event => events.push(event.type),
      });
      const rendered = await runtime.renderMessageArtifact({
        messageId: 'cold-start-msg-1',
        conversationId: 'cold-start-conv',
        prompt: '冷启动数据分析',
        spec,
        container: document.getElementById('renderTarget'),
      });
      assert(rendered.targetMap.some(t => t.id === 'element:chart'), 'missing chart element target');
      assert(rendered.targetMap.some(t => t.type === 'chart-series'), 'missing chart series target');
      assert(rendered.targetMap.some(t => t.type === 'table-cell'), 'missing table cell target');

      const updated = await runtime.updateArtifact(rendered.id, [
        { type: 'changeChartType', targetId: 'element:chart', chartType: 'LineChart' },
        { type: 'filterData', targetId: 'element:chart', field: 'region', values: '华东' },
        { type: 'limitData', targetId: 'element:chart', limit: 4 },
      ]);
      await runtime.renderArtifact(updated.id, document.getElementById('renderTarget'));
      assert(updated.spec.elements.chart.type === 'LineChart', 'chart type did not update');
      assert(updated.spec.elements.chart.props.data.length === 4, 'data was not filtered/limited');
      assert(updated.versions.length === 1, 'version snapshot missing');

      const csv = await runtime.exportArtifact({ ref: updated.id, format: 'csv', filename: 'cold-start' });
      const xlsx = await runtime.exportArtifact({ ref: updated.id, format: 'xlsx', filename: 'cold-start' });
      assert(csv.record.status === 'success' && csv.blob.size > 0, 'csv export failed');
      assert(xlsx.record.status === 'success' && xlsx.blob.size > 0, 'xlsx export failed');

      return {
        status: 'PASS',
        artifactId: updated.id,
        targets: updated.targetMap.map(t => t.id).slice(0, 12),
        versions: updated.versions.length,
        exports: (await runtime.getArtifact(updated.id)).exports.map(item => ({
          format: item.format,
          status: item.status,
          size: item.meta && item.meta.size,
        })),
        events,
      };
    }

    run().then(result => {
      document.getElementById('status').className = 'pass';
      document.getElementById('status').textContent = 'PASS';
      document.getElementById('debug').textContent = JSON.stringify(result, null, 2);
    }).catch(error => {
      document.getElementById('status').className = 'fail';
      document.getElementById('status').textContent = 'FAIL: ' + (error.message || error);
      document.getElementById('debug').textContent = error.stack || String(error);
    });
  </script>
</body>
</html>
