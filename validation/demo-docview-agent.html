<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DocView × Agent 批注闭环演示</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--rk-bg-primary, #0f0f1a); color: var(--rk-text-primary, #e0e0e0); padding: 0; margin: 0; }
    .page-header { background: var(--rk-bg-secondary, #1e293b); padding: 20px 24px; border-bottom: 1px solid var(--rk-border-subtle, #2d3148); }
    .page-header h2 { margin: 0 0 4px 0; color: var(--rk-text-primary, #fff); font-size: 20px; }
    .page-header p { margin: 0; color: var(--rk-text-secondary, #888); font-size: 13px; }
    .toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 24px; background: var(--rk-bg-tertiary, #111118); border-bottom: 1px solid var(--rk-border-subtle, #2a2a4a); flex-wrap: wrap; }
    .toolbar button {
      background: var(--rk-bg-secondary, #2a2a3e); color: var(--rk-text-primary, #e0e0e0); border: 1px solid var(--rk-border-subtle, #3a3a5e);
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .toolbar button:hover { background: var(--rk-bg-tertiary, #3a3a5e); }
    .toolbar button.primary { background: var(--rk-accent, #3b82f6); border-color: var(--rk-accent, #3b82f6); color: #fff; }
    .toolbar button.primary:hover { background: var(--rk-accent-hover, #2563eb); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .badge-idle { background: var(--rk-bg-tertiary); color: var(--rk-text-tertiary); }
    .badge-waiting { background: var(--rk-warning-muted, #3f3a1e); color: var(--rk-warning, #fbbf24); animation: pulse 1.5s infinite; }
    .badge-done { background: var(--rk-success-muted, #1e3f2f); color: var(--rk-success, #22c55e); }
    .badge-error { background: var(--rk-error-muted); color: var(--rk-error); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    #app { width: 100%; min-height: 500px; }
    .footer { text-align: center; padding: 12px; color: var(--rk-text-tertiary, #444); font-size: 11px; border-top: 1px solid var(--rk-border-subtle); }
    .log-section { padding: 12px 24px; background: var(--rk-bg-secondary); border-top: 1px solid var(--rk-border-subtle); position: relative; z-index: 0; }
    .log-section h4 { color: var(--rk-text-secondary); font-size: 12px; margin: 0 0 6px; }
    #log { font-family: monospace; font-size: 11px; color: var(--rk-text-tertiary); max-height: 120px; overflow-y: auto; }
    #log div { padding: 2px 0; border-bottom: 1px solid var(--rk-border-subtle); }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>DocView × Agent 批注闭环</h2>
    <p>选中文字或点击组件添加批注 → 提交给 Agent → Agent 修改后自动刷新页面</p>
  </div>

  <div class="toolbar">
    <button onclick="resetDoc()">重置</button>
    <button class="primary" onclick="exportPNG()">导出 PNG</button>
    <span id="status" class="badge badge-idle">就绪 — 添加批注后点击提交</span>
    <span id="poll-msg" style="font-size:11px;margin-left:8px;color:var(--rk-text-tertiary)"></span>
  </div>

  <div id="app"></div>

  <div class="log-section">
    <h4>事件日志</h4>
    <div id="log"></div>
  </div>

  <div class="footer">DocView Agent Bridge · 选中文字或点击组件批注 → Agent 自动处理</div>

  <script src="../dist/vizual.standalone.js"></script>
  <script>
    var React = Vizual.React;
    var ReactDOMClient = Vizual.ReactDOMClient;
    var currentRoot = null;
    var pollTimer = null;

    // Claude light theme
    var claudeTokens = {"colors":[{"name":"terracotta","value":"#c96442"},{"name":"accent","value":"#c96442"},{"name":"coral","value":"#d97757"},{"name":"text","value":"#141413"},{"name":"background","value":"#f5f4ed"},{"name":"card","value":"#faf9f5"},{"name":"ivory","value":"#faf9f5"},{"name":"parchment","value":"#f5f4ed"},{"name":"text-secondary","value":"#5e5d59"},{"name":"text-tertiary","value":"#87867f"},{"name":"border","value":"#f0eee6"},{"name":"border-subtle","value":"#e8e6dc"},{"name":"dark-surface","value":"#30302e"},{"name":"charcoal","value":"#4d4c48"},{"name":"success","value":"#10b981"},{"name":"warning","value":"#f59e0b"},{"name":"error","value":"#b53333"}],"typography":{"fontFamily":"Georgia, system-ui, serif","sizes":{"body":"16px","h3":"25px"},"weights":{"regular":"400","bold":"500"}},"spacing":{"baseUnit":"8px","scale":{"space-1":"4px","space-2":"8px","space-3":"16px"}},"radius":{"scale":{"sm":"6px","md":"8px","lg":"12px"}}};
    var claude = Vizual.mapDesignTokensToTheme(claudeTokens, 'claude');
    Vizual.registerTheme(claude.name, claude);
    var claudeL = Vizual.invertTheme(claude);
    Vizual.registerTheme(claudeL.name, claudeL);
    Vizual.setGlobalTheme('claude');

    // 初始文档内容
    var initialSections = [
      { type: 'heading', content: '2025 年 Q2 产品路线图', level: 1 },
      { type: 'text', content: '本文档规划 2025 年第二季度产品开发方向。基于 Q1 复盘结论和市场反馈，我们将聚焦三个核心方向：性能优化、用户体验升级、以及 AI 能力增强。' },

      { type: 'heading', content: '一、核心指标', level: 2 },
      { type: 'kpi', content: '', data: { metrics: [
        { label: '页面加载速度', value: '1.2s', change: '-40%', color: '#3b82f6' },
        { label: '用户满意度', value: '92分', change: '+12分', color: '#22c55e' },
        { label: 'DAU', value: '85.6万', change: '+23%', color: '#fbbf24' },
        { label: '转化率', value: '5.8%', change: '+1.2%', color: '#a855f7' },
      ]}},

      { type: 'heading', content: '二、性能优化计划', level: 2 },
      { type: 'text', content: '前端性能是 Q2 的首要任务。我们将实施代码分割、图片懒加载和 Service Worker 缓存策略。目标是将首屏渲染时间从 2.8 秒降低到 1.5 秒以内，Lighthouse 性能评分提升至 95+。' },
      { type: 'chart', title: '页面加载时间趋势（秒）', content: '', data: {
        xAxis: { type: 'category', data: ['1月', '2月', '3月', '4月', '5月', '6月'] },
        yAxis: { type: 'value' },
        series: [{ type: 'line', data: [3.2, 2.9, 2.8, 2.1, 1.6, 1.2], smooth: true, areaStyle: { color: 'rgba(59,130,246,0.15)' }, lineStyle: { color: '#3b82f6', width: 3 }, itemStyle: { color: '#3b82f6' } }]
      }},

      { type: 'heading', content: '三、团队资源分配', level: 2 },
      { type: 'table', title: '各团队 Q2 资源分配', content: '', data: {
        columns: ['团队', '人数', '核心任务', '优先级', '进度'],
        rows: [
          ['前端', '8人', '性能优化 + 新UI', 'P0', '30%'],
          ['后端', '6人', 'API v3 + 微服务', 'P0', '20%'],
          ['AI', '5人', '智能推荐引擎', 'P1', '15%'],
          ['设计', '3人', 'Design System 2.0', 'P1', '40%'],
        ]
      }},

      { type: 'heading', content: '四、里程碑', level: 2 },
      { type: 'text', content: '4月底完成性能基线测试，5月中旬发布新版 UI，6月初上线 AI 推荐功能 Beta。季度末进行全量 A/B 测试验证优化效果。' },
      { type: 'callout', content: '注意：以上计划基于当前资源评估，如团队人员变动可能需要调整优先级。最终方案需经技术委员会审批后执行。', variant: 'warning' },
    ];

    var currentSections = initialSections;

    // --- Rendering ---
    function render(sections) {
      currentSections = sections;
      var app = document.getElementById('app');
      if (currentRoot) { try { currentRoot.unmount(); } catch(e) {} }
      var root = ReactDOMClient.createRoot(app);
      root.render(
        React.createElement(Vizual.DocView, {
          sections: sections,
          showPanel: true,
          panelPosition: 'right',
          onAction: function(name, params) {
            log(name, params);

            if (name === 'batchSubmit') {
              // 提交批注给 agent
              setStatus('waiting', '已提交 ' + (params.annotations?.length || 0) + ' 条批注，等待 Agent 处理...');
              fetch('/api/annotations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ annotations: params.annotations, timestamp: new Date().toISOString() })
              }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok) log('bridge', 'Annotations saved, polling for agent response...');
                startPolling();
              }).catch(function(e) {
                setStatus('error', '提交失败: ' + e.message);
              });
            }

            if (name === 'requestRevision') {
              setStatus('waiting', '单条修订请求已发送...');
              fetch('/api/annotations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ annotations: [params], timestamp: new Date().toISOString() })
              }).then(function() { startPolling(); });
            }
          }
        })
      );
      currentRoot = root;
    }

    // --- Polling for agent response ---
    var pollCount = 0;
    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollCount = 0;
      pollTimer = setInterval(function() {
        pollCount++;
        document.getElementById('poll-msg').textContent = '等待 Agent 响应... (' + pollCount + 's)';
        fetch('/api/sections')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && Array.isArray(data)) {
              clearInterval(pollTimer);
              pollTimer = null;
              document.getElementById('poll-msg').textContent = '';
              render(data);
              setStatus('done', 'Agent 已完成修订，页面已更新');
              log('revision', 'Content updated by agent');
            }
          });
      }, 1000);
    }

    // --- Controls ---
    function resetDoc() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      document.getElementById('poll-msg').textContent = '';
      render(initialSections);
      setStatus('idle', '已重置');
      log('reset', 'Document reset to original');
    }

    function exportPNG() {
      var el = document.querySelector('[data-docview-viewport]') || document.getElementById('app');
      Vizual.downloadPNG(el, { filename: 'docview-agent', scale: 2 })
        .catch(function(e) { log('error', e.message); });
    }

    // --- Helpers ---
    function setStatus(type, text) {
      var el = document.getElementById('status');
      el.textContent = text;
      el.className = 'badge badge-' + type;
    }

    function log(name, params) {
      var el = document.getElementById('log');
      var ts = new Date().toISOString().substr(11, 8);
      var ps = typeof params === 'object' ? JSON.stringify(params) : String(params || '');
      if (ps.length > 200) ps = ps.substring(0, 200) + '...';
      var div = document.createElement('div');
      div.textContent = ts + ' [' + name + '] ' + ps;
      el.insertBefore(div, el.firstChild);
    }

    // --- Start ---
    render(initialSections);
    log('init', 'DocView Agent Bridge ready');
  </script>
</body>
</html>
