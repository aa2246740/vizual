<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>运营管理月报 — DocView 批注演示</title>
  <style>
    /* Theme-aware CSS using CSS variables injected by vizual theme system */
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--rk-bg-primary, #0f0f1a); color: var(--rk-text-primary, #e0e0e0); padding: 0; margin: 0; }

    .toolbar button {

    .toolbar .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .badge-info { background: var(--rk-accent-muted, #1e3a5f); color: var(--rk-accent, #60a5fa); }
    .badge-success { background: var(--rk-success-muted, #1e3f2f); color: var(--rk-success, #22c55e); }
    .badge-warn { background: var(--rk-warning-muted, #3f3a1e); color: var(--rk-warning, #fbbf24); }
    #app { width: 100%; min-height: 500px; }
    #action-section { padding: 16px 24px; background: var(--rk-bg-secondary, #111118); }
    #action-section h4 { color: var(--rk-text-secondary, #888); font-size: 13px; margin: 0 0 8px 0; }
    #action-log { background: var(--rk-bg-primary, #0a0a14); border: 1px solid var(--rk-border-subtle, #2a2a4e); border-radius: 4px; padding: 10px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; color: var(--rk-text-primary, #ccc); }
    .log-entry { padding: 3px 0; border-bottom: 1px solid var(--rk-border-subtle, #1a1a2e); }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: var(--rk-text-tertiary, #555); margin-right: 6px; }
    .log-name { color: var(--rk-warning, #fbbf24); font-weight: 600; }
    .log-params { color: var(--rk-text-tertiary, #777); font-size: 11px; }
    .footer { text-align: center; padding: 12px; color: var(--rk-text-tertiary, #444); font-size: 11px; }
  </style>
</head>
<body>
  <div class="page-header">

    var cmb = Vizual.mapDesignTokensToTheme(cmbTokens, 'cmb');

      { type: 'heading', content: '六、团队效率', level: 2 },
      { type: 'text', content: '研发团队本月完成需求 86 个，较计划超出 12 个。Bug 修复平均耗时从上月的 3.2 天缩短至 2.1 天，紧急 Bug 4 小时内修复率达到 95%。产品迭代保持每周一个版本的节奏，共发布 4 个版本，新增功能 23 项，优化改进 45 项。' },
      { type: 'kpi', content: '', data: { metrics: [
        { label: '需求完成率', value: '114.7%', change: '+8.3%', color: '#22c55e' },
        { label: 'Bug 修复速度', value: '2.1天', change: '-34%', color: '#3b82f6' },

    ];

    // AI 修订后的版本（部分文字改动，用于触发孤儿检测）
    var revisedSections = [
      { type: 'heading', content: '2025 年 4 月运营管理月报（修订版）', level: 1 },
      { type: 'text', content: '本报告涵盖 2025 年 4 月全月运营数据，经财务部复核确认后更新。包括用户增长、营收分析、产品活跃度、客户服务及团队效率等核心指标。本月整体运营表现超出预期，多项关键指标创历史新高。' },

      { type: 'heading', content: '一、核心运营指标', level: 2 },
      { type: 'kpi', content: '', data: { metrics: [
        { label: '月活跃用户', value: '129.8万', change: '+13.1%', color: '#3b82f6' },
        { label: '月营收', value: '¥3,920万', change: '+20.2%', color: '#22c55e' },
        { label: '付费转化率', value: '7.1%', change: '+1.2%', color: '#fbbf24' },
        { label: '客户满意度', value: '95.0分', change: '+2.9分', color: '#a855f7' },
        { label: 'NPS 净推荐值', value: '74', change: '+7', color: '#06b6d4' },
      ]}},

      { type: 'heading', content: '二、用户增长分析', level: 2 },
      { type: 'text', content: '4 月新增注册用户 24.1 万，环比增长 17.8%，其中自然流量占比 44%，渠道投放占比 33%，老用户邀请占比 23%。移动端注册占比达到 80%，较上月提升 5 个百分点。用户次日留存率 46.1%，7 日留存率 29.5%，30 日留存率 19.0%，均超过行业平均水平。' },
      { type: 'chart', title: '月度新增用户趋势（万）', content: '', data: {
        xAxis: { type: 'category', data: ['10月', '11月', '12月', '1月', '2月', '3月', '4月'], axisLabel: { color: '#888' }, axisLine: { lineStyle: { color: '#2a2a4a' } } },
        yAxis: { type: 'value', axisLabel: { color: '#888' }, splitLine: { lineStyle: { color: '#1a1a2e' } } },
        series: [{ type: 'bar', data: [15.2, 17.8, 19.3, 20.1, 21.5, 20.5, 24.1], itemStyle: { color: '#3b82f6', borderRadius: [4, 4, 0, 0] } }]
      }},

      { type: 'heading', content: '三、营收分析', level: 2 },
      { type: 'text', content: '本月总营收经确认调整为 ¥3,920 万，同比增长 34.8%，环比增长 20.2%。其中订阅收入 ¥2,200 万（占比 56.1%），增值服务 ¥960 万（占比 24.5%），广告收入 ¥540 万（占比 13.8%），其他收入 ¥220 万（占比 5.6%）。ARPU 值达到 ¥31.5，较上月提升 13.3%。' },
      { type: 'chart', title: '营收构成分析', content: '', data: {
        series: [{ type: 'pie', radius: ['40%', '70%'], label: { color: '#ccc' }, data: [

          { value: 960, name: '增值服务', itemStyle: { color: '#22c55e' } },
          { value: 540, name: '广告收入', itemStyle: { color: '#fbbf24' } },

        ]}]
      }},

      { type: 'heading', content: '四、产品活跃度', level: 2 },

      { type: 'chart', title: '核心功能使用率（%）', content: '', data: {

          { name: '数据分析', max: 100 },

          { name: '实时监控', max: 100 },
          { name: '团队协作', max: 100 },
        ], axisName: { color: '#888' }, splitArea: { areaStyle: { color: ['rgba(59,130,246,0.05)', 'rgba(59,130,246,0.1)'] } }, splitLine: { lineStyle: { color: '#2a2a4a' } } },
        series: [{ type: 'radar', data: [{ value: [71, 57, 49, 42], name: '使用率', areaStyle: { color: 'rgba(59,130,246,0.2)' }, lineStyle: { color: '#3b82f6' }, itemStyle: { color: '#3b82f6' } }] }]
      }},

      { type: 'heading', content: '五、客户服务', level: 2 },

        ]
      }},

      { type: 'heading', content: '六、团队效率', level: 2 },
      { type: 'text', content: '研发团队本月完成需求 89 个，较计划超出 15 个。Bug 修复平均耗时从上月的 3.2 天缩短至 1.8 天，紧急 Bug 4 小时内修复率达到 97%。产品迭代保持每周一个版本的节奏，共发布 4 个版本，新增功能 25 项，优化改进 48 项。' },

    // --- 渲染 ---
    var React = Vizual.React;
    var ReactDOMClient = Vizual.ReactDOMClient;
    var currentRoot = null;
    var reviewController = null;

    function sectionPatchesForRevision() {
      return revisedSections.map(function(section, index) {
        return { op: 'replaceSection', sectionIndex: index, section: section };
      });
    }

    function DemoDocViewApp(props) {
      var state = React.useState(props.initialSections);
      var sections = state[0];
      var setSections = state[1];
      var threadState = React.useState([]);
      var threads = threadState[0];
      var setThreads = threadState[1];
      var proposalState = React.useState([]);
      var revisionProposals = proposalState[0];
      var setRevisionProposals = proposalState[1];

      return React.createElement(Vizual.DocView, {
        sections: sections,
        threads: threads,
        onThreadsChange: setThreads,
        revisionProposals: revisionProposals,
        onRevisionProposalsChange: setRevisionProposals,
        showPanel: true,
        panelPosition: 'right',
        controllerRef: function(controller) {
          reviewController = controller;
        },
        onSectionsChange: function(nextSections) {
          setSections(nextSections);
        },
        onReviewAction: function(event) {
          logAction(event.type, event);
          if (event.type === 'threadsSubmitted') {
            setStatus('AI 正在生成修订提案...', 'warn');
            setTimeout(function() {
              if (!reviewController) return;
              reviewController.createRevisionProposal({
                fromThreadIds: event.threads.map(function(thread) { return thread.id; }),
                summary: '根据已提交批注生成修订版运营月报。点击「应用」后写入文档，并保留 review 记录。',
                patches: sectionPatchesForRevision(),
                author: { id: 'demo-agent', name: 'Demo Agent', role: 'agent' },
                risk: 'low'
              });
              setStatus('修订提案已生成，等待应用', 'info');
            }, 900);
          }
          if (event.type === 'revisionApplied') {
            setStatus('修订已应用', 'success');
            logAction('修订完成', { msg: '文档内容已更新，原始批注中文字被修改的将标记为「孤立」' });
          }
          if (event.type === 'revisionRejected') {
            setStatus('修订已拒绝', 'info');
          }
        }
      });
    }

    function render(sections) {
      var app = document.getElementById('app');
      if (currentRoot) { try { currentRoot.unmount(); } catch(e) {} }
      var root = ReactDOMClient.createRoot(app);
      root.render(React.createElement(DemoDocViewApp, { initialSections: sections }));
      currentRoot = root;
    }

    // --- 控制 ---
    function resetDemo() {
      render(originalSections);
      actionLog.innerHTML = '<div class="log-entry"><span class="log-time">--:--:--</span> 已重置</div>';
      setStatus('就绪', 'info');
    }

    // --- Export (target viewport only, exclude annotation sidebar) ---
    function getExportTarget() {
      // 只导出正文 viewport，不包含批注侧边栏
      return document.querySelector('[data-docview-viewport]') || document.getElementById('app');
    }
    function exportDocPNG() {
      var el = getExportTarget();
      var msg = document.getElementById('export-msg');
      msg.textContent = '导出中...'; msg.style.color = 'var(--rk-warning)';
      Vizual.downloadPNG(el, { filename: 'docview-运营月报', scale: 2 })
        .then(function() { msg.textContent = 'PNG 已下载!'; msg.style.color = 'var(--rk-success)'; })
        .catch(function(e) { msg.textContent = '失败: ' + e.message; msg.style.color = 'var(--rk-error)'; });
    }

    // --- 启动 ---
    render(originalSections);
    logAction('初始化', { msg: '运营管理月报已加载，选中文字或点击图表/KPI/表格添加批注' });
  </script>
</body>
</html>
