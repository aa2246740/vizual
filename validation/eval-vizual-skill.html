<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vizual Skill Eval — Visual Comparison</title>
  <style>
    body{font-family:system-ui;background:#0f0f1a;color:#e0e0e0;padding:24px;margin:0}
    h1{text-align:center;margin-bottom:8px}
    .subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:32px}
    .eval-section{margin-bottom:48px;border:1px solid #2a2a3e;border-radius:8px;overflow:hidden}
    .eval-header{background:#161625;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
    .eval-header h3{margin:0;font-size:16px}
    .eval-prompt{font-size:12px;color:#888;background:#0d0d18;padding:8px 20px;border-bottom:1px solid #2a2a3e;font-style:italic}
    .comparison{display:grid;grid-template-columns:1fr 1fr;gap:0}
    .panel{padding:0;border-right:1px solid #2a2a3e}
    .panel:last-child{border-right:none}
    .panel-label{font-size:12px;font-weight:700;padding:8px 16px;text-transform:uppercase;letter-spacing:1px}
    .panel-label.skill{background:#1a2e1a;color:#22c55e}
    .panel-label.baseline{background:#2e1a1a;color:#ef4444}
    .render-area{min-height:200px;padding:12px;position:relative}
    .render-area.empty{display:flex;align-items:center;justify-content:center;color:#666;font-size:13px}
    .score-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
    .score-pass{background:#22c55e30;color:#22c55e}
    .score-fail{background:#ef444430;color:#ef4444}
    .summary-bar{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
    .summary-card{background:#161625;border-radius:8px;padding:20px;text-align:center;border:1px solid #2a2a3e}
    .summary-card .pct{font-size:48px;font-weight:800;margin:8px 0}
    .summary-card .label{font-size:14px;color:#888}
    .summary-card.pass .pct{color:#22c55e}
    .summary-card.fail .pct{color:#ef4444}
    .raw-toggle{font-size:11px;color:#666;cursor:pointer;margin:8px 16px;display:inline-block}
    .raw-toggle:hover{color:#aaa}
    .raw-json{display:none;font-size:10px;background:#0a0a14;padding:8px 16px;max-height:200px;overflow:auto;color:#888;font-family:monospace;white-space:pre-wrap}
    .raw-json.show{display:block}
  </style>
</head>
<body>
  <h1>Vizual Skill Evaluation</h1>
  <div class="subtitle">Iteration 1 — Visual Comparison: With Skill vs Without Skill</div>

  <div class="summary-bar">
    <div class="summary-card pass">
      <div class="label">With Vizual Skill</div>
      <div class="pct">100%</div>
      <div class="label">20/20 assertions passed</div>
    </div>
    <div class="summary-card fail">
      <div class="label">Without Skill (Baseline)</div>
      <div class="pct">45%</div>
      <div class="label">9/20 assertions passed</div>
    </div>
  </div>

  <div id="evals"></div>

  <!-- vizual.standalone.js includes React, ReactDOM, ECharts, and mermaid — zero CDN needed -->
  <script src="../dist/vizual.standalone.js"></script>
  <script>
    // Eval data
    var evals = [
      {
        name: "Eval 1: Bar Chart",
        prompt: "Show me a bar chart of monthly revenue for 2024 with Jan through June data.",
        withSkill: {
          score: "6/6",
          passed: true,
          jsonl: [
            '{"op":"add","path":"/root","value":"main"}',
            '{"op":"add","path":"/elements/main","value":{"type":"BarChart","props":{"type":"bar","title":"Monthly Revenue 2024","x":"month","y":"revenue","data":[{"month":"Jan","revenue":42000},{"month":"Feb","revenue":58000},{"month":"Mar","revenue":51000},{"month":"Apr","revenue":63000},{"month":"May","revenue":71000},{"month":"Jun","revenue":68000}]},"children":[]}}'
          ]
        },
        withoutSkill: {
          score: "3/6",
          passed: false,
          errors: ["Wrong type: 'bar-chart' (not 'BarChart')", "Values are strings '$42K' not numbers", "Wrong props: xAxis/yAxis instead of x/y"],
          jsonl: [
            '{"op":"add","path":"/root","value":"main"}',
            '{"op":"add","path":"/elements/main","value":{"type":"bar-chart","props":{"title":"Monthly Revenue 2024","xAxis":"month","yAxis":"revenue","data":[{"month":"Jan","revenue":"$42K"},{"month":"Feb","revenue":"$58K"},{"month":"Mar","revenue":"$51K"},{"month":"Apr","revenue":"$63K"},{"month":"May","revenue":"$71K"},{"month":"Jun","revenue":"$68K"}],"showTrendLine":true},"children":[]}}'
          ]
        }
      },
      {
        name: "Eval 2: Dashboard",
        prompt: "Create a dashboard: KPI cards (visitors, bounce rate, session duration) + pie chart of traffic sources + line chart of daily visitors.",
        withSkill: {
          score: "7/7",
          passed: true,
          jsonl: [
            '{"op":"add","path":"/root","value":"dashboard"}',
            '{"op":"add","path":"/elements/dashboard","value":{"type":"KpiDashboard","props":{"type":"kpi_dashboard","title":"Website Analytics","columns":3,"metrics":[{"label":"Total Visitors","value":"12,450","trend":"up","trendValue":"+8.2%"},{"label":"Bounce Rate","value":"34.2%","trend":"down","trendValue":"-2.1%"},{"label":"Avg Session","value":"4m 32s","trend":"up","trendValue":"+12s"}]},"children":["pie-chart","line-chart"]}}',
            '{"op":"add","path":"/elements/pie-chart","value":{"type":"PieChart","props":{"type":"pie","title":"Traffic Sources","label":"source","value":"visits","data":[{"source":"Organic Search","visits":5200},{"source":"Direct","visits":3100},{"source":"Social Media","visits":2400},{"source":"Referral","visits":1750}]},"children":[]}}',
            '{"op":"add","path":"/elements/line-chart","value":{"type":"LineChart","props":{"type":"line","title":"Daily Visitors (Past Week)","x":"day","y":"visitors","data":[{"day":"Mon","visitors":1680},{"day":"Tue","visitors":1920},{"day":"Wed","visitors":1750},{"day":"Thu","visitors":2100},{"day":"Fri","visitors":1890},{"day":"Sat","visitors":1420},{"day":"Sun","visitors":1690}]},"children":[]}}'
          ]
        },
        withoutSkill: {
          score: "4/7",
          passed: false,
          errors: ["Wrong types: 'MetricCard', 'Pie', 'Line' (not in catalog)", "Wrong data format: labels/values instead of label/value + data array"],
          jsonl: [
            '{"op":"add","path":"/root","value":"dashboard"}',
            '{"op":"add","path":"/elements/dashboard","value":{"type":"Dashboard","props":{"title":"Website Analytics"},"children":["kpi1","kpi2","kpi3","pie","line"]}}',
            '{"op":"add","path":"/elements/kpi1","value":{"type":"MetricCard","props":{"label":"Total Visitors","value":12450,"change":"+8.2%"},"children":[]}}',
            '{"op":"add","path":"/elements/pie","value":{"type":"Pie","props":{"title":"Traffic Sources","labels":["Organic","Direct","Social","Referral"],"values":[5200,3100,2400,1750]},"children":[]}}',
            '{"op":"add","path":"/elements/line","value":{"type":"Line","props":{"title":"Daily Visitors","labels":["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],"datasets":[{"data":[1680,1920,1750,2100,1890,1420,1690]}]},"children":[]}}'
          ]
        }
      },
      {
        name: "Eval 3: Feedback Form",
        prompt: "Build a feedback form: name (text), satisfaction rating (1-5 stars), contact method (radio: email/phone/chat), comments (textarea).",
        withSkill: {
          score: "7/7",
          passed: true,
          jsonl: [
            '{"op":"add","path":"/root","value":"form"}',
            '{"op":"add","path":"/elements/form","value":{"type":"FormBuilder","props":{"type":"form_builder","title":"Feedback Form","submitLabel":"Submit","columns":1,"fields":[{"name":"name","label":"Name","type":"text","required":true,"placeholder":"Enter your name"},{"name":"satisfaction","label":"Satisfaction Rating","type":"rating","max":5,"required":true},{"name":"contact_method","label":"Preferred Contact Method","type":"radio","options":["Email","Phone","Chat"],"required":true},{"name":"comments","label":"Comments","type":"textarea","placeholder":"Share your thoughts..."}]},"children":[]}}'
          ]
        },
        withoutSkill: {
          score: "2/7",
          passed: false,
          errors: ["Wrong type: 'Form' (not 'FormBuilder')", "Wrong field types: 'stars', 'multi-line-text'", "Wrong prop: 'choices' instead of 'options'", "Extra Button element not needed"],
          jsonl: [
            '{"op":"add","path":"/root","value":"form"}',
            '{"op":"add","path":"/elements/form","value":{"type":"Form","props":{"title":"Feedback Form","fields":[{"name":"name","type":"text","label":"Name"},{"name":"satisfaction","type":"stars","max":5},{"name":"contact_method","type":"radio","choices":["Email","Phone","Chat"]},{"name":"comments","type":"multi-line-text"}],"onSubmit":"handleSubmit"},"children":["submit-btn"]}}',
            '{"op":"add","path":"/elements/submit-btn","value":{"type":"Button","props":{"label":"Submit","variant":"primary"},"children":[]}}'
          ]
        }
      }
    ];

    function jsonlToSpec(lines) {
      var root = null;
      var elements = {};
      for (var i = 0; i < lines.length; i++) {
        try {
          var patch = JSON.parse(lines[i]);
          if (patch.op === 'add') {
            if (patch.path === '/root') {
              root = patch.value;
            } else if (patch.path && patch.path.indexOf('/elements/') === 0) {
              var id = patch.path.replace('/elements/', '');
              elements[id] = patch.value;
            }
          }
        } catch(e) {}
      }
      if (root && Object.keys(elements).length > 0) {
        return { root: root, elements: elements };
      }
      return null;
    }

    function renderEval(evalData, container) {
      var section = document.createElement('div');
      section.className = 'eval-section';

      // Header
      var header = document.createElement('div');
      header.className = 'eval-header';
      header.innerHTML = '<h3>' + evalData.name + '</h3>';
      section.appendChild(header);

      // Prompt
      var prompt = document.createElement('div');
      prompt.className = 'eval-prompt';
      prompt.textContent = evalData.prompt;
      section.appendChild(prompt);

      // Comparison
      var comparison = document.createElement('div');
      comparison.className = 'comparison';

      // With Skill panel
      comparison.appendChild(createPanel('With Skill', evalData.withSkill, true));
      // Without Skill panel
      comparison.appendChild(createPanel('Without Skill', evalData.withoutSkill, false));

      section.appendChild(comparison);
      container.appendChild(section);
    }

    function createPanel(label, data, isSkill) {
      var panel = document.createElement('div');
      panel.className = 'panel';

      // Label
      var lbl = document.createElement('div');
      lbl.className = 'panel-label ' + (isSkill ? 'skill' : 'baseline');
      lbl.innerHTML = label + ' <span class="score-badge ' + (data.passed ? 'score-pass' : 'score-fail') + '">' + data.score + '</span>';
      panel.appendChild(lbl);

      // Render area
      var area = document.createElement('div');
      area.className = 'render-area';

      var spec = jsonlToSpec(data.jsonl);
      if (spec && typeof Vizual !== 'undefined') {
        try {
          Vizual.renderSpec(spec, area);
        } catch(e) {
          area.innerHTML = '<div style="color:#ef4444;padding:12px;font-size:12px">Render Error: ' + e.message + '</div>';
        }
      } else {
        area.className += ' empty';
        area.textContent = 'Could not render — ' + (spec ? 'Vizual not loaded' : 'Invalid spec');
      }
      panel.appendChild(area);

      // Error list for baseline
      if (data.errors && data.errors.length > 0) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'padding:8px 16px;background:#2e1a1a;font-size:11px;color:#f87171;border-top:1px solid #ef444430';
        errDiv.innerHTML = '<strong>Errors:</strong><br>' + data.errors.map(function(e) { return '• ' + e; }).join('<br>');
        panel.appendChild(errDiv);
      }

      // Raw JSON toggle
      var toggle = document.createElement('div');
      toggle.className = 'raw-toggle';
      toggle.textContent = 'Show raw JSON';
      toggle.onclick = function() {
        var rawEl = this.nextElementSibling;
        rawEl.classList.toggle('show');
        this.textContent = rawEl.classList.contains('show') ? 'Hide raw JSON' : 'Show raw JSON';
      };
      panel.appendChild(toggle);

      var raw = document.createElement('div');
      raw.className = 'raw-json';
      raw.textContent = data.jsonl.join('\n');
      panel.appendChild(raw);

      return panel;
    }

    // Render all evals
    var container = document.getElementById('evals');
    evals.forEach(function(e) { renderEval(e, container); });
  </script>
</body>
</html>
