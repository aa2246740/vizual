<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vizual Current Full Acceptance</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; min-height: 280px; }
    #status { color: #475569; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <h1>Vizual Current Full Acceptance</h1>
    <p id="status">Waiting for runtime...</p>
    <div class="grid">
      <div id="dashboard" class="panel"></div>
      <div id="planning" class="panel"></div>
      <div id="form" class="panel"></div>
    </div>
  </main>
  <script src="../dist/vizual.standalone.js"></script>
  <script>
    const dashboard = {
      root: 'root',
      elements: {
        root: { type: 'Column', props: { gap: 16 }, children: ['kpi', 'chart', 'table'] },
        kpi: { type: 'KpiDashboard', props: { type: 'kpi_dashboard', title: '经营摘要', metrics: [{ label: '利润', value: '-4.2%', trend: 'down' }, { label: '销量', value: '+162.5%', trend: 'up' }] }, children: [] },
        chart: { type: 'ComboChart', props: { type: 'combo', title: '营收成本利润', x: 'month', data: [{ month: '1月', revenue: 6400, cost: 4000, profit: 2400 }, { month: '6月', revenue: 16800, cost: 14500, profit: 2300 }], series: [{ type: 'bar', y: 'revenue', name: '营收' }, { type: 'bar', y: 'cost', name: '成本' }, { type: 'line', y: 'profit', name: '利润' }] }, children: [] },
        table: { type: 'DataTable', props: { type: 'table', title: '明细', data: [{ month: '1月', revenue: 6400 }, { month: '6月', revenue: 16800 }], columns: [{ key: 'month', label: '月份' }, { key: 'revenue', label: '营收' }] }, children: [] },
      },
    };
    const planning = {
      root: 'root',
      elements: {
        root: { type: 'Column', props: { gap: 14 }, children: ['timeline', 'gantt', 'org'] },
        timeline: { type: 'Timeline', props: { type: 'timeline', title: '里程碑', items: [{ date: '2026-06-01', title: '接入' }, { date: '2026-06-05', title: '验收' }] }, children: [] },
        gantt: { type: 'GanttChart', props: { type: 'gantt', title: '项目计划', tasks: [{ id: 'a', name: '清理 catalog', start: '2026-06-01', end: '2026-06-03', progress: 100 }, { id: 'b', name: '浏览器验收', start: '2026-06-04', end: '2026-06-05', progress: 60 }] }, children: [] },
        org: { type: 'OrgChart', props: { type: 'org_chart', title: '责任结构', nodes: [{ id: 'agent', name: 'Agent' }, { id: 'host', name: 'Host', parentId: 'agent' }] }, children: [] },
      },
    };
    const form = {
      root: 'root',
      elements: {
        root: { type: 'Column', props: { gap: 14 }, children: ['note', 'input'] },
        note: { type: 'Markdown', props: { content: '### 交互验收\n表单只回传给 host Agent，不承诺外部业务写入。' }, children: [] },
        input: { type: 'FormBuilder', props: { type: 'form_builder', title: '下一步', submitLabel: '提交', fields: [{ name: 'focus', type: 'select', label: '关注点', options: ['渲染', '交互', '导出'] }] }, children: [] },
      },
    };
    try {
      if (!window.Vizual) throw new Error('dist/vizual.standalone.js not loaded. Run npm run build first.');
      window.Vizual.renderSpec(dashboard, document.getElementById('dashboard'));
      window.Vizual.renderSpec(planning, document.getElementById('planning'));
      window.Vizual.renderSpec(form, document.getElementById('form'));
      document.getElementById('status').textContent = 'Rendered dashboard, planning, and form acceptance surfaces.';
    } catch (error) {
      document.getElementById('status').textContent = error.message;
      throw error;
    }
  </script>
</body>
</html>
