<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Full 32-Component Test + Export API</title>
  <style>
    body{font-family:system-ui;background:var(--rk-bg-primary,#0f0f1a);color:var(--rk-text-primary,#e0e0e0);padding:24px;margin:0}
    h2{margin-top:0}
    #summary{font-size:18px;font-weight:700;margin:16px 0}
    .pass{color:var(--rk-success,#22c55e)}.fail{color:var(--rk-error,#ef4444)}.skip{color:var(--rk-warning,#f59e0b)}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{text-align:left;padding:6px 10px;border-bottom:1px solid var(--rk-border-subtle,#2a2a3e);font-size:12px}
    th{background:var(--rk-bg-secondary,#161625);color:var(--rk-text-secondary,#aaa);font-weight:600}
    .exp-btn{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--rk-border-subtle,#2a2a3e);background:var(--rk-bg-tertiary,#252836);color:var(--rk-text-secondary,#aaa);cursor:pointer;margin-left:6px}
    .exp-btn:hover{background:var(--rk-accent,#667eea);color:#fff}
    .row-pass td{color:var(--rk-success,#22c55e)}.row-fail td{color:var(--rk-error,#ef4444)}.row-skip td{color:var(--rk-warning,#f59e0b)}
  </style>
</head>
<body>
  <h2>Full 32-Component Test + Export API</h2>
  <div id="summary">Running...</div>
  <table>
    <thead><tr><th>#</th><th>Component</th><th>Status</th><th>Details</th></tr></thead>
    <tbody id="results"></tbody>
  </table>

  <!-- vizual.standalone.js includes React, ReactDOM, ECharts, and mermaid — zero CDN needed -->
  <script src="../dist/vizual.standalone.js"></script>
  <div id="export-section" style="display:none;margin-top:32px;border-top:2px solid var(--rk-border-subtle,#2a2a3e);padding-top:20px">
    <h2 style="margin-bottom:8px">Export API Test</h2>
    <p style="font-size:12px;color:var(--rk-text-secondary);margin-bottom:16px">导出任意已渲染的组件为 PNG。点击按钮下载。</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <button class="export-btn" data-format="png" style="padding:8px 20px;border-radius:6px;border:1px solid var(--rk-border-subtle,#2a2a3e);background:var(--rk-bg-secondary);color:var(--rk-text-primary);cursor:pointer;font-size:13px;transition:all .15s">Export Full Page → PNG</button>
    </div>
    <div id="export-status" style="font-size:12px;color:var(--rk-success)"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
      <div style="border:1px solid var(--rk-border-subtle);border-radius:8px;overflow:hidden">
        <div style="font-size:10px;color:var(--rk-text-tertiary);padding:4px 8px;background:var(--rk-bg-secondary);border-bottom:1px solid var(--rk-border-subtle)">BarChart Export Target</div>
        <div id="export-chart" style="padding:8px"></div>
      </div>
      <div style="border:1px solid var(--rk-border-subtle);border-radius:8px;overflow:hidden">
        <div style="font-size:10px;color:var(--rk-text-tertiary);padding:4px 8px;background:var(--rk-bg-secondary);border-bottom:1px solid var(--rk-border-subtle)">KpiDashboard Export Target</div>
        <div id="export-kpi" style="padding:8px"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="export-single-btn" data-target="export-chart" data-format="png" style="padding:6px 14px;border-radius:6px;border:1px solid var(--rk-border-subtle,#2a2a3e);background:var(--rk-bg-secondary);color:var(--rk-text-primary);cursor:pointer;font-size:12px">Export Chart Only → PNG</button>
      <button class="export-single-btn" data-target="export-kpi" data-format="png" style="padding:6px 14px;border-radius:6px;border:1px solid var(--rk-border-subtle,#2a2a3e);background:var(--rk-bg-secondary);color:var(--rk-text-primary);cursor:pointer;font-size:12px">Export KPI Only → PNG</button>
    </div>
  </div>
  <script>
    // Claude / Anthropic light theme
    var claudeTokens = {"colors":[{"name":"terracotta","value":"#c96442"},{"name":"accent","value":"#c96442"},{"name":"coral","value":"#d97757"},{"name":"text","value":"#141413"},{"name":"background","value":"#f5f4ed"},{"name":"card","value":"#faf9f5"},{"name":"ivory","value":"#faf9f5"},{"name":"parchment","value":"#f5f4ed"},{"name":"text-secondary","value":"#5e5d59"},{"name":"text-tertiary","value":"#87867f"},{"name":"border","value":"#f0eee6"},{"name":"border-subtle","value":"#e8e6dc"},{"name":"dark-surface","value":"#30302e"},{"name":"charcoal","value":"#4d4c48"},{"name":"success","value":"#10b981"},{"name":"warning","value":"#f59e0b"},{"name":"error","value":"#b53333"}],"typography":{"fontFamily":"Georgia, system-ui, serif","sizes":{"body":"16px","h3":"25px"},"weights":{"regular":"400","bold":"500"}},"spacing":{"baseUnit":"8px","scale":{"space-1":"4px","space-2":"8px","space-3":"16px"}},"radius":{"scale":{"sm":"6px","md":"8px","lg":"12px"}}};
    var claude = Vizual.mapDesignTokensToTheme(claudeTokens, 'claude');
    Vizual.registerTheme(claude.name, claude);
    var claudeL = Vizual.invertTheme(claude);
    Vizual.registerTheme(claudeL.name, claudeL);
    Vizual.setGlobalTheme('claude');

    // Retained components (17 simple ones removed in architecture refactor)
    var tests = [
      // === 19 Chart Components (mviz bridge via ECharts) ===
      { type: 'BarChart', category: 'chart', props: { title: 'Sales', x: 'quarter', y: 'revenue', data: [{quarter:'Q1',revenue:120},{quarter:'Q2',revenue:200},{quarter:'Q3',revenue:150},{quarter:'Q4',revenue:180}] } },
      { type: 'LineChart', category: 'chart', props: { title: 'Trend', x: 'month', y: 'value', data: [{month:'Jan',value:30},{month:'Feb',value:45},{month:'Mar',value:28}] } },
      { type: 'PieChart', category: 'chart', props: { title: 'Share', category: 'name', value: 'val', data: [{name:'A',val:30},{name:'B',val:50},{name:'C',val:20}] } },
      { type: 'ScatterChart', category: 'chart', props: { title: 'Points', x: 'height', y: 'weight', data: [{height:160,weight:50},{height:170,weight:65},{height:180,weight:80}] } },
      { type: 'AreaChart', category: 'chart', props: { title: 'Revenue', x: 'month', y: 'revenue', data: [{month:'Jan',revenue:100},{month:'Feb',revenue:150},{month:'Mar',revenue:120}] } },
      { type: 'SparklineChart', category: 'chart', props: { x: 'day', y: 'price', data: [{day:1,price:10},{day:2,price:15},{day:3,price:12},{day:4,price:18},{day:5,price:22}] } },
      { type: 'HistogramChart', category: 'chart', props: { title: 'Distribution', x: 'score', data: [{score:65},{score:72},{score:78},{score:85},{score:90}] } },
      { type: 'HeatmapChart', category: 'chart', props: { title: 'Heat', x: 'hour', y: 'day', value: 'temp', data: [{hour:'9am',day:'Mon',temp:20},{hour:'12pm',day:'Mon',temp:30},{hour:'9am',day:'Tue',temp:22}] } },
      { type: 'BubbleChart', category: 'chart', props: { title: 'Market', x: 'price', y: 'volume', size: 'cap', data: [{price:100,volume:50,cap:200},{price:200,volume:80,cap:350}] } },
      { type: 'BoxplotChart', category: 'chart', props: { title: 'Scores', x: 'subject', y: 'score', data: [{subject:'Math',score:65},{subject:'Math',score:72},{subject:'Math',score:85},{subject:'Eng',score:55},{subject:'Eng',score:68},{subject:'Eng',score:78}] } },
      { type: 'CalendarChart', category: 'chart', props: { title: 'Activity', date: 'day', value: 'count', data: [{day:'2024-01-01',count:5},{day:'2024-01-02',count:8},{day:'2024-01-03',count:3}] } },
      { type: 'FunnelChart', category: 'chart', props: { title: 'Conversion', category: 'stage', value: 'count', data: [{stage:'Visit',count:1000},{stage:'Signup',count:500},{stage:'Buy',count:100}] } },
      { type: 'SankeyChart', category: 'chart', props: { title: 'Flow', nodes: [{name:'A'},{name:'B'},{name:'C'}], links: [{source:'A',target:'B',value:10},{source:'B',target:'C',value:5}] } },
      { type: 'ComboChart', category: 'chart', props: { title: 'Mixed', x: 'month', y: ['sales','cost'], data: [{month:'Jan',sales:100,cost:80},{month:'Feb',sales:120,cost:90}] } },
      { type: 'WaterfallChart', category: 'chart', props: { title: 'Q3 P&L Waterfall (万元)', x: 'item', value: 'amount', data: [
        {item:'总营收',amount:1200},
        {item:'产品成本',amount:-420},
        {item:'毛利润',amount:0},
        {item:'研发费用',amount:-180},
        {item:'销售费用',amount:-150},
        {item:'管理费用',amount:-90},
        {item:'运营利润',amount:0},
        {item:'利息收入',amount:25},
        {item:'其他支出',amount:-35},
        {item:'净利润',amount:0}
      ] } },
      { type: 'XmrChart', category: 'chart', props: { title: 'SPC', x: 'sample', y: 'measurement', data: [{sample:1,measurement:10.2},{sample:2,measurement:10.5},{sample:3,measurement:9.8}] } },
      { type: 'DumbbellChart', category: 'chart', props: { title: 'Range', x: 'name', low: 'low', high: 'high', data: [{name:'A',low:10,high:80},{name:'B',low:20,high:90}] } },
      { type: 'RadarChart', category: 'chart', props: { title: 'Skills', indicators: [{name:'Speed',max:100},{name:'Power',max:100},{name:'Range',max:100},{name:'Efficiency',max:100},{name:'Safety',max:100}], series: [{name:'Car A',values:[85,70,90,60,80]},{name:'Car B',values:[60,85,70,90,65]}] } },
      { type: 'MermaidDiagram', category: 'chart', props: { code: 'graph LR\n  A-->B\n  B-->C' } },

      // === Data Components ===
      { type: 'DataTable', category: 'ui', props: { title: 'Users', columns: [{key:'name',label:'Name'},{key:'age',label:'Age'}], data: [{name:'Alice',age:30},{name:'Bob',age:25}] } },

      // === Business Components ===
      { type: 'Timeline', category: 'business', props: { title: 'History', events: [{date:'2024-01-01',title:'Start',description:'Project kick-off'},{date:'2024-02-01',title:'MVP',description:'First release'}] } },
      { type: 'Kanban', category: 'business', props: { title: 'Sprint', columns: [{id:'todo',title:'To Do',cards:[{id:1,title:'Task A'}]},{id:'done',title:'Done',cards:[]}] } },
      { type: 'GanttChart', category: 'business', props: { title: 'Timeline', tasks: [{name:'Design',start:'2024-01-01',end:'2024-01-15'},{name:'Build',start:'2024-01-10',end:'2024-02-01'}] } },
      { type: 'OrgChart', category: 'business', props: { title: 'Team', nodes: [{id:1,name:'CEO',children:[{id:2,name:'CTO'},{id:3,name:'CFO'}]}] } },
      { type: 'KpiDashboard', category: 'business', props: { title: 'Dashboard', metrics: [{label:'Revenue',value:'$1.2M',trend:'up',trendValue:'+15%'},{label:'Users',value:'45K',trend:'up',trendValue:'+8%'}] } },
      { type: 'AuditLog', category: 'business', props: { title: 'Log', entries: [{time:'10:00',user:'Alice',action:'Created',target:'Report A'},{time:'10:05',user:'Bob',action:'Updated',target:'Report B'}] } },

      // === Input Components ===
      { type: 'FormBuilder', category: 'input', props: { title: 'Survey', fields: [
        {name:'satisfaction',label:'How satisfied?',type:'select',options:['Very','Somewhat','Not'],defaultValue:'Somewhat'},
        {name:'recommend',label:'Would recommend?',type:'radio',options:['Yes','No','Maybe']},
        {name:'features',label:'Liked features',type:'checkbox',options:['Speed','UI','Support','Price'],defaultValue:['Speed','UI']},
        {name:'newsletter',label:'Subscribe newsletter',type:'switch',defaultValue:true},
        {name:'budget',label:'Budget range',type:'slider',min:0,max:1000,step:50,defaultValue:300},
        {name:'color',label:'Favorite color',type:'color',defaultValue:'#3b82f6'},
        {name:'birthdate',label:'Birth date',type:'date',defaultValue:'2000-06-15'},
        {name:'meeting',label:'Meeting time',type:'datetime',defaultValue:'2024-07-20T14:30'},
        {name:'alarm',label:'Alarm',type:'time',defaultValue:'08:30'},
        {name:'rating',label:'Overall rating',type:'rating',max:5,defaultValue:4},
      ] } },

      // === 3 Layout Components ===
      { type: 'GridLayout', category: 'layout', props: { columns: 2, gap: 12 }, childSpec: function(rootId) {
        return {
          root: rootId,
          elements: (function() {
            var els = {};
            els[rootId] = { type: 'GridLayout', props: { columns: 2, gap: 12 }, children: ['g1','g2','g3','g4'] };
            els['g1'] = { type: 'BarChart', props: { title: 'Revenue', x: 'q', y: 'v', data: [{q:'Q1',v:120},{q:'Q2',v:200}] }, children: [] };
            els['g2'] = { type: 'PieChart', props: { title: 'Share', category: 'n', value: 'v', data: [{n:'A',v:60},{n:'B',v:40}] }, children: [] };
            els['g3'] = { type: 'LineChart', props: { title: 'Trend', x: 'm', y: 'v', data: [{m:'Jan',v:30},{m:'Feb',v:45}] }, children: [] };
            els['g4'] = { type: 'SparklineChart', props: { x: 'd', y: 'p', data: [{d:1,p:10},{d:2,p:15},{d:3,p:12}] }, children: [] };
            return els;
          })()
        };
      }},
      { type: 'SplitLayout', category: 'layout', props: { direction: 'horizontal', ratio: 40, gap: 8 }, childSpec: function(rootId) {
        return {
          root: rootId,
          elements: (function() {
            var els = {};
            els[rootId] = { type: 'SplitLayout', props: { direction: 'horizontal', ratio: 40, gap: 8 }, children: ['s1','s2'] };
            els['s1'] = { type: 'BarChart', props: { title: 'Sales', x: 'q', y: 'v', data: [{q:'Q1',v:100},{q:'Q2',v:150}] }, children: [] };
            els['s2'] = { type: 'PieChart', props: { title: 'Share', category: 'n', value: 'v', data: [{n:'A',v:60},{n:'B',v:40}] }, children: [] };
            return els;
          })()
        };
      }},
      { type: 'HeroLayout', category: 'layout', props: { height: 120, background: 'gradient', align: 'center' }, childSpec: function(rootId) {
        return {
          root: rootId,
          elements: (function() {
            var els = {};
            els[rootId] = { type: 'HeroLayout', props: { height: 120, background: 'gradient', align: 'center' }, children: ['h1'] };
            els['h1'] = { type: 'AuditLog', props: { title: 'Welcome', entries: [{time:'Now',user:'Vizual',action:'Launched',target:'AI-powered data visualization'}] }, children: [] };
            return els;
          })()
        };
      }},
    ];

    var PASS_COUNT = 0, FAIL_COUNT = 0, SKIP_COUNT = 0;
    var idx = 0;

    function runNext() {
      if (idx >= tests.length) { showSummary(); return; }
      var test = tests[idx];
      var div = document.createElement('div');
      div.className = 'chart-box';
      div.id = 'chart-' + idx;
      div.style.cssText = 'border:1px solid #2a2a3e;border-radius:4px;min-height:10px;margin:2px 0;overflow:hidden';
      document.body.appendChild(div);

      try {
        if (test.childSpec) {
          // Layout components: use flat element map with ID references
          Vizual.renderSpec(test.childSpec('m'), div);
        } else {
          Vizual.renderSpec({ root: 'm', elements: { m: { type: test.type, props: test.props, children: [] } } }, div);
        }
      } catch(e) { /* caught */ }

      setTimeout(function() {
        var html = div.innerHTML;
        var info = checkResult(test, html);
        if (info.skip) SKIP_COUNT++;
        else if (info.pass) PASS_COUNT++;
        else FAIL_COUNT++;
        addRow(idx + 1, test.type, info);
        idx++;
        runNext();
      }, 1200);
    }

    function checkResult(test, html) {
      var hasEcharts = html.indexOf('_echarts_instance_') !== -1;
      var hasCanvas = html.indexOf('<canvas') !== -1;
      var hasSvg = html.indexOf('<svg') !== -1;
      var hasTable = html.indexOf('<table') !== -1 || html.indexOf('<th') !== -1 || html.indexOf('<td') !== -1;
      var hasText = html.replace(/<[^>]*>/g, '').trim().length > 5;
      var htmlLen = html.length;
      var t = test.type;

      // ECharts charts: need _echarts_instance_ + <canvas>
      var echartsTypes = ['BarChart','LineChart','PieChart','ScatterChart','AreaChart','SparklineChart',
        'HistogramChart','HeatmapChart','BubbleChart','BoxplotChart','CalendarChart','FunnelChart',
        'SankeyChart','ComboChart','WaterfallChart','XmrChart','DumbbellChart','RadarChart'];
      if (echartsTypes.indexOf(t) !== -1) {
        if (hasEcharts && hasCanvas) return { pass: true, detail: 'ECharts+canvas OK (' + htmlLen + ')' };
        if (hasEcharts) return { pass: false, detail: 'ECharts but no canvas (' + htmlLen + ')' };
        return { pass: false, detail: 'No ECharts (' + htmlLen + ')' };
      }

      // MermaidDiagram: needs mermaid CDN loaded
      if (t === 'MermaidDiagram') {
        if (hasSvg) return { pass: true, detail: 'SVG rendered (' + htmlLen + ')' };
        if (htmlLen > 50) return { pass: false, detail: 'No SVG (mermaid CDN not loaded?) (' + htmlLen + ')' };
        return { pass: false, detail: 'Empty (' + htmlLen + ')' };
      }

      // DataTable: table structure
      if (t === 'DataTable') {
        if (hasTable) return { pass: true, detail: 'Table rendered (' + htmlLen + ')' };
        return { pass: false, detail: 'No table (' + htmlLen + ')' };
      }

      // Layout components: grid/flex CSS + child content
      var layoutTypes = ['GridLayout', 'SplitLayout', 'HeroLayout'];
      if (layoutTypes.indexOf(t) !== -1) {
        var hasGrid = html.indexOf('grid') !== -1;
        var hasFlex = html.indexOf('flex') !== -1;
        if ((hasGrid || hasFlex) && htmlLen > 100) return { pass: true, detail: 'Layout rendered (' + htmlLen + ')' };
        if (htmlLen > 100) return { pass: true, detail: 'Content present (' + htmlLen + ')' };
        return { pass: false, detail: 'Empty/missing (' + htmlLen + ')' };
      }

      // Everything else: meaningful HTML content
      if (htmlLen > 30 && hasText) return { pass: true, detail: 'Content OK (' + htmlLen + ')' };
      if (htmlLen > 30) return { pass: true, detail: 'HTML present (' + htmlLen + ')' };
      return { pass: false, detail: 'Empty/missing (' + htmlLen + ')' };
    }

    function addRow(num, type, info) {
      var tbody = document.getElementById('results');
      var tr = document.createElement('tr');
      tr.className = info.skip ? 'row-skip' : (info.pass ? 'row-pass' : 'row-fail');
      var status = info.skip ? 'SKIP' : (info.pass ? 'PASS' : 'FAIL');
      tr.innerHTML = '<td>' + num + '</td><td>' + type + '</td><td>' + status +
        '</td><td>' + info.detail +
        ' <button class="exp-btn" data-idx="' + (num - 1) + '" data-name="' + type + '">PNG</button>' +
        '</td>';
      tbody.appendChild(tr);
    }

    function showSummary() {
      var el = document.getElementById('summary');
      el.textContent = 'DONE: ' + PASS_COUNT + '/' + tests.length + ' passed, ' + FAIL_COUNT + ' failed, ' + SKIP_COUNT + ' skipped';
      el.className = FAIL_COUNT === 0 ? 'pass' : 'fail';

      // Bind per-row export buttons via event delegation
      document.getElementById('results').addEventListener('click', function(e) {
        var btn = e.target.closest('.exp-btn');
        if (!btn) return;
        var i = parseInt(btn.dataset.idx);
        var name = btn.dataset.name;
        var el = document.getElementById('chart-' + i);
        if (!el) return;
        Vizual.downloadPNG(el, { filename: name, scale: 2 })
          .catch(function(err) { console.error('Export PNG failed:', err); });
      });

      // After component test, launch theme + export tests
      setTimeout(initThemeTest, 300);
      setTimeout(initExportTest, 600);
    }

    runNext();

    // ═══════════════════════════════════════════════════════════
    // Theme Adaptation Test — 拟真全量主题适配测试
    // 验证：颜色调色板、圆角、间距、字号、暗亮模式
    // ═══════════════════════════════════════════════════════════

    // --- 4 套预设主题 DesignTokens ---
    var themePresets = {
      'claude': { colors:[
        {name:'accent',value:'#c96442'},{name:'background',value:'#f5f4ed'},{name:'text',value:'#141413'},
        {name:'card',value:'#faf9f5'},{name:'success',value:'#10b981'},{name:'warning',value:'#f59e0b'},{name:'error',value:'#b53333'}
      ], typography:{fontFamily:'Georgia, system-ui, serif',sizes:{body:'16px',h3:'25px'},weights:{regular:'400',bold:'500'}}, spacing:{baseUnit:'8px',scale:{'space-1':'4px','space-2':'8px','space-3':'16px'}}, radius:{scale:{sm:'6px',md:'8px',lg:'12px'}}},
      'tech-blue': { colors:[
        {name:'accent',value:'#667eea'},{name:'background',value:'#f0f4ff'},{name:'text',value:'#1a1a2e'},
        {name:'card',value:'#e8eeff'},{name:'success',value:'#10b981'},{name:'warning',value:'#f59e0b'},{name:'error',value:'#ef4444'}
      ], typography:{fontFamily:'Inter, system-ui, sans-serif',sizes:{body:'14px',h3:'20px'},weights:{regular:'400',bold:'600'}}, spacing:{baseUnit:'6px',scale:{'space-1':'4px','space-2':'6px','space-3':'10px'}}, radius:{scale:{sm:'6px',md:'10px',lg:'14px'}}},
      'forest-green': { colors:[
        {name:'accent',value:'#10b981'},{name:'background',value:'#f0fdf4'},{name:'text',value:'#052e16'},
        {name:'card',value:'#dcfce7'},{name:'success',value:'#22c55e'},{name:'warning',value:'#eab308'},{name:'error',value:'#dc2626'}
      ], typography:{fontFamily:'system-ui, sans-serif',sizes:{body:'14px',h3:'22px'},weights:{regular:'400',bold:'700'}}, spacing:{baseUnit:'10px',scale:{'space-1':'6px','space-2':'10px','space-3':'14px'}}, radius:{scale:{sm:'8px',md:'12px',lg:'16px'}}},
      'warm-orange': { colors:[
        {name:'accent',value:'#f97316'},{name:'background',value:'#fffbeb'},{name:'text',value:'#431407'},
        {name:'card',value:'#fef3c7'},{name:'success',value:'#10b981'},{name:'warning',value:'#eab308'},{name:'error',value:'#ef4444'}
      ], typography:{fontFamily:'system-ui, sans-serif',sizes:{body:'15px',h3:'24px'},weights:{regular:'400',bold:'700'}}, spacing:{baseUnit:'8px',scale:{'space-1':'5px','space-2':'8px','space-3':'12px'}}, radius:{scale:{sm:'3px',md:'6px',lg:'10px'}}}
    };

    // --- 可变数据集（3/6/12 档） ---
    var dataSlices = {
      pie: {
        3: [{name:'Alpha',val:40},{name:'Beta',val:35},{name:'Gamma',val:25}],
        6: [{name:'Alpha',val:25},{name:'Beta',val:20},{name:'Gamma',val:18},{name:'Delta',val:15},{name:'Echo',val:12},{name:'Foxtrot',val:10}],
        12: [{name:'Jan',val:12},{name:'Feb',val:10},{name:'Mar',val:11},{name:'Apr',val:9},{name:'May',val:8},{name:'Jun',val:10},{name:'Jul',val:9},{name:'Aug',val:8},{name:'Sep',val:7},{name:'Oct',val:6},{name:'Nov',val:5},{name:'Dec',val:5}]
      },
      bar: {
        3: [{name:'Q1',value:120},{name:'Q2',value:200},{name:'Q3',value:160}],
        6: [{name:'Alpha',value:96},{name:'Beta',value:93},{name:'Gamma',value:91},{name:'Delta',value:88},{name:'Echo',value:85},{name:'Foxtrot',value:82}],
        12: [{name:'A',value:45},{name:'B',value:38},{name:'C',value:52},{name:'D',value:29},{name:'E',value:61},{name:'F',value:33},{name:'G',value:48},{name:'H',value:27},{name:'I',value:55},{name:'J',value:41},{name:'K',value:36},{name:'L',value:44}]
      },
      radar: {
        3: {indicators:[{name:'Speed',max:100},{name:'Power',max:100},{name:'Range',max:100}],series:[{name:'X',values:[85,70,90]},{name:'Y',values:[60,85,70]}]},
        6: {indicators:[{name:'Speed',max:100},{name:'Power',max:100},{name:'Range',max:100},{name:'Efficiency',max:100},{name:'Safety',max:100},{name:'Cost',max:100}],series:[{name:'Model A',values:[85,70,90,60,80,75]},{name:'Model B',values:[60,85,70,90,65,80]}]},
        12: {indicators:[{name:'Jan',max:100},{name:'Feb',max:100},{name:'Mar',max:100},{name:'Apr',max:100},{name:'May',max:100},{name:'Jun',max:100},{name:'Jul',max:100},{name:'Aug',max:100},{name:'Sep',max:100},{name:'Oct',max:100},{name:'Nov',max:100},{name:'Dec',max:100}],series:[{name:'2024',values:[65,70,75,80,72,68,78,82,76,80,85,90]},{name:'2023',values:[55,60,65,70,62,58,68,72,66,70,75,80]}]}
      }
    };

    var currentThemeName = 'cmb';
    var currentDataCount = 6;
    var themeRegistry = {}; // name → theme object

    function initThemeTest() {
      // Register all preset themes + their inverted variants
      for (var key in themePresets) {
        var t = Vizual.mapDesignTokensToTheme(themePresets[key], key);
        Vizual.registerTheme(t.name, t);
        themeRegistry[t.name] = t;
        var inv = Vizual.invertTheme(t);
        Vizual.registerTheme(inv.name, inv);
        themeRegistry[inv.name] = inv;
      }

      // Build UI
      var sec = document.createElement('div');
      sec.id = 'theme-test-section';
      sec.innerHTML = [
        '<h2 style="margin-top:32px;border-top:2px solid var(--rk-border-subtle,#2a2a3e);padding-top:20px">Theme Adaptation Test</h2>',
        '<div id="theme-controls" style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px">',
        '  <div id="theme-btns" style="display:flex;gap:6px"></div>',
        '  <input id="custom-accent" type="color" value="#c8152d" title="Custom accent color" style="width:36px;height:30px;border:1px solid var(--rk-border-subtle);border-radius:6px;cursor:pointer">',
        '  <button id="apply-custom" style="padding:6px 12px;border-radius:6px;border:1px solid var(--rk-border-subtle);background:var(--rk-bg-secondary);color:var(--rk-text-primary);cursor:pointer;font-size:12px">Custom</button>',
        '  <div style="display:flex;align-items:center;gap:6px;margin-left:auto">',
        '    <span style="font-size:12px;color:var(--rk-text-tertiary)">Data:</span>',
        '    <select id="data-count" style="padding:4px 8px;border-radius:6px;border:1px solid var(--rk-border-subtle);background:var(--rk-bg-secondary);color:var(--rk-text-primary);font-size:12px">',
        '      <option value="3">3 items</option><option value="6" selected>6 items</option><option value="12">12 items</option>',
        '    </select>',
        '  </div>',
        '  <div style="display:flex;align-items:center;gap:6px">',
        '    <span style="font-size:12px;color:var(--rk-text-tertiary)">Dark</span>',
        '    <div id="mode-toggle" style="width:44px;height:24px;border-radius:12px;background:var(--rk-bg-tertiary);cursor:pointer;position:relative;transition:background .2s">',
        '      <div id="mode-thumb" style="width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s"></div>',
        '    </div>',
        '    <span style="font-size:12px;color:var(--rk-text-tertiary)">Light</span>',
        '  </div>',
        '</div>',
        '<div id="palette-bar" style="display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap"></div>',
        '<div id="theme-vars" style="font-size:11px;color:var(--rk-text-tertiary);margin-bottom:16px;font-family:monospace"></div>',
        '<div id="theme-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:12px"></div>',
        '<div id="mapping-report" style="margin-top:16px;padding:10px 14px;background:var(--rk-bg-secondary);border:1px solid var(--rk-border-subtle);border-radius:8px;font-size:11px;color:var(--rk-text-secondary)"></div>'
      ].join('\n');
      document.body.appendChild(sec);

      // Theme buttons
      var btnContainer = document.getElementById('theme-btns');
      var labels = {'claude':'Claude','tech-blue':'Tech Blue','forest-green':'Forest','warm-orange':'Warm Orange'};
      for (var key in labels) {
        var btn = document.createElement('button');
        btn.textContent = labels[key];
        btn.dataset.theme = key;
        btn.style.cssText = 'padding:6px 14px;border-radius:6px;border:1px solid var(--rk-border-subtle);background:var(--rk-bg-secondary);color:var(--rk-text-primary);cursor:pointer;font-size:12px;transition:all .15s';
        btn.onclick = function() { switchTheme(this.dataset.theme); updateActiveBtn(this); };
        btnContainer.appendChild(btn);
      }
      // Set CMB active by default
      btnContainer.children[0].style.background = 'var(--rk-accent)';
      btnContainer.children[0].style.color = '#fff';
      btnContainer.children[0].style.borderColor = 'var(--rk-accent)';

      // Custom accent
      document.getElementById('apply-custom').onclick = function() {
        var hex = document.getElementById('custom-accent').value;
        var customTokens = { colors:[
          {name:'accent',value:hex},{name:'background',value:'#ffffff'},{name:'text',value:'#1a1a1a'},
          {name:'success',value:'#10b981'},{name:'warning',value:'#f59e0b'},{name:'error',value:'#ef4444'}
        ], typography:{fontFamily:'system-ui, sans-serif',sizes:{body:'14px',h3:'22px'},weights:{regular:'400',bold:'700'}}, spacing:{baseUnit:'8px',scale:{'space-1':'4px','space-2':'8px'}}, radius:{scale:{md:'8px'}}};
        var ct = Vizual.mapDesignTokensToTheme(customTokens, 'custom');
        Vizual.registerTheme(ct.name, ct);
        themeRegistry[ct.name] = ct;
        var ci = Vizual.invertTheme(ct);
        Vizual.registerTheme(ci.name, ci);
        themeRegistry[ci.name] = ci;
        switchTheme('custom');
        updateActiveBtn(null);
      };

      // Data count
      document.getElementById('data-count').onchange = function() {
        currentDataCount = parseInt(this.value);
        renderThemeGrid();
      };

      // Mode toggle
      document.getElementById('mode-toggle').onclick = function() {
        var mode = Vizual.toggleMode();
        currentThemeName = Vizual.getCurrentThemeName();
        var thumb = document.getElementById('mode-thumb');
        if (mode === 'light') { thumb.style.left = '22px'; this.style.background = 'var(--rk-accent)'; }
        else { thumb.style.left = '2px'; this.style.background = 'var(--rk-bg-tertiary)'; }
        renderThemeGrid();
        updatePaletteBar();
        updateThemeVars();
      };

      // Initial render
      switchTheme('claude');
    }

    function updateActiveBtn(activeBtn) {
      var btns = document.querySelectorAll('#theme-btns button');
      btns.forEach(function(b) {
        b.style.background = 'var(--rk-bg-secondary)';
        b.style.color = 'var(--rk-text-primary)';
        b.style.borderColor = 'var(--rk-border-subtle)';
      });
      if (activeBtn) {
        activeBtn.style.background = 'var(--rk-accent)';
        activeBtn.style.color = '#fff';
        activeBtn.style.borderColor = 'var(--rk-accent)';
      }
    }

    function switchTheme(name) {
      currentThemeName = name;
      Vizual.setGlobalTheme(name);
      renderThemeGrid();
      updatePaletteBar();
      updateThemeVars();
      updateMappingReport();
      // Reset mode toggle visual
      var theme = Vizual.getTheme(name);
      var thumb = document.getElementById('mode-thumb');
      var track = document.getElementById('mode-toggle');
      if (theme && theme.mode === 'light') { thumb.style.left = '22px'; track.style.background = 'var(--rk-accent)'; }
      else { thumb.style.left = '2px'; track.style.background = 'var(--rk-bg-tertiary)'; }
    }

    function updatePaletteBar() {
      var bar = document.getElementById('palette-bar');
      var colors = Vizual.chartColors(6);
      bar.innerHTML = colors.map(function(c, i) {
        return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">' +
          '<div style="width:48px;height:24px;background:' + c + ';border-radius:4px;border:1px solid var(--rk-border-subtle)"></div>' +
          '<span style="font-size:9px;font-family:monospace;color:var(--rk-text-tertiary)">' + c + '</span>' +
          '<span style="font-size:8px;color:var(--rk-text-tertiary)">chart-' + (i+1) + '</span></div>';
      }).join('');
    }

    function updateThemeVars() {
      var el = document.getElementById('theme-vars');
      var vars = ['--rk-accent','--rk-bg-primary','--rk-text-primary','--rk-border-subtle',
        '--rk-radius-sm','--rk-radius-md','--rk-radius-lg',
        '--rk-space-1','--rk-space-2','--rk-space-3',
        '--rk-text-sm','--rk-text-base','--rk-text-lg',
        '--rk-font-sans'];
      el.innerHTML = vars.map(function(v) {
        return '<span style="margin-right:14px">' + v + ': <b style="color:var(--rk-text-primary)">' + Vizual.tc(v) + '</b></span>';
      }).join('');
    }

    function updateMappingReport() {
      var el = document.getElementById('mapping-report');
      var theme = Vizual.getTheme(currentThemeName);
      if (!theme || !theme._mappingReport) { el.textContent = 'No mapping report'; return; }
      var r = theme._mappingReport;
      var roles = r.roles || {};
      var stats = r.stats || {};
      var html = '<b>Mapping Report:</b> ';
      for (var role in roles) {
        var ok = roles[role];
        html += '<span style="color:' + (ok ? 'var(--rk-success)' : 'var(--rk-error)') + '">' + role + (ok ? '✓' : '✗') + '</span> ';
      }
      html += '&nbsp;|&nbsp; Chart: ' + (stats.chartAutoGenerated || 0) + ' auto-generated, ' + (stats.chartExplicit || 0) + ' explicit';
      html += '&nbsp;|&nbsp; Mode: ' + (theme.mode || 'dark');
      el.innerHTML = html;
    }

    function renderSpec(type, props, container) {
      container.innerHTML = '';
      try {
        Vizual.renderSpec({ root:'m', elements:{ m:{ type:type, props:props, children:[] } } }, container);
      } catch(e) {
        container.innerHTML = '<div style="color:var(--rk-error);font-size:11px;padding:8px">Error: ' + e.message + '</div>';
      }
    }

    function renderThemeGrid() {
      var grid = document.getElementById('theme-grid');
      grid.innerHTML = '';
      var n = currentDataCount;

      // Helper: create slot with label
      function slot(label, type, props, wide) {
        var wrap = document.createElement('div');
        wrap.style.cssText = 'border:1px solid var(--rk-border-subtle);border-radius:var(--rk-radius-md,8px);overflow:visible' + (wide ? ';grid-column:1/-1' : '');
        var lbl = document.createElement('div');
        lbl.style.cssText = 'font-size:10px;color:var(--rk-text-tertiary);padding:4px 8px;background:var(--rk-bg-secondary);border-bottom:1px solid var(--rk-border-subtle)';
        lbl.textContent = label;
        var content = document.createElement('div');
        content.style.cssText = 'padding:8px;min-height:40px';
        wrap.appendChild(lbl);
        wrap.appendChild(content);
        renderSpec(type, props, content);
        return wrap;
      }

      // Row 1: Chart components (palette validation)
      grid.appendChild(slot('PieChart — ' + n + ' sectors', 'PieChart',
        { title:'Market Share', category:'name', value:'val', data: dataSlices.pie[n] }));
      grid.appendChild(slot('BarChart — ' + n + ' bars', 'BarChart',
        { title:'Performance', x:'name', y:'value', data: dataSlices.bar[n] }));
      grid.appendChild(slot('RadarChart — ' + n + ' axes', 'RadarChart',
        { title:'Comparison', indicators: dataSlices.radar[n].indicators, series: dataSlices.radar[n].series }));

      // Row 2: Business components (radius/spacing/font validation)
      var metrics = n <= 6 ? [
        {label:'Revenue',value:'$1.2M',trend:'up',trendValue:'+15%'},
        {label:'Users',value:'45K',trend:'up',trendValue:'+8%'},
        {label:'Churn',value:'3.2%',trend:'down',trendValue:'-1.1%'},
        {label:'NPS',value:'72',trend:'up',trendValue:'+5'},
        {label:'ARPU',value:'$28',trend:'up',trendValue:'+$2'},
        {label:'Retention',value:'89%',trend:'up',trendValue:'+3%'}
      ].slice(0, n) : [
        {label:'M1',value:'$1M',trend:'up',trendValue:'+10%'},{label:'M2',value:'$2M',trend:'up',trendValue:'+5%'},
        {label:'M3',value:'$1.5M',trend:'down',trendValue:'-2%'},{label:'M4',value:'$3M',trend:'up',trendValue:'+20%'},
        {label:'M5',value:'$2.5M',trend:'up',trendValue:'+8%'},{label:'M6',value:'$4M',trend:'up',trendValue:'+15%'},
        {label:'M7',value:'$3.5M',trend:'down',trendValue:'-5%'},{label:'M8',value:'$5M',trend:'up',trendValue:'+25%'},
        {label:'M9',value:'$4.5M',trend:'up',trendValue:'+12%'},{label:'M10',value:'$6M',trend:'up',trendValue:'+18%'},
        {label:'M11',value:'$5.5M',trend:'down',trendValue:'-3%'},{label:'M12',value:'$7M',trend:'up',trendValue:'+22%'}
      ];
      grid.appendChild(slot('KpiDashboard — ' + metrics.length + ' metrics', 'KpiDashboard',
        { title:'Dashboard', metrics: metrics }));

      var kanbanCards = function(count) {
        var cols = [
          {id:'backlog',title:'Backlog',cards:[]},
          {id:'todo',title:'To Do',cards:[]},
          {id:'progress',title:'In Progress',cards:[]},
          {id:'review',title:'Review',cards:[]},
          {id:'done',title:'Done',cards:[]}
        ];
        for (var i = 0; i < count; i++) {
          var ci = i % 5;
          cols[ci].cards.push({id:i+1, title:'Task ' + String.fromCharCode(65+i)});
        }
        return cols;
      };
      grid.appendChild(slot('Kanban — ' + n + ' cards', 'Kanban',
        { title:'Sprint Board', columns: kanbanCards(n) }));

      // Row 3: Wide components
      var tableCols = [{key:'name',label:'Name'},{key:'dept',label:'Dept'},{key:'score',label:'Score'},{key:'status',label:'Status'}];
      var tableRows = function(count) {
        var depts = ['Engineering','Marketing','Sales','Design','Ops','Finance','Legal','HR','QA','Support','Product','Research'];
        var statuses = ['Active','Active','Pending','Active','Review','Active','Pending','Active','Review','Active','Active','Active'];
        var rows = [];
        for (var i = 0; i < count; i++) {
          rows.push({name:'Member ' + (i+1), dept:depts[i%depts.length], score: String(70 + Math.floor(Math.random()*25)), status:statuses[i%statuses.length]});
        }
        return rows;
      };
      grid.appendChild(slot('DataTable — ' + n + ' rows (spacing/radius/font)', 'DataTable',
        { title:'Team Directory', columns: tableCols, data: tableRows(n) }, true));

      // Row 4: Mixed
      var events = function(count) {
        var evts = [];
        for (var i = 0; i < count; i++) {
          var m = String(i+1).padStart(2,'0');
          evts.push({date:'2024-'+m+'-01', title:'Milestone ' + String.fromCharCode(65+i), description:'Phase ' + (i+1) + ' deliverable completed'});
        }
        return evts;
      };
      grid.appendChild(slot('Timeline — ' + n + ' events', 'Timeline',
        { title:'Project History', events: events(n) }));

      var logEntries = function(count) {
        var actions = ['Created','Updated','Deleted','Reviewed','Deployed','Merged','Approved','Rejected','Archived','Restored','Published','Scheduled'];
        var entries = [];
        for (var i = 0; i < count && i < 12; i++) {
          entries.push({time:String(9+i).padStart(2,'0')+':00', user:'User ' + String.fromCharCode(65+i), action:actions[i%actions.length], target:'Resource ' + (i+1)});
        }
        return entries;
      };
      grid.appendChild(slot('AuditLog — ' + n + ' entries (semantic colors)', 'AuditLog',
        { title:'Activity Log', entries: logEntries(n) }));

      grid.appendChild(slot('GanttChart — schedule (radius/spacing)', 'GanttChart',
        { title:'Project Schedule', tasks: [{name:'Design',start:'2024-01-01',end:'2024-01-15'},{name:'Build',start:'2024-01-10',end:'2024-02-01'},{name:'Test',start:'2024-01-25',end:'2024-02-15'}] }));

      // Additional chart row
      grid.appendChild(slot('ScatterChart — correlation', 'ScatterChart',
        { title:'Height vs Weight', x:'height', y:'weight', data:[{height:160,weight:50},{height:170,weight:65},{height:180,weight:80},{height:155,weight:48},{height:175,weight:72}] }));
      grid.appendChild(slot('OrgChart — hierarchy', 'OrgChart',
        { title:'Team Structure', nodes:[{id:1,name:'CEO',children:[{id:2,name:'CTO'},{id:3,name:'CFO'},{id:4,name:'COO'}]}] }));
    }

    // === Export API Test ===
    function initExportTest() {
      var sec = document.getElementById('export-section');
      sec.style.display = 'block';

      Vizual.renderSpec({ root:'m', elements:{ m:{ type:'BarChart', props:{ title:'Export Target — Revenue', x:'month', y:'revenue', data:[{month:'Jan',revenue:86},{month:'Feb',revenue:72},{month:'Mar',revenue:98},{month:'Apr',revenue:105},{month:'May',revenue:112},{month:'Jun',revenue:121}] }, children:[] } } }, document.getElementById('export-chart'));

      Vizual.renderSpec({ root:'m', elements:{ m:{ type:'KpiDashboard', props:{ metrics:[{label:'Revenue',value:'$1.2M',trend:'up',trendValue:'+15%'},{label:'Users',value:'45K',trend:'up',trendValue:'+8%'},{label:'NPS',value:'72',trend:'up',trendValue:'+5'},{label:'Churn',value:'3.2%',trend:'down',trendValue:'-1.1%'}] }, children:[] } } }, document.getElementById('export-kpi'));

      var statusEl = document.getElementById('export-status');

      document.querySelectorAll('.export-btn').forEach(function(btn) {
        btn.onclick = function() {
          statusEl.textContent = 'Exporting PNG...';
          statusEl.style.color = 'var(--rk-warning)';
          Vizual.downloadPNG(document.body, { filename: 'vizual-all-29', scale: 2 }).then(function() {
            statusEl.textContent = 'PNG downloaded!';
            statusEl.style.color = 'var(--rk-success)';
          }).catch(function(e) {
            statusEl.textContent = 'Error: ' + e.message;
            statusEl.style.color = 'var(--rk-error)';
          });
        };
        btn.onmouseenter = function() { btn.style.background = 'var(--rk-accent)'; btn.style.color = '#fff'; };
        btn.onmouseleave = function() { btn.style.background = 'var(--rk-bg-secondary)'; btn.style.color = 'var(--rk-text-primary)'; };
      });

      document.querySelectorAll('.export-single-btn').forEach(function(btn) {
        btn.onclick = function() {
          var targetId = btn.dataset.target;
          var target = document.getElementById(targetId);
          if (!target || !target.firstChild) { statusEl.textContent = 'Target not rendered yet'; return; }
          statusEl.textContent = 'Exporting ' + targetId + ' as PNG...';
          statusEl.style.color = 'var(--rk-warning)';
          Vizual.downloadPNG(target.firstChild, { filename: targetId, scale: 2 }).then(function() {
            statusEl.textContent = targetId + '.png downloaded!';
            statusEl.style.color = 'var(--rk-success)';
          }).catch(function(e) {
            statusEl.textContent = 'Error: ' + e.message;
            statusEl.style.color = 'var(--rk-error)';
          });
        };
        btn.onmouseenter = function() { btn.style.background = 'var(--rk-accent)'; btn.style.color = '#fff'; };
        btn.onmouseleave = function() { btn.style.background = 'var(--rk-bg-secondary)'; btn.style.color = 'var(--rk-text-primary)'; };
      });
    }
  </script>
</body>
</html>
