<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vizual A2UI Current Catalog Smoke Test</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    main { max-width: 1120px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    p { color: #475569; }
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-top: 16px; }
    #status { font-size: 13px; color: #475569; margin-top: 8px; }
  </style>
</head>
<body>
  <main>
    <h1>Vizual A2UI Current Catalog Smoke Test</h1>
    <p>Exercises current A2UI primitives, FormBuilder, KPI, chart, table, and Markdown composition.</p>
    <div id="status">Waiting for runtime...</div>
    <div id="app" class="panel"></div>
  </main>

  <script src="../dist/vizual.standalone.js"></script>
  <script>
    const spec = {
      root: 'root',
      elements: {
        root: { type: 'Column', props: { gap: 16 }, children: ['intro', 'kpis', 'body', 'form'] },
        intro: { type: 'Markdown', props: { content: '### 当前 A2UI 验收\n这页只覆盖当前 native core 组件。' }, children: [] },
        kpis: {
          type: 'KpiDashboard',
          props: {
            type: 'kpi_dashboard',
            title: '核心指标',
            metrics: [
              { label: 'Agent-facing', value: '44', trend: 'up' },
              { label: 'Runtime registered', value: '45', trend: 'flat' },
              { label: 'Actions', value: '5', trend: 'flat' },
            ],
          },
          children: [],
        },
        body: { type: 'Row', props: { gap: 16, wrap: true }, children: ['chart', 'table', 'note'] },
        chart: {
          type: 'BarChart',
          props: {
            type: 'bar',
            title: '组件分组',
            x: 'group',
            y: 'count',
            data: [
              { group: 'Charts', count: 19 },
              { group: 'Business', count: 4 },
              { group: 'Input', count: 1 },
              { group: 'A2UI', count: 20 },
            ],
            height: 300,
          },
          children: [],
        },
        table: {
          type: 'DataTable',
          props: {
            type: 'table',
            title: '动作',
            data: [
              { action: 'submitForm', purpose: '回传表单' },
              { action: 'applyFilter', purpose: '筛选' },
              { action: 'drillDown', purpose: '深入分析' },
            ],
            columns: [
              { key: 'action', label: 'Action' },
              { key: 'purpose', label: '用途' },
            ],
          },
          children: [],
        },
        note: { type: 'Card', props: {}, children: ['noteText'] },
        noteText: { type: 'Text', props: { content: '交互必须有业务意义；没有宿主能力时不承诺外部动作。' }, children: [] },
        form: {
          type: 'FormBuilder',
          props: {
            type: 'form_builder',
            title: '提交给 Agent 的结构化输入',
            submitLabel: '提交',
            fields: [
              { name: 'focus', type: 'select', label: '关注方向', options: ['数据质量', '渲染', '交互回传'] },
              { name: 'note', type: 'textarea', label: '备注' },
            ],
          },
          children: [],
        },
      },
    };

    try {
      if (!window.Vizual) throw new Error('dist/vizual.standalone.js not loaded. Run npm run build first.');
      window.Vizual.renderSpec(spec, document.getElementById('app'));
      document.getElementById('status').textContent = 'Rendered current A2UI catalog smoke test.';
    } catch (error) {
      document.getElementById('status').textContent = error.message;
      throw error;
    }
  </script>
</body>
</html>
