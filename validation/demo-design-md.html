<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DESIGN.md Theme System Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui;background:var(--rk-bg-primary,#0f0f1a);color:var(--rk-text-primary,#e0e0e0);padding:20px;transition:background .3s,color .3s}

    h1{font-size:20px;margin-bottom:4px}
    h2{font-size:16px;margin:20px 0 8px;color:var(--rk-accent,#7c3aed)}
    .subtitle{font-size:13px;color:var(--rk-text-secondary,#888);margin-bottom:16px}

    /* Controls bar: theme buttons + mode toggle */
    .controls-bar{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}

    .theme-bar{display:flex;gap:8px;flex-wrap:wrap}
    .theme-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--rk-border-subtle,#2a2a4a);background:var(--rk-bg-secondary,#111122);color:var(--rk-text-primary,#e0e0e0);cursor:pointer;font-size:13px;transition:all .15s}
    .theme-btn:hover{border-color:var(--rk-accent,#7c3aed);background:var(--rk-bg-tertiary,#1a1a2e)}
    .theme-btn.active{border-color:var(--rk-accent,#7c3aed);background:var(--rk-accent,#7c3aed);color:#fff}

    /* Mode toggle switch */
    .mode-toggle{display:flex;align-items:center;gap:8px;margin-left:auto}
    .mode-label{font-size:12px;color:var(--rk-text-tertiary,#888);cursor:pointer;user-select:none}
    .mode-label.active{color:var(--rk-text-primary,#e0e0e0)}
    .toggle-track{width:48px;height:26px;border-radius:13px;background:var(--rk-bg-tertiary,#333);cursor:pointer;position:relative;transition:background .2s}
    .toggle-track.light{background:var(--rk-accent,#3b82f6)}
    .toggle-thumb{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
    .toggle-track.light .toggle-thumb{left:24px}

    /* Mapping report */
    .mapping-report{margin-bottom:12px;padding:8px 12px;background:var(--rk-bg-secondary,#111);border:1px solid var(--rk-border-subtle,#2a2a3e);border-radius:6px;font-size:11px;color:var(--rk-text-secondary,#888)}

    /* Preview */
    .preview-panel{border:1px solid var(--rk-border-subtle,#2a2a3e);border-radius:8px;padding:16px;background:var(--rk-bg-primary,#0f0f1a);transition:background .3s,border-color .3s}
    .preview-label{font-size:10px;color:var(--rk-text-tertiary,#555);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
    .component-slot{margin-bottom:12px}
    .component-slot .slot-label{font-size:11px;color:var(--rk-text-tertiary,#555);margin-bottom:4px;border-bottom:1px solid var(--rk-border-subtle,#2a2a3e);padding-bottom:4px}

    /* Status */
    .status{position:fixed;bottom:16px;right:16px;background:var(--rk-bg-secondary,#111);border:1px solid var(--rk-border-subtle,#2a2a3e);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--rk-text-secondary,#888);z-index:100;transition:background .3s,border-color .3s}
    .status .ok{color:var(--rk-success,#22c55e)}.status .err{color:var(--rk-error,#ef4444)}
  </style>
</head>
<body>
  <h1>DESIGN.md Theme System Demo</h1>
  <div class="subtitle">选择风格 + 切换 Dark/Light 模式 — 所有组件自动响应主题切换</div>

  <!-- Controls: style buttons + mode toggle -->
  <div class="controls-bar">
    <div class="theme-bar">
      <button class="theme-btn active" onclick="applyStyle('cmb', this)">CMB 招商银行</button>
      <button class="theme-btn" onclick="applyStyle('default', this)">Default</button>
      <button class="theme-btn" onclick="applyStyle('linear', this)">Linear</button>
      <button class="theme-btn" onclick="applyStyle('vercel', this)">Vercel</button>
    </div>
    <div class="mode-toggle">
      <span class="mode-label active" id="labelDark" onclick="setMode('dark')">Dark</span>
      <div class="toggle-track light" id="toggleTrack" onclick="toggleDarkLight()">
        <div class="toggle-thumb"></div>
      </div>
      <span class="mode-label" id="labelLight" onclick="setMode('light')">Light</span>
    </div>
  </div>

  <!-- Mapping report -->
  <div class="mapping-report" id="mappingReport"></div>

  <!-- Preview -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-label">Live Preview — All component types</div>

    <div class="component-slot"><div class="slot-label">KpiDashboard</div><div id="slot-kpi"></div></div>
    <div class="component-slot"><div class="slot-label">BarChart</div><div id="slot-bar"></div></div>
    <div class="component-slot"><div class="slot-label">LineChart</div><div id="slot-line"></div></div>
    <div class="component-slot"><div class="slot-label">PieChart</div><div id="slot-pie"></div></div>
    <div class="component-slot"><div class="slot-label">RadarChart</div><div id="slot-radar"></div></div>
    <div class="component-slot"><div class="slot-label">Timeline</div><div id="slot-timeline"></div></div>
    <div class="component-slot"><div class="slot-label">DataTable</div><div id="slot-table"></div></div>
    <div class="component-slot"><div class="slot-label">Alert + Note</div><div id="slot-alert"></div><div id="slot-note" style="margin-top:8px"></div></div>
    <div class="component-slot"><div class="slot-label">BigValue</div><div id="slot-bigvalue"></div></div>
    <div class="component-slot"><div class="slot-label">Kanban</div><div id="slot-kanban"></div></div>
    <div class="component-slot"><div class="slot-label">FormBuilder</div><div id="slot-form"></div></div>
    <div class="component-slot"><div class="slot-label">AuditLog</div><div id="slot-audit"></div></div>
  </div>

  <div class="status" id="status">Ready</div>

  <script src="../dist/vizual.standalone.js"></script>
  <script>
    var React = Vizual.React
    var renderSpec = Vizual.renderSpec
    var setGlobalTheme = Vizual.setGlobalTheme
    var toggleMode = Vizual.toggleMode
    var mapDesignTokensToTheme = Vizual.mapDesignTokensToTheme
    var registerTheme = Vizual.registerTheme
    var invertTheme = Vizual.invertTheme
    var getTheme = Vizual.getTheme

    // State
    var currentStyle = 'cmb'
    var currentMode = 'light'

    // === Register CMB theme ===
    var cmbTokens = {"colors":[{"name":"cmb-red","value":"#c8152d"},{"name":"accent","value":"#c8152d"},{"name":"cmb-black","value":"#000000"},{"name":"text","value":"#000000"},{"name":"white","value":"#ffffff"},{"name":"background","value":"#ffffff"},{"name":"deep-red","value":"#990000"},{"name":"light-red","value":"#f2c4c4"},{"name":"dark-gray","value":"#333333"},{"name":"text-secondary","value":"#333333"},{"name":"medium-gray","value":"#666666"},{"name":"text-tertiary","value":"#666666"},{"name":"light-gray","value":"#b3b3b3"},{"name":"very-light-gray","value":"#cccccc"},{"name":"card","value":"#f5f5f5"},{"name":"surface-hover","value":"#e8e8e8"},{"name":"success","value":"#10b981"},{"name":"warning","value":"#f59e0b"},{"name":"error","value":"#ef4444"}],"typography":{"fontFamily":"\"Founder Lanting Hei\", \"方正兰亭黑\", \"Heiti SC\", Arial, sans-serif","sizes":{"caption":"12px","body":"14px","subtitle":"16px","h5":"18px","h4":"20px","h3":"24px","h2":"32px","h1":"40px"},"weights":{"regular":"400","medium":"500","bold":"700"}},"spacing":{"baseUnit":"8px","scale":{"space-1":"4px","space-2":"8px","space-3":"12px","space-4":"16px","space-5":"24px","space-6":"32px"}},"radius":{"scale":{"sm":"4px","md":"8px","lg":"12px","pill":"9999px"}}};
    var cmbTheme = mapDesignTokensToTheme(cmbTokens, 'cmb')
    registerTheme(cmbTheme.name, cmbTheme)
    var cmbDark = invertTheme(cmbTheme)
    registerTheme(cmbDark.name, cmbDark)

    // === Spec data ===
    var specs = {
      kpi: { root:'m', elements:{ m:{ type:'KpiDashboard', props:{ type:'kpi_dashboard', title:'Business Overview', columns:4, metrics:[ {label:'DAU',value:'12,345',trend:'up',trendValue:'+5.2%'}, {label:'Revenue',value:'$89.2K',trend:'up',trendValue:'+12%'}, {label:'Conversion',value:'3.8%',trend:'down',trendValue:'-0.4%'}, {label:'AOV',value:'$128',trend:'flat',trendValue:'0%'} ]}, children:[] }}},
      bar: { root:'m', elements:{ m:{ type:'BarChart', props:{ type:'bar', title:'Monthly Revenue', x:'month', y:'revenue', data:[{month:'Jan',revenue:120},{month:'Feb',revenue:200},{month:'Mar',revenue:150},{month:'Apr',revenue:280}]}, children:[] }}},
      line: { root:'m', elements:{ m:{ type:'LineChart', props:{ type:'line', title:'User Growth', x:'month', y:'users', smooth:true, data:[{month:'Jan',users:1200},{month:'Feb',users:1800},{month:'Mar',users:2400},{month:'Apr',users:3100}]}, children:[] }}},
      pie: { root:'m', elements:{ m:{ type:'PieChart', props:{ type:'pie', title:'Market Share', category:'product', value:'share', data:[{product:'Cloud',share:35},{product:'SaaS',share:28},{product:'AI',share:22},{product:'Consulting',share:15}]}, children:[] }}},
      radar: { root:'m', elements:{ m:{ type:'RadarChart', props:{ type:'radar', title:'Skills', indicators: [{name:'Speed',max:100},{name:'Power',max:100},{name:'Range',max:100},{name:'Efficiency',max:100},{name:'Safety',max:100}], series: [{name:'Car A',values:[85,70,90,60,80]},{name:'Car B',values:[60,85,70,90,65]}] }, children:[] }}},
      timeline: { root:'m', elements:{ m:{ type:'Timeline', props:{ type:'timeline', title:'Project Timeline', events:[ {date:'2024-01',title:'Kickoff',description:'Project started'}, {date:'2024-03',title:'Alpha',description:'First release'}, {date:'2024-06',title:'Beta',description:'Public beta'}, {date:'2024-09',title:'Launch',description:'General availability'} ]}, children:[] }}},
      table: { root:'m', elements:{ m:{ type:'DataTable', props:{ type:'table', title:'Users', columns:[{key:'name',label:'Name'},{key:'role',label:'Role'},{key:'status',label:'Status'}], data:[{name:'Alice',role:'Admin',status:'Active'},{name:'Bob',role:'User',status:'Active'},{name:'Carol',role:'User',status:'Inactive'}]}, children:[] }}},
      alert: { root:'m', elements:{ m:{ type:'Alert', props:{ type:'alert', severity:'warning', message:'High traffic detected — consider scaling resources.'}, children:[] }}},
      note: { root:'m', elements:{ m:{ type:'Note', props:{ type:'note', variant:'tip', content:'Tip: Use DESIGN.md to customize your dashboard colors without code.'}, children:[] }}},
      bigvalue: { root:'m', elements:{ m:{ type:'BigValue', props:{ type:'big_value', title:'Total Revenue', value:'$1.2M', trend:'up', trendValue:'+23%'}, children:[] }}},
      kanban: { root:'m', elements:{ m:{ type:'Kanban', props:{ type:'kanban', title:'Sprint Board', columns:[ {id:'todo',title:'To Do',cards:[{id:1,title:'Design API',tags:['backend'],priority:'high'}]}, {id:'doing',title:'In Progress',cards:[{id:2,title:'Build UI',tags:['frontend'],assignee:'Alice',priority:'medium'}]}, {id:'done',title:'Done',cards:[{id:3,title:'Write Tests',tags:['qa']},{id:4,title:'Setup CI',assignee:'Bob'}]} ]}, children:[] }}},
      form: { root:'m', elements:{ m:{ type:'FormBuilder', props:{ type:'form_builder', title:'Quick Survey', columns:2, fields:[ {name:'name',label:'Name',type:'text',required:true}, {name:'email',label:'Email',type:'email',required:true}, {name:'role',label:'Role',type:'select',options:['Developer','Designer','Manager']}, {name:'satisfaction',label:'Satisfaction',type:'rating',max:5,defaultValue:4}, {name:'remote',label:'Work remotely',type:'switch',defaultValue:true}, {name:'experience',label:'Years',type:'slider',min:0,max:20} ]}, children:[] }}},
      audit: { root:'m', elements:{ m:{ type:'AuditLog', props:{ type:'audit_log', title:'Recent Activity', entries:[ {timestamp:'2024-06-01 10:30',user:'alice',action:'Deployed',target:'v2.1.0',severity:'info'}, {timestamp:'2024-06-01 11:15',user:'bob',action:'Deleted',target:'test-db',severity:'warning'}, {timestamp:'2024-06-01 14:00',user:'system',action:'Alert',target:'CPU > 90%',severity:'error'} ]}, children:[] }}},
    }

    // === Get theme name ===
    function getThemeName(style, mode) {
      if (style === 'cmb') return mode === 'light' ? 'cmb' : 'cmb-dark'
      if (style === 'default') return 'default-' + mode
      return style + (mode === 'light' ? '-light' : '')
    }

    // === Render all components ===
    function renderAll() {
      var pairs = [
        ['slot-kpi','kpi'],['slot-bar','bar'],['slot-line','line'],['slot-pie','pie'],
        ['slot-radar','radar'],['slot-timeline','timeline'],['slot-table','table'],
        ['slot-alert','alert'],['slot-note','note'],['slot-bigvalue','bigvalue'],
        ['slot-kanban','kanban'],['slot-form','form'],['slot-audit','audit']
      ]
      pairs.forEach(function(pair) {
        var el = document.getElementById(pair[0])
        if (el) {
          el.innerHTML = ''
          try { renderSpec(specs[pair[1]], el) }
          catch(e) { el.innerHTML = '<div style="color:var(--rk-error,#ef4444);font-size:12px">Error: ' + e.message + '</div>' }
        }
      })
    }

    // === Update toggle UI ===
    function updateToggleUI() {
      var track = document.getElementById('toggleTrack')
      var labelDark = document.getElementById('labelDark')
      var labelLight = document.getElementById('labelLight')
      if (currentMode === 'light') {
        track.classList.add('light')
        labelDark.classList.remove('active')
        labelLight.classList.add('active')
      } else {
        track.classList.remove('light')
        labelDark.classList.add('active')
        labelLight.classList.remove('active')
      }
    }

    // === Show mapping report ===
    function showReport(themeName) {
      var theme = getTheme(themeName)
      var el = document.getElementById('mappingReport')
      if (!theme || !theme._mappingReport) { el.innerHTML = ''; return }
      var r = theme._mappingReport
      var roles = r.roles
      var labels = {accent:'Accent',background:'BG',text:'Text',border:'Border',success:'OK',warning:'Warn',error:'Error'}
      var html = '<span style="color:var(--rk-text-tertiary)">Roles:</span> '
      Object.keys(labels).forEach(function(k) {
        html += '<span style="color:' + (roles[k] ? 'var(--rk-success)' : 'var(--rk-error)') + '">' + labels[k] + (roles[k] ? ' ✓' : ' ✗') + '</span> '
      })
      html += ' | <span style="color:var(--rk-text-tertiary)">Chart palette: auto-generated from accent via HSL</span>'
      if (r.warnings && r.warnings.length > 0) {
        html += '<br><span style="color:var(--rk-warning)">⚠ ' + r.warnings.join(' | ') + '</span>'
      }
      el.innerHTML = html
    }

    // === Apply current style + mode ===
    function applyCurrentTheme() {
      var themeName = getThemeName(currentStyle, currentMode)
      setGlobalTheme(themeName)
      renderAll()
      showReport(themeName)
      document.getElementById('status').innerHTML = '<span class="ok">Theme: ' + themeName + '</span>'
    }

    function applyStyle(style, btn) {
      currentStyle = style
      document.querySelectorAll('.theme-btn').forEach(function(b){ b.classList.remove('active') })
      btn.classList.add('active')
      // Detect mode from theme
      var themeName = getThemeName(style, currentMode)
      var theme = getTheme(themeName)
      if (theme && theme.mode) currentMode = theme.mode
      updateToggleUI()
      applyCurrentTheme()
    }

    function toggleDarkLight() {
      currentMode = currentMode === 'dark' ? 'light' : 'dark'
      updateToggleUI()
      applyCurrentTheme()
    }

    function setMode(mode) {
      currentMode = mode
      updateToggleUI()
      applyCurrentTheme()
    }

    // Initial render
    updateToggleUI()
    applyCurrentTheme()
  </script>
</body>
</html>
