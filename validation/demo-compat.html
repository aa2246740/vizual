<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI RenderKit — Chatbot 兼容性测试</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e5e5e5;height:100vh;overflow:hidden}

/* Top bar */
.topbar{height:48px;background:#111;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.topbar h1{font-size:14px;font-weight:600}
.topbar span{font-size:12px;color:#555}
.tab-group{display:flex;gap:4px;margin-left:auto}
.tab-btn{padding:6px 14px;border-radius:6px;font-size:12px;border:1px solid #2a2a2a;background:#1a1a1a;color:#aaa;cursor:pointer}
.tab-btn:hover{color:#e5e5e5}
.tab-btn.active{background:#1a1a2e;color:#3b82f6;border-color:#3b82f6}

/* Layout area */
.layout-area{flex:1;position:relative;overflow:hidden;display:flex}

/* === MODE 1: Fullscreen Chatbot === */
.mode-fullscreen{display:none;width:100%;height:100%;flex-direction:column}
.mode-fullscreen.active{display:flex}
.fs-messages{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:16px;align-items:center}
.fs-msg{display:flex;gap:10px;max-width:720px;width:100%;padding:0 20px}
@media(max-width:1200px){.fs-msg{max-width:640px}}
@media(max-width:800px){.fs-msg{max-width:100%;padding:0 12px}}
.fs-msg{display:flex;gap:10px}
.fs-msg.user{flex-direction:row-reverse}
.fs-avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.fs-msg.ai .fs-avatar{background:#1a1a2e;color:#3b82f6}
.fs-msg.user .fs-avatar{background:#1a2e1a;color:#22c55e}
.fs-bubble{max-width:85%;width:100%;font-size:13px;line-height:1.6;min-width:0}
.fs-msg.ai .fs-bubble{overflow:hidden}
.fs-msg.user .fs-bubble{background:#1a1a2e;color:#c4b5fd;padding:8px 14px;border-radius:12px 12px 2px 12px;max-width:70%;width:auto}
.fs-input{padding:12px 24%;border-top:1px solid #1a1a1a;display:flex;gap:8px}
@media(max-width:1200px){.fs-input{padding:12px 16%}}
@media(max-width:800px){.fs-input{padding:12px}}
.fs-input input{flex:1;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;color:#e5e5e5;font-size:13px;outline:none}
.fs-input button{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer}

/* === MODE 2: Popup Chatbot === */
.mode-popup{display:none;position:absolute;bottom:20px;right:20px;width:400px;height:560px;background:#111;border:1px solid #2a2a2a;border-radius:16px;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;z-index:10}
.mode-popup.active{display:flex}
.popup-header{padding:12px 16px;background:#1a1a1a;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px;flex-shrink:0}
.popup-header .dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
.popup-header h3{font-size:13px;flex:1}
.popup-close{background:none;border:none;color:#666;font-size:18px;cursor:pointer}
.popup-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.popup-msg{display:flex;gap:8px}
.popup-msg.user{flex-direction:row-reverse}
.popup-avatar{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.popup-msg.ai .popup-avatar{background:#1a1a2e;color:#3b82f6}
.popup-msg.user .popup-avatar{background:#1a2e1a;color:#22c55e}
.popup-bubble{max-width:82%;width:100%;font-size:12px;line-height:1.5;min-width:0;overflow:hidden}
.popup-msg.user .popup-bubble{background:#1a1a2e;color:#c4b5fd;padding:6px 10px;border-radius:10px 10px 2px 10px;font-size:12px;max-width:70%;width:auto}
.popup-input{padding:8px 12px;border-top:1px solid #222;display:flex;gap:6px;flex-shrink:0}
.popup-input input{flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;padding:8px 10px;color:#e5e5e5;font-size:12px;outline:none}

/* FAB button */
.chat-fab{position:absolute;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,.4);z-index:5;display:none}
.chat-fab:hover{transform:scale(1.05)}

/* === MODE 3: Sidebar Chatbot === */
.mode-sidebar{display:none;width:380px;height:100%;background:#111;border-left:1px solid #1a1a1a;flex-direction:column;flex-shrink:0;position:absolute;right:0;top:0}
.mode-sidebar.active{display:flex}
.sidebar-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:12px 16px;background:#1a1a1a;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sb-header h3{font-size:13px;flex:1}
.sb-close{background:none;border:none;color:#666;font-size:16px;cursor:pointer}
.sb-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.sb-msg{display:flex;gap:8px}
.sb-msg.user{flex-direction:row-reverse}
.sb-avatar{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.sb-msg.ai .sb-avatar{background:#1a1a2e;color:#3b82f6}
.sb-msg.user .sb-avatar{background:#1a2e1a;color:#22c55e}
.sb-bubble{max-width:82%;width:100%;font-size:12px;line-height:1.5;min-width:0;overflow:hidden}
.sb-msg.user .sb-bubble{background:#1a1a2e;color:#c4b5fd;padding:6px 10px;border-radius:10px 10px 2px 10px;font-size:12px;max-width:70%;width:auto}
.sb-input{padding:8px 12px;border-top:1px solid #222;display:flex;gap:6px;flex-shrink:0}
.sb-input input{flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;padding:8px 10px;color:#e5e5e5;font-size:12px;outline:none}

/* === MODE 4: Embedded In-page === */
.mode-embedded{display:none;flex:1;flex-direction:column;padding:20px;gap:16px;overflow-y:auto}
.mode-embedded.active{display:flex}
.embed-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:14px}
.embed-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.embed-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Shared component styles */
.comp-render{border:1px solid #1a1a1a;border-radius:6px;padding:12px;background:#0a0a0a;animation:fadeIn .3s ease;width:100%;min-width:0;overflow:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.comp-render .chart{width:100%;height:200px}
.source-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;margin-bottom:6px;font-weight:600;text-transform:uppercase}
.src-mviz{background:#1e3a5f;color:#3b82f6}
.src-jr{background:#1a2e1a;color:#22c55e}
.src-rk{background:#2e1a2e;color:#c084fc}

/* Dimmed background area for popup/sidebar modes */
.dim-bg{flex:1;display:flex;align-items:center;justify-content:center;color:#333;font-size:13px;position:relative}
.dim-bg .hint{text-align:center;line-height:1.8}
.dim-bg .hint span{color:#555}

/* Responsive indicators */
.rwd-bar{height:3px;background:#1a1a1a;border-radius:2px;margin-top:8px}
.rwd-fill{height:100%;border-radius:2px;transition:width .3s}
.rwd-ok{background:#22c55e}
.rwd-warn{background:#f59e0b}
.rwd-fail{background:#ef4444}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.status-item{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:8px;text-align:center}
.status-item .label{font-size:10px;color:#666;margin-bottom:4px}
.status-item .value{font-size:13px;font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <h1>AI RenderKit</h1>
  <span>Chatbot 兼容性测试</span>
  <div class="tab-group">
    <button class="tab-btn active" onclick="switchMode('fullscreen')">🖥 全屏 Chatbot</button>
    <button class="tab-btn" onclick="switchMode('popup')">💬 弹窗 Chatbot</button>
    <button class="tab-btn" onclick="switchMode('sidebar')">📱 侧边 Chatbot</button>
    <button class="tab-btn" onclick="switchMode('embedded')">📄 内嵌页面</button>
  </div>
</div>

<div class="layout-area">
  <!-- Fullscreen -->
  <div class="mode-fullscreen active" id="mode-fullscreen">
    <div class="fs-messages" id="fs-msgs"></div>
    <div class="fs-input"><input placeholder="消息将自动播放..." disabled><button>发送</button></div>
  </div>

  <!-- Popup -->
  <div class="layout-area" id="popup-area" style="display:none">
    <div class="dim-bg"><div class="hint"><span>弹窗模式</span><br>模拟 Intercom / Crisp / Drift 风格<br>右下角 400×560px 浮窗<br><br>组件在受限空间内渲染</div></div>
    <div class="mode-popup active" id="mode-popup">
      <div class="popup-header"><div class="dot"></div><h3>AI Assistant</h3><button class="popup-close">×</button></div>
      <div class="popup-messages" id="popup-msgs"></div>
      <div class="popup-input"><input placeholder="自动播放中..." disabled></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="layout-area" id="sidebar-area" style="display:none">
    <div class="dim-bg"><div class="hint"><span>侧边栏模式</span><br>模拟 ChatGPT Canvas / Notion AI 风格<br>右侧 380px 固定宽度面板<br><br>主内容区在左侧</div></div>
    <div class="mode-sidebar active" id="mode-sidebar">
      <div class="sb-header"><h3>AI RenderKit</h3><button class="sb-close">×</button></div>
      <div class="sb-messages" id="sb-msgs"></div>
      <div class="sb-input"><input placeholder="自动播放中..." disabled></div>
    </div>
  </div>

  <!-- Embedded -->
  <div class="mode-embedded" id="mode-embedded"></div>
</div>

<script>
let uid = () => 'c' + Math.random().toString(36).slice(2,8)
const charts = []

function switchMode(mode) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['fullscreen','popup','sidebar','embedded'][i] === mode))
  document.getElementById('mode-fullscreen').style.display = mode === 'fullscreen' ? 'flex' : 'none'
  document.getElementById('popup-area').style.display = mode === 'popup' ? 'flex' : 'none'
  document.getElementById('sidebar-area').style.display = mode === 'sidebar' ? 'flex' : 'none'
  document.getElementById('mode-embedded').style.display = mode === 'embedded' ? 'flex' : 'none'
  // Resize charts after mode switch
  setTimeout(() => charts.forEach(c => { try { c.resize() } catch(e){} }), 100)
}

// ============ COMPONENT BUILDERS ============
function buildBarChart(container, title, data) {
  const el = document.createElement('div')
  el.className = 'comp-render'
  el.innerHTML = `<span class="source-badge src-mviz">mviz · ECharts</span>${title ? `<div style="font-size:12px;font-weight:600;color:#aaa;margin-bottom:6px">${title}</div>` : ''}<div class="chart" style="width:100%;min-height:200px"></div>`
  container.appendChild(el)
  const chartEl = el.querySelector('.chart')
  const c = echarts.init(chartEl, 'dark')
  c.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#222',borderColor:'#333',textStyle:{color:'#ddd',fontSize:11}},grid:{left:36,right:10,top:title?28:10,bottom:22},xAxis:{type:'category',data:data.map(d=>d[0]),axisLine:{lineStyle:{color:'#333'}},axisLabel:{color:'#888',fontSize:10}},yAxis:{type:'value',axisLabel:{color:'#888',fontSize:10},splitLine:{lineStyle:{color:'#1a1a1a'}}},series:[{type:'bar',data:data.map(d=>d[1]),itemStyle:{color:'#3b82f6',borderRadius:[3,3,0,0]}}]})
  charts.push(c)
  observeResize(chartEl, c)
}

function buildPieChart(container, title, data) {
  const el = document.createElement('div')
  el.className = 'comp-render'
  el.innerHTML = `<span class="source-badge src-mviz">mviz · ECharts</span>${title ? `<div style="font-size:12px;font-weight:600;color:#aaa;margin-bottom:6px">${title}</div>` : ''}<div class="chart" style="width:100%;min-height:200px"></div>`
  container.appendChild(el)
  const chartEl = el.querySelector('.chart')
  const c = echarts.init(chartEl, 'dark')
  c.setOption({backgroundColor:'transparent',tooltip:{trigger:'item',backgroundColor:'#222',borderColor:'#333',textStyle:{color:'#ddd',fontSize:11}},series:[{type:'pie',radius:['35%','65%'],center:['50%','55%'],data:data.map(d=>({name:d[0],value:d[1]})),itemStyle:{borderRadius:3,borderColor:'#111',borderWidth:1},label:{color:'#aaa',fontSize:10},labelLine:{lineStyle:{color:'#444'}}}]})
  charts.push(c)
  observeResize(chartEl, c)
}

// ResizeObserver for all ECharts instances
const ro = new ResizeObserver(entries => {
  for (const entry of entries) {
    const chart = echarts.getInstanceByDom(entry.target)
    if (chart) chart.resize()
  }
})
function observeResize(el, chart) { ro.observe(el) }

function buildKPI(container, metrics) {
  const el = document.createElement('div')
  el.className = 'comp-render'
  const cards = metrics.map(m => `<div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:10px">
    <div style="font-size:10px;color:#888;margin-bottom:4px">${m[0]}</div>
    <div style="font-size:18px;font-weight:700;color:#e5e5e5">${m[1]}</div>
    <div style="font-size:10px;margin-top:2px;color:${m[2]==='up'?'#22c55e':m[2]==='down'?'#22c55e':'#888'}">${m[2]==='up'?'↑':m[2]==='down'?'↓':'→'} ${m[3]}</div>
  </div>`).join('')
  el.innerHTML = `<span class="source-badge src-jr">json-render</span><div style="display:grid;grid-template-columns:repeat(${metrics.length},1fr);gap:6px">${cards}</div>`
  container.appendChild(el)
}

function buildKanban(container) {
  const el = document.createElement('div')
  el.className = 'comp-render'
  const cols = [
    {title:'待办',color:'#64748b',cards:['API 设计','文档编写']},
    {title:'进行中',color:'#3b82f6',cards:['mviz Bridge','单元测试']},
    {title:'完成',color:'#22c55e',cards:['Catalog','ECharts Wrapper','Zod Schema']}
  ]
  const colHtml = cols.map(c => `<div style="min-width:0;flex:1;background:#0a0a0a;border-radius:6px;padding:8px">
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px"><div style="width:5px;height:5px;border-radius:50%;background:${c.color}"></div><span style="font-size:10px;color:#888">${c.title}</span><span style="font-size:9px;color:#444;margin-left:auto">${c.cards.length}</span></div>
    ${c.cards.map(card => `<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:6px;margin-bottom:3px;font-size:11px;color:#ddd">${card}</div>`).join('')}
  </div>`).join('')
  el.innerHTML = `<span class="source-badge src-rk">RenderKit · DOM</span><div style="display:flex;gap:6px">${colHtml}</div>`
  container.appendChild(el)
}

function buildTimeline(container) {
  const el = document.createElement('div')
  el.className = 'comp-render'
  const events = [
    {date:'Q1',title:'技术验证',color:'#3b82f6'},
    {date:'Q2',title:'核心开发',color:'#8b5cf6'},
    {date:'Q3',title:'业务组件',color:'#22c55e'},
    {date:'Q4',title:'发布上线',color:'#f59e0b'}
  ]
  const evHtml = events.map(e => `<div style="position:relative;padding-bottom:10px;padding-left:14px">
    <div style="position:absolute;left:-14px;top:3px;width:6px;height:6px;border-radius:50%;background:${e.color};border:2px solid #0a0a0a"></div>
    <div style="font-size:10px;color:#666">${e.date}</div>
    <div style="font-size:12px;font-weight:500;color:#e5e5e5">${e.title}</div>
  </div>`).join('')
  el.innerHTML = `<span class="source-badge src-jr">json-render</span><div style="position:relative;padding-left:14px"><div style="position:absolute;left:4px;top:4px;bottom:4px;width:1px;background:#1a1a1a"></div>${evHtml}</div>`
  container.appendChild(el)
}

function buildGantt(container) {
  const el = document.createElement('div')
  el.className = 'comp-render'
  const tasks = [
    {name:'设计',start:0,end:25,color:'#3b82f6'},
    {name:'开发',start:15,end:70,color:'#8b5cf6'},
    {name:'测试',start:55,end:90,color:'#22c55e'},
    {name:'发布',start:80,end:100,color:'#f59e0b'}
  ]
  const rows = tasks.map(t => `<div style="display:flex;align-items:center;height:22px;margin-bottom:2px">
    <div style="width:36px;flex-shrink:0;font-size:10px;color:#888">${t.name}</div>
    <div style="flex:1;height:14px;background:#0a0a0a;border-radius:3px;position:relative">
      <div style="position:absolute;left:${t.start}%;width:${t.end-t.start}%;height:100%;background:${t.color};border-radius:3px"></div>
    </div>
  </div>`).join('')
  el.innerHTML = `<span class="source-badge src-rk">RenderKit · DOM</span>${rows}`
  container.appendChild(el)
}

// ============ MSG HELPERS ============
function addMsg(container, isUser, text) {
  const cls = isUser ? 'user' : 'ai'
  const avatar = isUser ? 'U' : 'RK'
  const bubbleClass = container.id.includes('fs') ? 'fs-bubble' : container.id.includes('popup') ? 'popup-bubble' : container.id.includes('sb') ? 'sb-bubble' : 'fs-bubble'
  const avatarClass = container.id.includes('fs') ? 'fs-avatar' : container.id.includes('popup') ? 'popup-avatar' : container.id.includes('sb') ? 'sb-avatar' : 'fs-avatar'
  const msgClass = container.id.includes('fs') ? 'fs-msg' : container.id.includes('popup') ? 'popup-msg' : container.id.includes('sb') ? 'sb-msg' : 'fs-msg'
  const div = document.createElement('div')
  div.className = `${msgClass} ${cls}`
  div.innerHTML = `<div class="${avatarClass}">${avatar}</div><div class="${bubbleClass}">${text}</div>`
  container.appendChild(div)
  container.scrollTop = container.scrollHeight
  return div.querySelector(`.${bubbleClass}`)
}

function addComponent(container, type) {
  const cls = container.id.includes('fs') ? 'fs-msg' : container.id.includes('popup') ? 'popup-msg' : container.id.includes('sb') ? 'sb-msg' : 'fs-msg'
  const avatarClass = container.id.includes('fs') ? 'fs-avatar' : container.id.includes('popup') ? 'popup-avatar' : container.id.includes('sb') ? 'sb-avatar' : 'fs-avatar'
  const div = document.createElement('div')
  div.className = `${cls} ai`
  div.innerHTML = `<div class="${avatarClass}">RK</div><div class="${container.id.includes('fs') ? 'fs-bubble' : container.id.includes('popup') ? 'popup-bubble' : container.id.includes('sb') ? 'sb-bubble' : 'fs-bubble'}"></div>`
  container.appendChild(div)
  const bubble = div.querySelector('div:last-child')
  switch(type) {
    case 'bar': buildBarChart(bubble, '月度收入', [['1月',180],['2月',220],['3月',195],['4月',240],['5月',265],['6月',289]]); break
    case 'pie': buildPieChart(bubble, '流量来源', [['搜索',45],['直接',25],['社交',18],['邮件',12]]); break
    case 'kpi': buildKPI(bubble, [['用户','12.4K','up','+8%'],['收入','¥89K','up','+15%'],['NPS','72','flat','0']]); break
    case 'kanban': buildKanban(bubble); break
    case 'timeline': buildTimeline(bubble); break
    case 'gantt': buildGantt(bubble); break
  }
  container.scrollTop = container.scrollHeight
}

// ============ FILL EACH MODE ============
function populateFullscreen() {
  const c = document.getElementById('fs-msgs')
  addMsg(c, true, '展示月度收入柱状图')
  addComponent(c, 'bar')
  addMsg(c, true, '看看流量来源分布')
  addComponent(c, 'pie')
  addMsg(c, true, '展示团队 KPI')
  addComponent(c, 'kpi')
  addMsg(c, true, '项目看板状态')
  addComponent(c, 'kanban')
  addMsg(c, true, '开发里程碑时间线')
  addComponent(c, 'timeline')
  addMsg(c, true, '甘特图排期')
  addComponent(c, 'gantt')
}

function populatePopup() {
  const c = document.getElementById('popup-msgs')
  addMsg(c, true, '月度收入趋势')
  addComponent(c, 'bar')
  addMsg(c, true, 'KPI 看一眼')
  addComponent(c, 'kpi')
  addMsg(c, true, '看板状态')
  addComponent(c, 'kanban')
}

function populateSidebar() {
  const c = document.getElementById('sb-msgs')
  addMsg(c, true, '流量分布')
  addComponent(c, 'pie')
  addMsg(c, true, 'KPI 指标')
  addComponent(c, 'kpi')
  addMsg(c, true, '时间线')
  addComponent(c, 'timeline')
}

function populateEmbedded() {
  const area = document.getElementById('mode-embedded')

  // Status summary
  const summary = document.createElement('div')
  summary.className = 'embed-card'
  summary.innerHTML = `<div class="embed-label">兼容性测试结果</div>
    <div class="status-grid">
