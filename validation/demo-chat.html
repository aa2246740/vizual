<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI RenderKit — Chat Streaming Demo</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e5e5e5;height:100vh;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:260px;background:#111;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid #1a1a1a}
.sidebar-header h2{font-size:14px;font-weight:600;color:#e5e5e5}
.sidebar-header span{font-size:11px;color:#555}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.sidebar-item{padding:10px 12px;border-radius:8px;font-size:13px;color:#aaa;cursor:pointer;margin-bottom:2px}
.sidebar-item:hover{background:#1a1a1a;color:#e5e5e5}
.sidebar-item.active{background:#1a1a2e;color:#3b82f6;border-left:2px solid #3b82f6}
.sidebar-footer{padding:12px 16px;border-top:1px solid #1a1a1a;font-size:11px;color:#444;text-align:center}
.source-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600;text-transform:uppercase}
.tag-mviz{background:#1e3a5f;color:#3b82f6}
.tag-jr{background:#1a2e1a;color:#22c55e}
.tag-rk{background:#2e1a2e;color:#c084fc}

/* Main Chat */
.chat-main{flex:1;display:flex;flex-direction:column}
.chat-header{padding:12px 24px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:12px;background:#0a0a0a}
.chat-header-dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
.chat-header h3{font-size:14px;font-weight:500}
.chat-header span{font-size:12px;color:#555}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.chat-input-bar{padding:12px 24px 20px;border-top:1px solid #1a1a1a;background:#0a0a0a}
.chat-input-box{background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:12px 16px;font-size:13px;color:#555;display:flex;align-items:center;gap:8px}
.chat-input-box .dot-loader{display:flex;gap:4px}
.chat-input-box .dot-loader span{width:6px;height:6px;border-radius:50%;background:#3b82f6;animation:dot-pulse 1.4s infinite both}
.chat-input-box .dot-loader span:nth-child(2){animation-delay:.2s}
.chat-input-box .dot-loader span:nth-child(3){animation-delay:.4s}
@keyframes dot-pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.progress-bar{height:2px;background:#1a1a1a;border-radius:1px;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:1px;transition:width .3s;width:0%}
.controls{display:flex;gap:8px;margin-top:8px}
.controls button{background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.controls button:hover{background:#222;color:#e5e5e5}
.controls button.active{background:#1a1a2e;color:#3b82f6;border-color:#3b82f6}

/* Messages */
.msg{display:flex;gap:12px;max-width:800px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.ai .msg-avatar{background:#1a1a2e;color:#3b82f6}
.msg.user .msg-avatar{background:#1a2e1a;color:#22c55e}
.msg-body{flex:1;min-width:0}
.msg-text{font-size:14px;line-height:1.6;color:#e5e5e5;padding:10px 0}
.msg.user .msg-text{background:#1a1a2e;border-radius:12px 12px 2px 12px;padding:10px 16px;color:#c4b5fd}
.source-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.source-mviz{background:#1e3a5f;color:#3b82f6}
.source-jr{background:#1a2e1a;color:#22c55e}
.source-rk{background:#2e1a2e;color:#c084fc}
.source-mix{background:#2e2a1a;color:#f59e0b}

/* Streaming JSON */
.stream-json{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:12px 16px;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.5;color:#888;max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-bottom:8px;position:relative}
.stream-json .cursor{display:inline-block;width:7px;height:14px;background:#3b82f6;animation:blink 1s step-end infinite;vertical-align:middle;margin-left:1px}
@keyframes blink{50%{opacity:0}}
.json-key{color:#3b82f6}
.json-str{color:#22c55e}
.json-num{color:#f59e0b}
.json-bool{color:#c084fc}

/* Rendered Component */
.component-render{border:1px solid #1a1a1a;border-radius:8px;padding:16px;background:#111;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.component-render .chart{width:100%;height:220px}
.json-toggle{font-size:11px;color:#555;cursor:pointer;margin-top:8px;display:flex;align-items:center;gap:4px}
.json-toggle:hover{color:#888}
.json-toggle-expanded{font-size:11px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:8px 12px;font-family:monospace;color:#555;margin-top:6px;white-space:pre;overflow-x:auto;max-height:120px}

/* Thinking indicator */
.thinking{display:flex;gap:6px;padding:12px 0}
.thinking span{width:8px;height:8px;border-radius:50%;background:#333;animation:think-bounce 1.4s infinite both}
.thinking span:nth-child(2){animation-delay:.16s}
.thinking span:nth-child(3){animation-delay:.32s}
@keyframes think-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px);background:#3b82f6}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>AI RenderKit</h2>
    <span>Chat Streaming Demo</span>
  </div>
  <div class="sidebar-list" id="sidebar"></div>
  <div class="sidebar-footer">8 demo cases · 3 sources</div>
</div>

<div class="chat-main">
  <div class="chat-header">
    <div class="chat-header-dot"></div>
    <h3>RenderKit Assistant</h3>
    <span>· 模拟 LLM 流式输出</span>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-bar">
    <div class="chat-input-box">
      <div class="dot-loader"><span></span><span></span><span></span></div>
      <span id="input-status">准备中...</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="controls">
      <button id="btn-play" class="active" onclick="startDemo()">▶ 自动播放</button>
      <button id="btn-pause" onclick="togglePause()">⏸ 暂停</button>
      <button onclick="resetDemo()">↻ 重来</button>
    </div>
  </div>
</div>

<script>
// ============ DEMO CASES ============
const CASES = [
  {
    id: 'c1', title: '季度销售额柱状图', source: 'mviz', sourceLabel: 'mviz Bridge',
    user: '用柱状图展示今年的季度销售额数据',
    aiIntro: '好的，我来用柱状图展示季度销售额数据：\n\n',
    json: `{
  "type": "BarChart",
  "props": {
    "type": "bar",
    "title": "2025 年季度销售额",
    "x": "quarter",
    "y": "revenue",
    "data": [
      {"quarter": "Q1", "revenue": 1280},
      {"quarter": "Q2", "revenue": 2050},
      {"quarter": "Q3", "revenue": 1780},
      {"quarter": "Q4", "revenue": 2890}
    ],
    "theme": "light"
  }
}`,
    render: 'barChart'
  },
  {
    id: 'c2', title: '团队 KPI 仪表盘', source: 'jr', sourceLabel: 'json-render',
    user: '帮我看看团队本月的 KPI 指标',
    aiIntro: '以下是本月团队 KPI 指标概览：\n\n',
    json: `{
  "type": "KpiDashboard",
  "props": {
    "title": "2025年4月 团队KPI",
    "metrics": [
      {"label": "月活用户", "value": "128.5K", "trend": "up", "trendValue": "+12.3%"},
      {"label": "付费转化率", "value": "4.2%", "trend": "up", "trendValue": "+0.8%"},
      {"label": "客户满意度", "value": "92", "suffix": "分", "trend": "flat", "trendValue": "0%"},
      {"label": "工单响应时间", "value": "1.8", "suffix": "h", "trend": "down", "trendValue": "-22%"}
    ],
    "columns": 4
  }
}`,
    render: 'kpiDashboard'
  },
  {
    id: 'c3', title: '项目看板', source: 'rk', sourceLabel: '旧版 RenderKit',
    user: '展示一下当前 Sprint 的看板状态',
    aiIntro: '当前 Sprint 的看板如下：\n\n',
    json: `{
  "type": "Kanban",
  "props": {
    "title": "Sprint 14 · AI RenderKit",
    "columns": [
      {
        "id": "todo", "title": "待办", "color": "#64748b",
        "cards": [
          {"id": "1", "title": "Theme 系统", "description": "支持 3 套主题切换", "tags": ["enhancement"], "assignee": "张三"},
          {"id": "2", "title": "SSR 支持", "tags": ["feature"], "priority": "medium"}
        ]
      },
      {
        "id": "doing", "title": "进行中", "color": "#3b82f6",
        "cards": [
          {"id": "3", "title": "mviz Bridge 组件", "description": "18个图表组件桥接", "tags": ["core","mviz"], "assignee": "李四", "priority": "high"},
          {"id": "4", "title": "单元测试", "tags": ["testing"], "priority": "medium"}
        ]
      },
      {
        "id": "done", "title": "已完成", "color": "#22c55e",
        "cards": [
          {"id": "5", "title": "Zod Schema 定义", "tags": ["schema"]},
          {"id": "6", "title": "Catalog 注册", "tags": ["json-render"]},
          {"id": "7", "title": "ECharts Wrapper", "tags": ["core"]}
        ]
      }
    ]
  }
}`,
    render: 'kanban'
  },
  {
    id: 'c4', title: '漏斗转化分析', source: 'mviz', sourceLabel: 'mviz Bridge',
    user: '分析一下用户注册到付费的漏斗转化率',
    aiIntro: '根据最新数据，漏斗转化分析如下：\n\n',
    json: `{
  "type": "FunnelChart",
  "props": {
    "type": "funnel",
    "title": "用户转化漏斗 (4月)",
    "data": [
      {"name": "页面访问", "value": 45800},
      {"name": "注册", "value": 12800},
      {"name": "激活", "value": 6400},
      {"name": "付费", "value": 1920},
      {"name": "续费", "value": 960}
    ]
  }
}`,
    render: 'funnelChart'
  },
  {
    id: 'c5', title: '项目时间线', source: 'jr', sourceLabel: 'json-render',
    user: '展示 AI RenderKit 项目的里程碑时间线',
    aiIntro: 'AI RenderKit 的开发里程碑：\n\n',
    json: `{
  "type": "Timeline",
  "props": {
    "title": "AI RenderKit 开发历程",
    "events": [
      {"date": "2025-01", "title": "项目立项", "description": "确定 json-render + mviz 技术路线"},
      {"date": "2025-02", "title": "技术验证通过", "description": "mviz bridge + Zod v4 + ECharts 全链路跑通"},
      {"date": "2025-03", "title": "mviz Bridge 完成", "description": "18种图表 + 8种UI组件全部桥接"},
      {"date": "2025-04", "title": "业务组件完成", "description": "11种自研业务组件交付"},
      {"date": "2025-05", "title": "公开发布", "description": "npm package + Claude Code Skill + Demo"}
    ]
  }
}`,
    render: 'timeline'
  },
  {
    id: 'c6', title: '甘特图排期', source: 'rk', sourceLabel: '旧版 RenderKit',
    user: '帮我生成 Q2 的甘特图排期',
    aiIntro: 'Q2 甘特图排期如下：\n\n',
    json: `{
  "type": "GanttChart",
  "props": {
    "title": "Q2 开发排期",
    "tasks": [
      {"id": "1", "name": "需求分析", "start": "2025-04-01", "end": "2025-04-15", "progress": 100, "color": "#22c55e"},
      {"id": "2", "name": "架构设计", "start": "2025-04-10", "end": "2025-04-25", "progress": 80, "color": "#3b82f6"},
      {"id": "3", "name": "核心开发", "start": "2025-04-20", "end": "2025-05-20", "progress": 45, "color": "#8b5cf6"},
      {"id": "4", "name": "联调测试", "start": "2025-05-15", "end": "2025-06-05", "progress": 0, "color": "#f59e0b"},
      {"id": "5", "name": "文档&发布", "start": "2025-06-01", "end": "2025-06-15", "progress": 0, "color": "#ef4444"}
    ]
  }
}`,
    render: 'ganttChart'
  },
  {
    id: 'c7', title: '预算对比报告', source: 'jr', sourceLabel: 'json-render',
    user: '对比一下各部门的预算和实际支出',
    aiIntro: '各部门预算 vs 实际支出报告：\n\n',
    json: `{
  "type": "BudgetReport",
  "props": {
    "title": "2025 Q1 预算 vs 实际",
    "categories": [
      {"name": "研发部", "budget": 500, "actual": 480, "color": "#3b82f6"},
      {"name": "市场部", "budget": 300, "actual": 350, "color": "#ef4444"},
      {"name": "运营部", "budget": 200, "actual": 180, "color": "#22c55e"},
      {"name": "行政部", "budget": 100, "actual": 95, "color": "#22c55e"}
    ],
    "showVariance": true
  }
}`,
    render: 'budgetReport'
  },
  {
    id: 'c8', title: '综合仪表盘', source: 'mix', sourceLabel: '混合来源',
    user: '帮我生成一个综合数据仪表盘，包含图表和指标',
    aiIntro: '综合数据仪表盘已生成，包含来自 mviz、json-render 和 RenderKit 的组件：\n\n',
    json: `{
  "type": "Dashboard",
  "components": [
    {"type": "BigValue", "props": {"title": "总收入", "value": "¥289K", "trend": "up", "trendValue": "+18.2%"}},
    {"type": "BarChart", "props": {"type": "bar", "x": "month", "y": "revenue", "data": [{"month":"1月","revenue":180},{"month":"2月","revenue":220},{"month":"3月","revenue":195},{"month":"4月","revenue":240},{"month":"5月","revenue":265},{"month":"6月","revenue":289}]}},
    {"type": "KpiDashboard", "props": {"metrics": [{"label":"用户数","value":"12.4K","trend":"up","trendValue":"+8.5%"},{"label":"转化率","value":"4.2%","trend":"up","trendValue":"+0.8%"}]}}
  ]
}`,
    render: 'dashboard'
  }
]

// ============ RENDERERS ============
// Each returns { html, init?() } — init() called after DOM insertion
const RENDERERS = {
  barChart(data) {
    const id = uid(); const props = data.props
    return {
      html: `<div class="component-render"><div class="source-badge source-mviz">mviz Bridge · ECharts</div><div id="${id}" class="chart"></div></div>`,
      init() {
        const c = echarts.init(document.getElementById(id), 'dark')
        c.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#222',borderColor:'#333',textStyle:{color:'#ddd'}},title:{text:props.title,textStyle:{color:'#aaa',fontSize:13},left:'center'},grid:{left:48,right:16,top:40,bottom:28},xAxis:{type:'category',data:props.data.map(d=>d[props.x]),axisLine:{lineStyle:{color:'#333'}},axisLabel:{color:'#888'}},yAxis:{type:'value',axisLabel:{color:'#888'},splitLine:{lineStyle:{color:'#1a1a1a'}}},series:[{type:'bar',data:props.data.map(d=>d[props.y]),itemStyle:{color:'#3b82f6',borderRadius:[4,4,0,0]},barWidth:'45%'}]})
        window.addEventListener('resize',()=>c.resize())
      }
    }
  },
  funnelChart(data) {
    const id = uid(); const props = data.props
    return {
      html: `<div class="component-render"><div class="source-badge source-mviz">mviz Bridge · ECharts</div><div id="${id}" class="chart"></div></div>`,
      init() {
        const c = echarts.init(document.getElementById(id), 'dark')
        c.setOption({backgroundColor:'transparent',tooltip:{trigger:'item',backgroundColor:'#222',borderColor:'#333',textStyle:{color:'#ddd'}},title:{text:props.title,textStyle:{color:'#aaa',fontSize:13},left:'center'},series:[{type:'funnel',left:'10%',width:'80%',top:40,data:props.data,itemStyle:{borderColor:'#1a1a1a',borderWidth:1},label:{color:'#ddd',fontSize:11},labelLine:{lineStyle:{color:'#555'}}}]})
        window.addEventListener('resize',()=>c.resize())
      }
    }
  },
  kpiDashboard(data) {
    const props = data.props; const cols = props.columns || 4
    const metrics = props.metrics.map(m => {
      const isUp = m.trend === 'up', isDown = m.trend === 'down'
      return `<div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:14px">
        <div style="font-size:11px;color:#888;margin-bottom:6px">${m.label}</div>
        <div style="font-size:22px;font-weight:700;color:#e5e5e5">${m.value}${m.suffix ? `<span style="font-size:13px;color:#888">${m.suffix}</span>` : ''}</div>
        ${m.trendValue ? `<div style="font-size:11px;margin-top:4px;color:${isUp ? '#22c55e' : isDown ? '#22c55e' : '#888'}">${isUp ? '↑' : isDown ? '↓' : '→'} ${m.trendValue}</div>` : ''}
      </div>`
    }).join('')
    return { html: `<div class="component-render"><div class="source-badge source-jr">json-render · React</div>
      ${props.title ? `<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#aaa">${props.title}</div>` : ''}
      <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px">${metrics}</div></div>` }
  },
  kanban(data) {
    const props = data.props
    const cols = props.columns.map(col => {
      const cards = col.cards.map(card => `<div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:10px;margin-bottom:6px">
        <div style="font-size:12px;font-weight:500;color:#e5e5e5;margin-bottom:3px">${card.title}</div>
        ${card.description ? `<div style="font-size:11px;color:#777;line-height:1.4">${card.description}</div>` : ''}
        ${(card.tags?.length || card.assignee || card.priority) ? `<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;align-items:center">
          ${card.tags?.map(t => `<span style="font-size:9px;padding:1px 6px;border-radius:3px;background:#1e293b;color:#94a3b8">${t}</span>`).join('') || ''}
          ${card.priority === 'high' ? '<span style="width:5px;height:5px;border-radius:50%;background:#ef4444"></span>' : ''}
          ${card.assignee ? `<span style="font-size:9px;color:#555;margin-left:auto">${card.assignee}</span>` : ''}
        </div>` : ''}
      </div>`).join('')
      return `<div style="min-width:180px;flex:1;background:#0a0a0a;border-radius:8px;padding:10px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <div style="width:6px;height:6px;border-radius:50%;background:${col.color || '#3b82f6'}"></div>
          <span style="font-size:11px;font-weight:600;color:#aaa">${col.title}</span>
          <span style="font-size:10px;color:#444;margin-left:auto">${col.cards.length}</span>
        </div>${cards}</div>`
    }).join('')
    return { html: `<div class="component-render"><div class="source-badge source-rk">旧版 RenderKit · DOM</div>
      ${props.title ? `<div style="font-size:13px;font-weight:600;margin-bottom:10px;color:#aaa">${props.title}</div>` : ''}
      <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:4">${cols}</div></div>` }
  },
  timeline(data) {
    const props = data.props; const colors = ['#3b82f6','#8b5cf6','#22c55e','#f59e0b','#ef4444']
    const events = props.events.map((e, i) => `<div style="position:relative;padding-bottom:16px;padding-left:18px">
      <div style="position:absolute;left:-18px;top:5px;width:8px;height:8px;border-radius:50%;background:${colors[i % colors.length]};border:2px solid #111"></div>
      <div style="font-size:11px;color:#666;margin-bottom:2px">${e.date}</div>
      <div style="font-size:13px;font-weight:600;color:#e5e5e5;margin-bottom:2px">${e.title}</div>
      ${e.description ? `<div style="font-size:12px;color:#888;line-height:1.4">${e.description}</div>` : ''}
    </div>`).join('')
    return { html: `<div class="component-render"><div class="source-badge source-jr">json-render · React</div>
      ${props.title ? `<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#aaa">${props.title}</div>` : ''}
      <div style="position:relative;padding-left:18px"><div style="position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:#1a1a1a"></div>${events}</div></div>` }
  },
  ganttChart(data) {
    const props = data.props; const barColors = ['#22c55e','#3b82f6','#8b5cf6','#f59e0b','#ef4444']
    const minT = Math.min(...props.tasks.map(t => new Date(t.start).getTime()))
    const maxT = Math.max(...props.tasks.map(t => new Date(t.end).getTime()))
    const range = maxT - minT || 1
    const rows = props.tasks.map((t, i) => {
      const left = ((new Date(t.start).getTime() - minT) / range * 100)
      const width = ((new Date(t.end).getTime() - new Date(t.start).getTime()) / range * 100)
      const progW = width * (t.progress || 0) / 100
      return `<div style="display:flex;align-items:center;height:28px;margin-bottom:3px">
        <div style="width:100px;flex-shrink:0;font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px">${t.name}</div>
        <div style="flex:1;position:relative;height:18px;background:#0a0a0a;border-radius:4px">
          <div style="position:absolute;left:${left}%;width:${Math.max(width, 1)}%;height:100%;background:${t.color || barColors[i]};border-radius:4px;opacity:0.4"></div>
          <div style="position:absolute;left:${left}%;width:${progW}%;height:100%;background:${t.color || barColors[i]};border-radius:4px"></div>
          ${t.progress > 0 ? `<span style="position:absolute;left:${left + width + 1}%;top:1px;font-size:9px;color:#888">${t.progress}%</span>` : ''}
        </div>
      </div>`
    }).join('')
    return { html: `<div class="component-render"><div class="source-badge source-rk">旧版 RenderKit · DOM</div>
      ${props.title ? `<div style="font-size:13px;font-weight:600;margin-bottom:10px;color:#aaa">${props.title}</div>` : ''}
      ${rows}</div>` }
  },
  budgetReport(data) {
    const props = data.props
    const maxVal = Math.max(...props.categories.map(c => Math.max(c.budget, c.actual)))
    const rows = props.categories.map((cat, i) => {
      const variance = cat.actual - cat.budget; const isOver = variance > 0
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
          <span style="color:#ddd">${cat.name}</span>
          <div style="display:flex;gap:10px;font-size:11px">
            <span style="color:#888">预算 ${cat.budget}万</span>
            <span style="color:#ddd">实际 ${cat.actual}万</span>
            ${props.showVariance ? `<span style="color:${isOver ? '#ef4444' : '#22c55e'};font-weight:600">${isOver ? '+' : ''}${variance}万</span>` : ''}
          </div>
        </div>
        <div style="height:5px;background:#0a0a0a;border-radius:3px;position:relative">
          <div style="position:absolute;height:100%;width:${cat.budget / maxVal * 100}%;background:#2a2a2a;border-radius:3px"></div>
          <div style="position:absolute;height:100%;width:${cat.actual / maxVal * 100}%;background:${cat.color || (isOver ? '#ef4444' : '#3b82f6')};border-radius:3px;opacity:0.85"></div>
        </div>
      </div>`
    }).join('')
    return { html: `<div class="component-render"><div class="source-badge source-jr">json-render · React</div>
      ${props.title ? `<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#aaa">${props.title}</div>` : ''}
      <div style="display:flex;gap:10px;margin-bottom:12px;font-size:10px;color:#555">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#2a2a2a;border-radius:2px"></span>预算</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#3b82f6;border-radius:2px"></span>实际</span>
      </div>
      ${rows}</div>` }
  },
  dashboard(data) {
    const id = uid()
    return {
      html: `<div class="component-render">
        <div style="display:flex;gap:6px;margin-bottom:12px">
          <span class="source-badge source-mviz">mviz</span>
          <span class="source-badge source-jr">json-render</span>
          <span class="source-badge source-rk">RenderKit</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
          <div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:12px 20px;text-align:center">
            <div style="font-size:10px;color:#888;margin-bottom:4px">总收入</div>
            <div style="font-size:24px;font-weight:700;color:#e5e5e5">¥289K <span style="font-size:12px;color:#22c55e">↑ 18.2%</span></div>
          </div>
          <div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:12px 20px;text-align:center">
            <div style="font-size:10px;color:#888;margin-bottom:4px">用户数</div>
            <div style="font-size:24px;font-weight:700;color:#e5e5e5">12.4K <span style="font-size:12px;color:#22c55e">↑ 8.5%</span></div>
          </div>
          <div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:12px 20px;text-align:center">
            <div style="font-size:10px;color:#888;margin-bottom:4px">转化率</div>
            <div style="font-size:24px;font-weight:700;color:#e5e5e5">4.2% <span style="font-size:12px;color:#22c55e">↑ 0.8%</span></div>
          </div>
        </div>
        <div id="${id}" class="chart" style="height:180px"></div>
      </div>`,
      init() {
        const c = echarts.init(document.getElementById(id), 'dark')
        c.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#222',borderColor:'#333',textStyle:{color:'#ddd'}},grid:{left:40,right:12,top:20,bottom:24},xAxis:{type:'category',data:['1月','2月','3月','4月','5月','6月'],axisLine:{lineStyle:{color:'#333'}},axisLabel:{color:'#888'}},yAxis:{type:'value',axisLabel:{color:'#888'},splitLine:{lineStyle:{color:'#1a1a1a'}}},series:[{type:'bar',data:[180,220,195,240,265,289],itemStyle:{color:'#3b82f6',borderRadius:[3,3,0,0]},barWidth:'40%'},{type:'line',data:[150,180,200,210,240,260],smooth:true,lineStyle:{color:'#f59e0b'},itemStyle:{color:'#f59e0b'}}]})
        window.addEventListener('resize',()=>c.resize())
      }
    }
  }
}

// ============ ENGINE ============
let uid = () => 'r' + Math.random().toString(36).slice(2, 9)
let paused = false, currentCase = 0, timers = []
const $ = id => document.getElementById(id)
const msgs = $('messages')

function buildSidebar() {
  $('sidebar').innerHTML = CASES.map((c, i) =>
    `<div class="sidebar-item" id="si-${i}" onclick="jumpTo(${i})">${c.title}<span class="source-tag tag-${c.source === 'mviz' ? 'mviz' : c.source === 'jr' ? 'jr' : c.source === 'rk' ? 'rk' : 'mviz'}">${c.sourceLabel}</span></div>`
  ).join('')
}

function addUserMsg(text) {
  const div = document.createElement('div')
  div.className = 'msg user'
  div.innerHTML = `<div class="msg-avatar">U</div><div class="msg-body"><div class="msg-text">${text}</div></div>`
  msgs.appendChild(div)
  scrollDown()
}

function addThinkingMsg() {
  const div = document.createElement('div')
  div.className = 'msg ai'
  div.id = 'ai-msg-' + currentCase
  div.innerHTML = `<div class="msg-avatar">RK</div><div class="msg-body"><div class="thinking" id="thinking-${currentCase}"><span></span><span></span><span></span></div></div>`
  msgs.appendChild(div)
  scrollDown()
}

function startStreaming(caseIdx) {
  const c = CASES[caseIdx]
  const msgBody = document.querySelector(`#ai-msg-${caseIdx} .msg-body`)

  // Phase 1: thinking
  $('input-status').textContent = `正在处理: ${c.title}...`
  timers.push(setTimeout(() => {
    if (paused) return

    // Phase 2: stream JSON
    const jsonStr = c.json
    const jsonDiv = document.createElement('div')
    jsonDiv.className = 'stream-json'
    msgBody.innerHTML = `<div class="source-badge source-${c.source}">${c.sourceLabel}</div><span style="font-size:13px;color:#ccc;white-space:pre-wrap">${c.aiIntro}</span>`
    msgBody.appendChild(jsonDiv)
    // Add cursor container
    const cursorSpan = document.createElement('span')
    cursorSpan.className = 'cursor'
    jsonDiv.appendChild(cursorSpan)

    let pos = 0
    const speed = 12
    const interval = setInterval(() => {
      if (paused) return
      const chunk = jsonStr.slice(pos, pos + speed)
      pos += speed
      // Insert text before cursor
      cursorSpan.insertAdjacentHTML('beforebegin', highlightJSON(chunk))
      scrollDown()

      if (pos >= jsonStr.length) {
        clearInterval(interval)
        // Phase 3: render component
        timers.push(setTimeout(() => {
          if (paused) return
          cursorSpan.remove()
          // Collapse JSON, show component
          const jsonText = jsonDiv.textContent
          jsonDiv.style.maxHeight = '0'
          jsonDiv.style.padding = '0'
          jsonDiv.style.margin = '0'
          jsonDiv.style.border = 'none'
          jsonDiv.style.overflow = 'hidden'

          const renderDiv = document.createElement('div')
          const data = JSON.parse(jsonStr)
          const result = RENDERERS[c.render](data)
          // Support both { html, init } object and plain string
          if (typeof result === 'object') {
            renderDiv.innerHTML = result.html
            msgBody.appendChild(renderDiv)
            if (result.init) setTimeout(() => result.init(), 0)
          } else {
            renderDiv.innerHTML = result
            msgBody.appendChild(renderDiv)
          }

          // Add toggle
          const toggle = document.createElement('div')
          toggle.className = 'json-toggle'
          toggle.textContent = '▶ 查看 JSON spec'
          toggle.onclick = () => {
            const expanded = toggle.nextElementSibling
            if (expanded) {
              expanded.remove()
              toggle.textContent = '▶ 查看 JSON spec'
            } else {
              const pre = document.createElement('div')
              pre.className = 'json-toggle-expanded'
              pre.textContent = jsonStr
              toggle.after(pre)
              toggle.textContent = '▼ 收起 JSON spec'
            }
          }
          msgBody.appendChild(toggle)

          scrollDown()
          $('progress').style.width = ((caseIdx + 1) / CASES.length * 100) + '%'

          // Next case
          timers.push(setTimeout(() => {
            if (paused) return
            currentCase++
            if (currentCase < CASES.length) {
              playCase(currentCase)
            } else {
              $('input-status').textContent = '全部演示完成 ✨'
            }
          }, 2500))
        }, 600))
      }
    }, 50)
    timers.push(interval)
  }, 1200))
}

function playCase(idx) {
  if (idx >= CASES.length) return
  // Highlight sidebar
  document.querySelectorAll('.sidebar-item').forEach((el, i) => el.classList.toggle('active', i === idx))
  const c = CASES[idx]
  addUserMsg(c.user)
  addThinkingMsg()
  startStreaming(idx)
}

function highlightJSON(chunk) {
  return chunk.replace(/"([^"]+)"(?=\s*:)/g, '<span class="json-key">"$1"</span>')
    .replace(/:\s*"([^"]*)"/g, ': <span class="json-str">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="json-bool">$1</span>')
}

function scrollDown() {
  msgs.scrollTop = msgs.scrollHeight
}

function startDemo() {
  resetDemo()
  paused = false
  $('btn-play').classList.add('active')
  $('btn-pause').classList.remove('active')
  playCase(0)
}

function togglePause() {
  paused = !paused
  $('btn-pause').classList.toggle('active', paused)
  $('btn-pause').textContent = paused ? '▶ 继续' : '⏸ 暂停'
  $('input-status').textContent = paused ? '已暂停' : `正在处理: ${CASES[currentCase]?.title || '完成'}...`
  if (!paused) {
    // If we were paused mid-stream, the intervals check `paused` flag, so they'll resume
  }
}

function resetDemo() {
  timers.forEach(t => clearTimeout(t))
  timers.forEach(t => clearInterval(t))
  timers = []
  msgs.innerHTML = ''
  currentCase = 0
  paused = false
  $('progress').style.width = '0%'
  $('input-status').textContent = '准备中...'
  $('btn-pause').textContent = '⏸ 暂停'
  $('btn-pause').classList.remove('active')
  $('btn-play').classList.add('active')
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'))
}

function jumpTo(idx) {
  // Reset and play from this case
  resetDemo()
  currentCase = idx
  paused = false
  $('btn-play').classList.add('active')
  playCase(idx)
}

// ============ INIT ============
buildSidebar()
// Auto-start after 1 second
setTimeout(() => startDemo(), 1000)
</script>
