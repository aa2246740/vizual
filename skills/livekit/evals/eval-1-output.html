<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarChart vs PieChart — LiveKit</title>
  <style>
    :root {
      --rk-bg-primary: #0f0f1a;
      --rk-bg-secondary: #1e293b;
      --rk-bg-tertiary: #252836;
      --rk-text-primary: #e2e8f0;
      --rk-text-secondary: #94a3b8;
      --rk-text-tertiary: #64748b;
      --rk-border-subtle: #2d3148;
      --rk-accent: #667eea;
      --rk-accent-hover: #7c8ff5;
      --rk-accent-muted: rgba(102,126,234,0.15);
      --rk-radius-md: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--rk-bg-primary);
      color: var(--rk-text-primary);
      padding: 32px;
      min-height: 100vh;
    }
    .page-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--rk-text-secondary);
      margin-bottom: 24px;
    }

    /* Button group for chart type switching */
    .btn-group {
      display: inline-flex;
      gap: 0;
      margin-bottom: 20px;
      border: 1px solid var(--rk-border-subtle);
      border-radius: var(--rk-radius-md);
      overflow: hidden;
    }
    .btn-group button {
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      background: var(--rk-bg-secondary);
      color: var(--rk-text-secondary);
      transition: all 0.15s ease;
      outline: none;
    }
    .btn-group button:not(:last-child) {
      border-right: 1px solid var(--rk-border-subtle);
    }
    .btn-group button:hover {
      background: var(--rk-bg-tertiary);
      color: var(--rk-text-primary);
    }
    .btn-group button.active {
      background: var(--rk-accent);
      color: #fff;
    }

    /* Data info card */
    .data-card {
      background: var(--rk-bg-secondary);
      border: 1px solid var(--rk-border-subtle);
      border-radius: var(--rk-radius-md);
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--rk-text-secondary);
    }
    .data-card code {
      background: var(--rk-bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--rk-accent);
    }

    /* Chart preview container */
    .preview {
      border: 1px solid var(--rk-border-subtle);
      border-radius: var(--rk-radius-md);
      padding: 16px;
      min-height: 400px;
      background: var(--rk-bg-secondary);
    }

    /* Insight hints below chart */
    .insights {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .insight-chip {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--rk-accent-muted);
      color: var(--rk-accent);
    }
  </style>
</head>
<body>
  <div class="page-title">BarChart vs PieChart</div>
  <div class="page-subtitle">Same data, different perspectives — click to switch and compare.</div>

  <!-- Button group: toggle between chart types -->
  <div class="btn-group" id="chartTypeGroup">
    <button id="btnBar" class="active" data-type="BarChart">Bar Chart</button>
    <button id="btnPie" data-type="PieChart">Pie Chart</button>
  </div>

  <!-- Data card -->
  <div class="data-card">
    Source data: <code>[["Product A", 40], ["Product B", 35], ["Product C", 25]]</code>
    &mdash; 3 categories, total value: 100
  </div>

  <!-- Render target -->
  <div class="preview" id="preview"></div>

  <!-- Insight hints -->
  <div class="insights">
    <span class="insight-chip" id="insightText">Bar charts excel at comparing exact values across categories</span>
  </div>

  <script src="../dist/vizual.standalone.js"></script>
  <script>
    var preview = document.getElementById('preview');
    var btnBar = document.getElementById('btnBar');
    var btnPie = document.getElementById('btnPie');
    var insightText = document.getElementById('insightText');

    // Shared dataset derived from user input
    var data = [
      { name: 'Product A', value: 40 },
      { name: 'Product B', value: 35 },
      { name: 'Product C', value: 25 }
    ];

    // Current chart type
    var currentType = 'BarChart';

    // Build Vizual spec based on chart type
    function buildSpec(type) {
      if (type === 'BarChart') {
        return {
          root: 'm',
          elements: {
            m: {
              type: 'BarChart',
              props: {
                title: 'Product Comparison (Bar Chart)',
                x: 'name',
                y: 'value',
                data: data
              },
              children: []
            }
          }
        };
      } else {
        return {
          root: 'm',
          elements: {
            m: {
              type: 'PieChart',
              props: {
                title: 'Product Share (Pie Chart)',
                category: 'name',
                value: 'value',
                data: data
              },
              children: []
            }
          }
        };
      }
    }

    // Insight text to display for each chart type
    var insights = {
      BarChart: 'Bar charts excel at comparing exact values across categories',
      PieChart: 'Pie charts show proportional share — each slice is a percentage of the whole'
    };

    // Render chart into preview container
    var currentRoot = null;
    function render() {
      preview.innerHTML = '';
      try {
        var spec = buildSpec(currentType);
        currentRoot = Vizual.renderSpec(spec, preview);
      } catch (e) {
        preview.innerHTML = '<div style="color:var(--rk-error);font-size:12px;padding:20px;">Error: ' + e.message + '</div>';
      }
      insightText.textContent = insights[currentType] || '';
    }

    // Button group click handler
    function handleButtonClick(e) {
      var btn = e.target.closest('button');
      if (!btn) return;

      var type = btn.getAttribute('data-type');
      if (type === currentType) return;

      // Update active state
      btnBar.classList.toggle('active', type === 'BarChart');
      btnPie.classList.toggle('active', type === 'PieChart');

      currentType = type;
      render();
    }

    document.getElementById('chartTypeGroup').addEventListener('click', handleButtonClick);

    // Initial render
    render();
  </script>
</body>
</html>
