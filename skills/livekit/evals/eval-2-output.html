<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LiveKit — 排序算法参数探索</title>
  <style>
    :root {
      --rk-bg-primary: #0f1117;
      --rk-bg-secondary: #1e293b;
      --rk-bg-tertiary: #252836;
      --rk-text-primary: #e2e8f0;
      --rk-text-secondary: #94a3b8;
      --rk-text-tertiary: #64748b;
      --rk-border-subtle: #2d3148;
      --rk-accent: #667eea;
      --rk-accent-hover: #7c8ff5;
      --rk-accent-muted: rgba(102,126,234,0.15);
      --rk-success: #10b981;
      --rk-warning: #f59e0b;
      --rk-error: #ef4444;
      --rk-radius-md: 8px;
      --rk-radius-sm: 4px;
      --rk-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--rk-bg-primary);
      color: var(--rk-text-primary);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .lk-root { display: flex; gap: 0; min-height: 100vh; }
    .lk-controls {
      width: 320px; flex-shrink: 0;
      background: var(--rk-bg-secondary);
      border-right: 1px solid var(--rk-border-subtle);
      padding: 24px 20px;
      overflow-y: auto;
      position: sticky; top: 0;
      height: 100vh;
    }
    .lk-target {
      flex: 1; padding: 24px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ── Controls Panel ── */
    .lk-controls h2 {
      font-size: 16px; font-weight: 600;
      margin-bottom: 6px; color: var(--rk-text-primary);
    }
    .lk-controls .subtitle {
      font-size: 12px; color: var(--rk-text-tertiary);
      margin-bottom: 20px; line-height: 1.5;
    }
    .ctrl-group {
      margin-bottom: 18px;
    }
    .ctrl-group label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 12px; color: var(--rk-text-secondary);
      margin-bottom: 6px;
    }
    .ctrl-group label .val {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 12px; color: var(--rk-accent);
      background: var(--rk-accent-muted);
      padding: 1px 6px; border-radius: var(--rk-radius-sm);
    }
    .ctrl-group input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 6px;
      background: var(--rk-bg-tertiary); border-radius: 3px; outline: none;
    }
    .ctrl-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      background: var(--rk-accent); border-radius: 50%; cursor: pointer;
      transition: background 0.15s;
    }
    .ctrl-group input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--rk-accent-hover);
    }
    .ctrl-group select {
      width: 100%; padding: 8px 10px;
      background: var(--rk-bg-tertiary); color: var(--rk-text-primary);
      border: 1px solid var(--rk-border-subtle);
      border-radius: var(--rk-radius-sm);
      font-size: 13px; outline: none; cursor: pointer;
    }
    .ctrl-group select:focus { border-color: var(--rk-accent); }

    .divider {
      height: 1px; background: var(--rk-border-subtle);
      margin: 20px 0;
    }

    /* ── Action buttons ── */
    .btn-row { display: flex; gap: 8px; margin-top: 6px; }
    .btn {
      flex: 1; padding: 10px 0;
      border: none; border-radius: var(--rk-radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--rk-accent); color: #fff;
    }
    .btn-primary:hover { background: var(--rk-accent-hover); }
    .btn-primary:disabled {
      opacity: 0.5; cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--rk-bg-tertiary); color: var(--rk-text-secondary);
      border: 1px solid var(--rk-border-subtle);
    }
    .btn-secondary:hover { color: var(--rk-text-primary); border-color: var(--rk-text-tertiary); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .stat-card {
      background: var(--rk-bg-secondary);
      border: 1px solid var(--rk-border-subtle);
      border-radius: var(--rk-radius-md);
      padding: 12px 16px; min-width: 140px;
    }
    .stat-card .stat-label {
      font-size: 11px; color: var(--rk-text-tertiary);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .stat-card .stat-value {
      font-size: 20px; font-weight: 700;
      font-family: 'SF Mono', Menlo, monospace;
      color: var(--rk-text-primary);
    }
    .stat-card .stat-value.accent { color: var(--rk-accent); }
    .stat-card .stat-value.success { color: var(--rk-success); }
    .stat-card .stat-value.warning { color: var(--rk-warning); }

    /* ── Canvas visualization ── */
    .viz-container {
      background: var(--rk-bg-secondary);
      border: 1px solid var(--rk-border-subtle);
      border-radius: var(--rk-radius-md);
      padding: 20px; flex: 1; min-height: 400px;
      display: flex; flex-direction: column;
    }
    .viz-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .viz-title { font-size: 14px; font-weight: 600; }
    .viz-badge {
      font-size: 11px; padding: 3px 8px;
      border-radius: var(--rk-radius-sm);
      font-weight: 600;
    }
    .viz-badge.running { background: var(--rk-accent-muted); color: var(--rk-accent); }
    .viz-badge.done { background: rgba(16,185,129,0.15); color: var(--rk-success); }
    .viz-badge.idle { background: rgba(100,116,139,0.15); color: var(--rk-text-tertiary); }
    #sortCanvas {
      flex: 1; width: 100%; border-radius: var(--rk-radius-sm);
    }

    /* ── Step log ── */
    .step-log {
      background: var(--rk-bg-secondary);
      border: 1px solid var(--rk-border-subtle);
      border-radius: var(--rk-radius-md);
      padding: 16px; max-height: 180px; overflow-y: auto;
    }
    .step-log h4 {
      font-size: 12px; color: var(--rk-text-tertiary);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .step-log .log-entry {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 11px; color: var(--rk-text-secondary);
      line-height: 1.8;
    }
    .step-log .log-entry .compare { color: var(--rk-warning); }
    .step-log .log-entry .swap { color: var(--rk-accent); }
    .step-log .log-entry .done { color: var(--rk-success); }

    /* ── Speed slider special ── */
    .speed-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--rk-text-tertiary);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="lk-root">
    <!-- ═══ Controls Panel ═══ -->
    <div class="lk-controls">
      <h2>排序算法探索器</h2>
      <p class="subtitle">调整参数，实时观察不同排序算法在不同数据规模和范围下的行为差异。点击「开始排序」观察动画过程。</p>

      <div class="divider"></div>

      <!-- Algorithm -->
      <div class="ctrl-group">
        <label>排序算法</label>
        <select id="algorithm">
          <option value="bubble">冒泡排序 (Bubble)</option>
          <option value="selection">选择排序 (Selection)</option>
          <option value="insertion">插入排序 (Insertion)</option>
          <option value="quick" selected>快速排序 (Quick)</option>
          <option value="merge">归并排序 (Merge)</option>
          <option value="heap">堆排序 (Heap)</option>
        </select>
      </div>

      <!-- Data Size -->
      <div class="ctrl-group">
        <label>数据量 <span class="val" id="sizeVal">60</span></label>
        <input type="range" id="dataSize" min="5" max="200" value="60" step="1">
      </div>

      <!-- Data Range -->
      <div class="ctrl-group">
        <label>数值范围 <span class="val" id="rangeVal">1 – 100</span></label>
        <input type="range" id="dataRange" min="10" max="1000" value="100" step="10">
      </div>

      <!-- Speed -->
      <div class="ctrl-group">
        <label>动画速度 <span class="val" id="speedVal">中</span></label>
        <input type="range" id="speed" min="1" max="5" value="3" step="1">
        <div class="speed-labels">
          <span>慢</span><span>快</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Actions -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btnStart">开始排序</button>
        <button class="btn btn-secondary" id="btnReset">重新生成</button>
      </div>

      <div class="divider"></div>

      <!-- Complexity reference -->
      <div class="ctrl-group">
        <label style="margin-bottom:8px">算法复杂度参考</label>
        <div id="complexityRef" style="font-size:12px;color:var(--rk-text-secondary);line-height:1.8;font-family:'SF Mono',Menlo,monospace">
        </div>
      </div>
    </div>

    <!-- ═══ Visualization Area ═══ -->
    <div class="lk-target">
      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">比较次数</div>
          <div class="stat-value accent" id="statCompares">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">交换次数</div>
          <div class="stat-value warning" id="statSwaps">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">耗时</div>
          <div class="stat-value success" id="statTime">0 ms</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">数据状态</div>
          <div class="stat-value" id="statStatus" style="font-size:14px">已生成</div>
        </div>
      </div>

      <!-- Canvas -->
      <div class="viz-container">
        <div class="viz-header">
          <span class="viz-title" id="vizTitle">快速排序 — 60 个元素</span>
          <span class="viz-badge idle" id="vizBadge">就绪</span>
        </div>
        <canvas id="sortCanvas"></canvas>
      </div>

      <!-- Step Log -->
      <div class="step-log" id="stepLog">
        <h4>操作日志</h4>
        <div id="logContent">
          <div class="log-entry">等待开始...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════
    //  State
    // ══════════════════════════════════════
    var data = [];
    var steps = [];        // [{type, indices, snapshot}]
    var currentStep = 0;
    var animTimer = null;
    var isRunning = false;

    var compares = 0;
    var swaps = 0;

    // DOM refs
    var elAlgorithm   = document.getElementById('algorithm');
    var elDataSize    = document.getElementById('dataSize');
    var elDataRange   = document.getElementById('dataRange');
    var elSpeed       = document.getElementById('speed');
    var elSizeVal     = document.getElementById('sizeVal');
    var elRangeVal    = document.getElementById('rangeVal');
    var elSpeedVal    = document.getElementById('speedVal');
    var elBtnStart    = document.getElementById('btnStart');
    var elBtnReset    = document.getElementById('btnReset');
    var elCanvas      = document.getElementById('sortCanvas');
    var ctx           = elCanvas.getContext('2d');
    var elStatCompares = document.getElementById('statCompares');
    var elStatSwaps    = document.getElementById('statSwaps');
    var elStatTime     = document.getElementById('statTime');
    var elStatStatus   = document.getElementById('statStatus');
    var elVizTitle     = document.getElementById('vizTitle');
    var elVizBadge     = document.getElementById('vizBadge');
    var elLogContent   = document.getElementById('logContent');
    var elComplexity   = document.getElementById('complexityRef');

    var speedLabels = { 1: '极慢', 2: '慢', 3: '中', 4: '快', 5: '极快' };

    // ══════════════════════════════════════
    //  Complexity info per algorithm
    // ══════════════════════════════════════
    var complexityInfo = {
      bubble:    { best: 'O(n)', avg: 'O(n²)', worst: 'O(n²)', stable: true },
      selection: { best: 'O(n²)', avg: 'O(n²)', worst: 'O(n²)', stable: false },
      insertion: { best: 'O(n)', avg: 'O(n²)', worst: 'O(n²)', stable: true },
      quick:     { best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n²)', stable: false },
      merge:     { best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n log n)', stable: true },
      heap:      { best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n log n)', stable: false },
    };

    var algoNames = {
      bubble: '冒泡排序', selection: '选择排序', insertion: '插入排序',
      quick: '快速排序', merge: '归并排序', heap: '堆排序'
    };

    // ══════════════════════════════════════
    //  Helpers
    // ══════════════════════════════════════
    function generateData() {
      var size = +elDataSize.value;
      var range = +elDataRange.value;
      data = [];
      for (var i = 0; i < size; i++) {
        data.push(Math.floor(Math.random() * range) + 1);
      }
    }

    function cloneData(arr) {
      return arr.slice();
    }

    function addLogEntry(text, cls) {
      var div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = '<span class="' + (cls || '') + '">' + text + '</span>';
      elLogContent.appendChild(div);
      elLogContent.parentElement.scrollTop = elLogContent.parentElement.scrollHeight;
    }

    function clearLog() {
      elLogContent.innerHTML = '';
    }

    function updateComplexity() {
      var algo = elAlgorithm.value;
      var info = complexityInfo[algo];
      elComplexity.innerHTML =
        '最优: ' + info.best + '<br>' +
        '平均: ' + info.avg + '<br>' +
        '最差: ' + info.worst + '<br>' +
        '稳定: ' + (info.stable ? 'Yes' : 'No');
    }

    function updateLabels() {
      elSizeVal.textContent = elDataSize.value;
      elRangeVal.textContent = '1 – ' + elDataRange.value;
      elSpeedVal.textContent = speedLabels[+elSpeed.value];
      elVizTitle.textContent = algoNames[elAlgorithm.value] + ' — ' + elDataSize.value + ' 个元素';
    }

    function updateStats() {
      elStatCompares.textContent = compares.toLocaleString();
      elStatSwaps.textContent = swaps.toLocaleString();
    }

    function setBadge(text, cls) {
      elVizBadge.textContent = text;
      elVizBadge.className = 'viz-badge ' + cls;
    }

    // ══════════════════════════════════════
    //  Sorting algorithms — record steps
    // ══════════════════════════════════════
    // Each step: { type: 'compare'|'swap'|'overwrite'|'done', indices: [...], snapshot: [...] }

    function recordBubbleSort(arr) {
      var n = arr.length;
      for (var i = 0; i < n - 1; i++) {
        for (var j = 0; j < n - i - 1; j++) {
          steps.push({ type: 'compare', indices: [j, j + 1], snapshot: cloneData(arr) });
          compares++;
          if (arr[j] > arr[j + 1]) {
            var tmp = arr[j]; arr[j] = arr[j + 1]; arr[j + 1] = tmp;
            swaps++;
            steps.push({ type: 'swap', indices: [j, j + 1], snapshot: cloneData(arr) });
          }
        }
      }
    }

    function recordSelectionSort(arr) {
      var n = arr.length;
      for (var i = 0; i < n - 1; i++) {
        var minIdx = i;
        for (var j = i + 1; j < n; j++) {
          steps.push({ type: 'compare', indices: [minIdx, j], snapshot: cloneData(arr) });
          compares++;
          if (arr[j] < arr[minIdx]) minIdx = j;
        }
        if (minIdx !== i) {
          var tmp = arr[i]; arr[i] = arr[minIdx]; arr[minIdx] = tmp;
          swaps++;
          steps.push({ type: 'swap', indices: [i, minIdx], snapshot: cloneData(arr) });
        }
      }
    }

    function recordInsertionSort(arr) {
      var n = arr.length;
      for (var i = 1; i < n; i++) {
        var key = arr[i];
        var j = i - 1;
        while (j >= 0) {
          steps.push({ type: 'compare', indices: [j, j + 1], snapshot: cloneData(arr) });
          compares++;
          if (arr[j] > key) {
            arr[j + 1] = arr[j];
            swaps++;
            steps.push({ type: 'swap', indices: [j, j + 1], snapshot: cloneData(arr) });
            j--;
          } else {
            break;
          }
        }
        arr[j + 1] = key;
      }
    }

    function recordQuickSort(arr, lo, hi) {
      if (lo === undefined) { lo = 0; hi = arr.length - 1; }
      if (lo >= hi) return;
      // Partition
      var pivot = arr[hi];
      var i = lo;
      for (var j = lo; j < hi; j++) {
        steps.push({ type: 'compare', indices: [j, hi], snapshot: cloneData(arr) });
        compares++;
        if (arr[j] < pivot) {
          if (i !== j) {
            var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
            swaps++;
            steps.push({ type: 'swap', indices: [i, j], snapshot: cloneData(arr) });
          }
          i++;
        }
      }
      var tmp2 = arr[i]; arr[i] = arr[hi]; arr[hi] = tmp2;
      swaps++;
      steps.push({ type: 'swap', indices: [i, hi], snapshot: cloneData(arr) });

      recordQuickSort(arr, lo, i - 1);
      recordQuickSort(arr, i + 1, hi);
    }

    function recordMergeSort(arr, left, right) {
      if (left === undefined) { left = 0; right = arr.length - 1; }
      if (left >= right) return;
      var mid = Math.floor((left + right) / 2);
      recordMergeSort(arr, left, mid);
      recordMergeSort(arr, mid + 1, right);

      // Merge
      var temp = [];
      var i = left, j = mid + 1;
      while (i <= mid && j <= right) {
        steps.push({ type: 'compare', indices: [i, j], snapshot: cloneData(arr) });
        compares++;
        if (arr[i] <= arr[j]) {
          temp.push(arr[i++]);
        } else {
          temp.push(arr[j++]);
        }
      }
      while (i <= mid) temp.push(arr[i++]);
      while (j <= right) temp.push(arr[j++]);

      for (var k = 0; k < temp.length; k++) {
        arr[left + k] = temp[k];
        swaps++;
        steps.push({ type: 'overwrite', indices: [left + k], snapshot: cloneData(arr) });
      }
    }

    function recordHeapSort(arr) {
      var n = arr.length;

      function heapify(size, root) {
        var largest = root;
        var l = 2 * root + 1;
        var r = 2 * root + 2;
        if (l < size) {
          steps.push({ type: 'compare', indices: [l, largest], snapshot: cloneData(arr) });
          compares++;
          if (arr[l] > arr[largest]) largest = l;
        }
        if (r < size) {
          steps.push({ type: 'compare', indices: [r, largest], snapshot: cloneData(arr) });
          compares++;
          if (arr[r] > arr[largest]) largest = r;
        }
        if (largest !== root) {
          var tmp = arr[root]; arr[root] = arr[largest]; arr[largest] = tmp;
          swaps++;
          steps.push({ type: 'swap', indices: [root, largest], snapshot: cloneData(arr) });
          heapify(size, largest);
        }
      }

      // Build max heap
      for (var i = Math.floor(n / 2) - 1; i >= 0; i--) {
        heapify(n, i);
      }
      // Extract
      for (var i = n - 1; i > 0; i--) {
        var tmp2 = arr[0]; arr[0] = arr[i]; arr[i] = tmp2;
        swaps++;
        steps.push({ type: 'swap', indices: [0, i], snapshot: cloneData(arr) });
        heapify(i, 0);
      }
    }

    // ══════════════════════════════════════
    //  Canvas Rendering
    // ══════════════════════════════════════
    function resizeCanvas() {
      var rect = elCanvas.parentElement.getBoundingClientRect();
      var headerH = elCanvas.parentElement.querySelector('.viz-header').offsetHeight + 12;
      elCanvas.width = rect.width - 40;
      elCanvas.height = rect.height - headerH - 40;
    }

    function drawBars(snapshot, highlightIndices, highlightType) {
      resizeCanvas();
      var w = elCanvas.width;
      var h = elCanvas.height;
      ctx.clearRect(0, 0, w, h);

      if (!snapshot || snapshot.length === 0) return;

      var n = snapshot.length;
      var maxVal = Math.max.apply(null, snapshot);
      var barW = Math.max(1, (w - n) / n);
      var gap = Math.max(0.5, Math.min(2, (w - barW * n) / n));

      for (var i = 0; i < n; i++) {
        var barH = Math.max(2, (snapshot[i] / maxVal) * (h - 10));
        var x = i * (barW + gap);
        var y = h - barH;

        var isHighlighted = highlightIndices && highlightIndices.indexOf(i) !== -1;

        if (isHighlighted) {
          if (highlightType === 'compare') {
            ctx.fillStyle = '#f59e0b'; // warning color
          } else if (highlightType === 'swap') {
            ctx.fillStyle = '#667eea'; // accent color
          } else if (highlightType === 'overwrite') {
            ctx.fillStyle = '#667eea';
          } else {
            ctx.fillStyle = '#10b981';
          }
          // Glow effect
          ctx.shadowColor = ctx.fillStyle;
          ctx.shadowBlur = 8;
        } else {
          ctx.fillStyle = '#94a3b8'; // text-secondary
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
        }

        // Rounded top
        var r = Math.min(2, barW / 2);
        ctx.beginPath();
        ctx.moveTo(x, y + r);
        ctx.arcTo(x, y, x + barW, y, r);
        ctx.arcTo(x + barW, y, x + barW, y + barH, r);
        ctx.lineTo(x + barW, h);
        ctx.lineTo(x, h);
        ctx.closePath();
        ctx.fill();

        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
      }
    }

    // ══════════════════════════════════════
    //  Animation
    // ══════════════════════════════════════
    function getDelay() {
      var s = +elSpeed.value;
      // 1→200ms, 2→80ms, 3→30ms, 4→10ms, 5→2ms
      var delays = { 1: 200, 2: 80, 3: 30, 4: 10, 5: 2 };
      return delays[s] || 30;
    }

    function startAnimation() {
      if (steps.length === 0) {
        // Record steps
        var arr = cloneData(data);
        var algo = elAlgorithm.value;
        compares = 0;
        swaps = 0;
        steps = [];
        clearLog();
        addLogEntry('开始 ' + algoNames[algo] + '...', '');

        var t0 = performance.now();
        switch (algo) {
          case 'bubble':    recordBubbleSort(arr); break;
          case 'selection': recordSelectionSort(arr); break;
          case 'insertion': recordInsertionSort(arr); break;
          case 'quick':     recordQuickSort(arr); break;
          case 'merge':     recordMergeSort(arr); break;
          case 'heap':      recordHeapSort(arr); break;
        }
        var t1 = performance.now();

        elStatTime.textContent = (t1 - t0).toFixed(1) + ' ms';
        updateStats();

        addLogEntry('记录完成: ' + steps.length + ' 步, 比较 ' + compares + ' 次, 交换 ' + swaps + ' 次', 'done');
      }

      currentStep = 0;
      isRunning = true;
      elBtnStart.disabled = true;
      setBadge('排序中...', 'running');
      elStatStatus.textContent = '排序中';

      animateStep();
    }

    function animateStep() {
      if (currentStep >= steps.length) {
        // Done — show final sorted state with green bars
        var finalArr = steps.length > 0 ? steps[steps.length - 1].snapshot : data;
        drawBars(finalArr, [], 'done');
        isRunning = false;
        elBtnStart.disabled = false;
        setBadge('完成', 'done');
        elStatStatus.textContent = '已排序';
        addLogEntry('排序完成!', 'done');
        return;
      }

      var step = steps[currentStep];
      drawBars(step.snapshot, step.indices, step.type);

      // Update live counters based on progress
      var progress = (currentStep + 1) / steps.length;
      elStatCompares.textContent = Math.round(compares * progress).toLocaleString();
      elStatSwaps.textContent = Math.round(swaps * progress).toLocaleString();

      currentStep++;

      // Throttle log entries to avoid flooding
      if (currentStep % Math.max(1, Math.floor(steps.length / 50)) === 0 || currentStep === steps.length) {
        addLogEntry(
          '步骤 ' + currentStep + '/' + steps.length + ': ' +
          (step.type === 'compare' ? '比较' : step.type === 'swap' ? '交换' : '写入') +
          ' [' + step.indices.join(', ') + ']',
          step.type === 'compare' ? 'compare' : 'swap'
        );
      }

      animTimer = setTimeout(animateStep, getDelay());
    }

    function stopAnimation() {
      if (animTimer) {
        clearTimeout(animTimer);
        animTimer = null;
      }
      isRunning = false;
      elBtnStart.disabled = false;
      setBadge('就绪', 'idle');
      elStatStatus.textContent = '已停止';
    }

    // ══════════════════════════════════════
    //  Event bindings
    // ══════════════════════════════════════
    function onControlChange() {
      updateLabels();
      updateComplexity();
    }

    elDataSize.addEventListener('input', function() {
      onControlChange();
      // Regenerate data when size changes (if not running)
      if (!isRunning) {
        resetAll();
      }
    });

    elDataRange.addEventListener('input', function() {
      onControlChange();
      if (!isRunning) {
        resetAll();
      }
    });

    elAlgorithm.addEventListener('change', function() {
      onControlChange();
      if (!isRunning) {
        // Clear steps so they re-record with new algorithm
        steps = [];
        compares = 0;
        swaps = 0;
        updateStats();
        clearLog();
        addLogEntry('切换算法: ' + algoNames[elAlgorithm.value], '');
        drawBars(data, []);
      }
    });

    elSpeed.addEventListener('input', function() {
      elSpeedVal.textContent = speedLabels[+elSpeed.value];
      // Speed change takes effect on next step automatically
    });

    elBtnStart.addEventListener('click', function() {
      if (isRunning) {
        stopAnimation();
        return;
      }
      // Always re-record with current data
      steps = [];
      startAnimation();
    });

    elBtnReset.addEventListener('click', function() {
      stopAnimation();
      resetAll();
    });

    function resetAll() {
      steps = [];
      compares = 0;
      swaps = 0;
      currentStep = 0;
      generateData();
      updateStats();
      elStatTime.textContent = '0 ms';
      elStatStatus.textContent = '已生成';
      setBadge('就绪', 'idle');
      clearLog();
      addLogEntry('数据已重新生成 (' + data.length + ' 个元素, 范围 1-' + elDataRange.value + ')', '');
      drawBars(data, []);
    }

    // Handle window resize
    window.addEventListener('resize', function() {
      if (!isRunning) {
        drawBars(data, []);
      }
    });

    // ══════════════════════════════════════
    //  Init
    // ══════════════════════════════════════
    onControlChange();
    generateData();
    updateStats();
    addLogEntry('数据已生成 (' + data.length + ' 个元素, 范围 1-' + elDataRange.value + ')', '');
    addLogEntry('选择算法并点击「开始排序」观察排序过程', '');
    drawBars(data, []);
  </script>
</body>
</html>
